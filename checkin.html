<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check In</title>
</head>
<body>
  <div>CHECK IN</div>
  <div id="rackLabel">Rack -</div>

  <input id="memberNo" placeholder="会員番号">
  <input id="memberName" placeholder="お名前">
  <input id="displayName" placeholder="表示名">

  <button onclick="checkin()">チェックイン</button>
  <button onclick="back()">戻る</button>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
    const params = new URLSearchParams(location.search);
    const rackNo = params.get("rackNo") || "1";
    document.getElementById("rackLabel").innerText = "Rack №" + rackNo;

    function checkin() {
      const memberNo = document.getElementById("memberNo").value.trim();
      const memberName = document.getElementById("memberName").value.trim();
      const displayName = document.getElementById("displayName").value.trim();

      if (!memberNo || !memberName || !displayName) {
        alert("すべて入力してください");
        return;
      }

      fetch(GAS_URL + "?action=checkInNow", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          rackNo,
          memberNo,
          memberName,
          displayName
        })
      })
      .then(r => r.json())
      .then(res => {
        if (!res || !res.ok) {
          alert(res && res.message ? res.message : "エラー");
          return;
        }
        alert("チェックイン完了");
        back();
      })
      .catch(() => {
        alert("通信エラー");
      });
    }

    function back() {
      location.href = "tablet.html";
    }
  </script>
</body>
</html>

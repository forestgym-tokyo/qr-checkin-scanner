<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKOUT CHECK-IN</title>

<style>
body{
  margin:0;
  background:#0f1115;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:#fff;
}
.wrap{
  padding:30px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}
.card{
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  padding:24px;
}
.title{
  font-size:22px;
  margin-bottom:16px;
}
button{
  width:100%;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:14px;
  margin-top:10px;
}
.use{background:#2ecc71;}
.queue{background:#3498db;}
</style>
</head>

<body>

<div class="wrap">
  <div class="grid">

    <div class="card">
      <div class="title">Rack №1</div>
      <button class="use" onclick="goCheckin(1)">すぐに利用</button>
      <button class="queue" onclick="goQueue(1)">順番待ち</button>
    </div>

    <div class="card">
      <div class="title">Rack №2</div>
      <button class="use" onclick="goCheckin(2)">すぐに利用</button>
      <button class="queue" onclick="goQueue(2)">順番待ち</button>
    </div>

    <div class="card">
      <div class="title">Rack №3</div>
      <button class="use" onclick="goCheckin(3)">すぐに利用</button>
      <button class="queue" onclick="goQueue(3)">順番待ち</button>
    </div>

    <div class="card">
      <div class="title">Rack №4</div>
      <button class="use" onclick="goCheckin(4)">すぐに利用</button>
      <button class="queue" onclick="goQueue(4)">順番待ち</button>
    </div>

  </div>
</div>

<script>
function goCheckin(rackNo){
  location.href = "checkin.html?rackNo=" + rackNo;
}
function goQueue(rackNo){
  location.href = "queue.html?rackNo=" + rackNo;
}
</script>

</body>
</html>

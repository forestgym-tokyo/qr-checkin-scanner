<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WORKOUT CHECK-IN</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-1: #0b1015;
      --bg-2: #101821;
      --panel: rgba(255,255,255,0.06);
      --panel-border: rgba(255,255,255,0.08);
      --text-main: #f5f7fb;
      --text-sub: rgba(255,255,255,0.72);
      --accent: #56e7ff;

      --free-1: #1b4a2c;
      --free-2: #2d6a3f;

      --using-1: #45484d;
      --using-2: #5b6168;

      --reserved-1: #0f3f7c;
      --reserved-2: #1f5da8;

      --other-1: #252c34;
      --other-2: #323a45;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(86,231,255,0.08), transparent 26%),
        radial-gradient(circle at top right, rgba(45,106,63,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    body {
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.45fr 0.9fr;
      gap: 16px;
    }

    .hero,
    .code-card {
      border-radius: 24px;
      border: 1px solid var(--panel-border);
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .hero {
      min-height: 118px;
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .hero-sub {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-sub);
    }

    .hero-main {
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.08;
    }

    .code-card {
      min-height: 118px;
      padding: 18px 18px 16px;
      background: linear-gradient(135deg, #0b161d 0%, #10232d 100%);
      border-color: rgba(86,231,255,0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .code-ja {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .code-en {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.52);
      margin-bottom: 8px;
    }

    .code-value {
      font-size: 56px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(86,231,255,0.16);
      margin-bottom: 6px;
    }

    .date-value {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.8);
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .scan-btn {
      appearance: none;
      border: none;
      border-radius: 18px;
      min-height: 62px;
      padding: 16px 28px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.03em;
      color: #04131a;
      background: linear-gradient(135deg, #55e7ff 0%, #82f1ff 100%);
      box-shadow: 0 14px 26px rgba(0,0,0,0.24);
      cursor: pointer;
    }

    .scan-btn:active {
      transform: scale(0.99);
    }

    .rack-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1 1 auto;
    }

    .rack-card {
      position: relative;
      min-height: 270px;
      padding: 22px 22px 18px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 38px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .rack-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
      pointer-events: none;
    }

    .rack-card.free {
      background: linear-gradient(135deg, var(--free-1) 0%, var(--free-2) 100%);
    }

    .rack-card.using {
      background: linear-gradient(135deg, var(--using-1) 0%, var(--using-2) 100%);
    }

    .rack-card.reserved {
      background: linear-gradient(135deg, var(--reserved-1) 0%, var(--reserved-2) 100%);
    }

    .rack-card.other {
      background: linear-gradient(135deg, var(--other-1) 0%, var(--other-2) 100%);
    }

    .rack-head,
    .rack-body,
    .rack-foot {
      position: relative;
      z-index: 1;
    }

    .rack-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .rack-no {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.03em;
    }

    .rack-state {
      flex: 0 0 auto;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.08em;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.94);
      white-space: nowrap;
    }

    .rack-body {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .main-line {
      font-size: 44px;
      font-weight: 900;
      line-height: 1.08;
      text-align: center;
      letter-spacing: 0.01em;
      white-space: pre-line;
    }

    .sub-line {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.28;
      text-align: center;
      color: rgba(255,255,255,0.96);
      white-space: pre-line;
    }

    .note-line {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
      color: rgba(255,255,255,0.88);
      white-space: pre-line;
    }

    .rack-foot {
      display: flex;
      justify-content: center;
      min-height: 52px;
      margin-top: 12px;
    }

    .action-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 48px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 18px;
      font-weight: 900;
      line-height: 1.2;
      white-space: pre-line;
      color: #fff;
    }

    .action-chip:empty {
      display: none;
    }

    @media (max-width: 1100px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .hero-main {
        font-size: 34px;
      }

      .code-value {
        font-size: 48px;
      }

      .rack-card {
        min-height: 240px;
      }

      .main-line {
        font-size: 38px;
      }

      .sub-line {
        font-size: 22px;
      }

      .note-line {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="hero">
        <div class="hero-sub">THE FOREST GYM</div>
        <div class="hero-main">WORKOUT CHECK-IN</div>
      </div>

      <div class="code-card">
        <div class="code-ja">認証コード</div>
        <div class="code-en">ACCESS CODE</div>
        <div class="code-value" id="authCode">----</div>
        <div class="date-value" id="todayLabel">----/--/--</div>
      </div>
    </div>

    <div class="action-row">
      <button id="scanBtn" class="scan-btn">QR読み込み</button>
    </div>

    <div class="rack-grid">
      <div class="rack-card other" id="rack1">
        <div class="rack-head">
          <div class="rack-no">ラック№1</div>
          <div class="rack-state" id="rack1State">確認中</div>
        </div>
        <div class="rack-body">
          <div class="main-line" id="rack1Main">読込中</div>
          <div class="sub-line" id="rack1Sub"></div>
          <div class="note-line" id="rack1Note"></div>
        </div>
        <div class="rack-foot">
          <div class="action-chip" id="rack1Action"></div>
        </div>
      </div>

      <div class="rack-card other" id="rack2">
        <div class="rack-head">
          <div class="rack-no">ラック№2</div>
          <div class="rack-state" id="rack2State">確認中</div>
        </div>
        <div class="rack-body">
          <div class="main-line" id="rack2Main">読込中</div>
          <div class="sub-line" id="rack2Sub"></div>
          <div class="note-line" id="rack2Note"></div>
        </div>
        <div class="rack-foot">
          <div class="action-chip" id="rack2Action"></div>
        </div>
      </div>

      <div class="rack-card other" id="rack3">
        <div class="rack-head">
          <div class="rack-no">ラック№3</div>
          <div class="rack-state" id="rack3State">確認中</div>
        </div>
        <div class="rack-body">
          <div class="main-line" id="rack3Main">読込中</div>
          <div class="sub-line" id="rack3Sub"></div>
          <div class="note-line" id="rack3Note"></div>
        </div>
        <div class="rack-foot">
          <div class="action-chip" id="rack3Action"></div>
        </div>
      </div>

      <div class="rack-card other" id="rack4">
        <div class="rack-head">
          <div class="rack-no">ラック№4</div>
          <div class="rack-state" id="rack4State">確認中</div>
        </div>
        <div class="rack-body">
          <div class="main-line" id="rack4Main">読込中</div>
          <div class="sub-line" id="rack4Sub"></div>
          <div class="note-line" id="rack4Note"></div>
        </div>
        <div class="rack-foot">
          <div class="action-chip" id="rack4Action"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

    function trimText(v) {
      return String(v || "").replace(/^\s+|\s+$/g, "");
    }

    function getStatusClass(state) {
      if (state === "free") return "free";
      if (state === "using") return "using";
      if (state === "reserved") return "reserved";
      return "other";
    }

    function getStatusLabel(state) {
      if (state === "free") return "空き";
      if (state === "using") return "利用中";
      if (state === "reserved") return "予約あり";
      return "確認中";
    }

    function buildActionText(row) {
      if (!row) return "";

      if (row.showUseNowButton) {
        return "すぐ利用 " + trimText(row.useNowStartText) + "〜" + trimText(row.useNowEndText);
      }

      if (row.showGapButton) {
        return "すき間利用 " + trimText(row.gapStartText) + "〜" + trimText(row.gapEndText);
      }

      if (row.showQueueButton) {
        return "順番待ち " + trimText(row.queueStartText) + "〜";
      }

      return "";
    }

    function renderRack(r, row) {
      var rackNo = r.rackNo;
      var wrap = document.getElementById("rack" + rackNo);
      var stateEl = document.getElementById("rack" + rackNo + "State");
      var mainEl = document.getElementById("rack" + rackNo + "Main");
      var subEl = document.getElementById("rack" + rackNo + "Sub");
      var noteEl = document.getElementById("rack" + rackNo + "Note");
      var actionEl = document.getElementById("rack" + rackNo + "Action");

      var currentText = trimText(r.currentText);
      var nextText = trimText(r.nextText);
      var actionText = buildActionText(row);

      wrap.className = "rack-card " + getStatusClass(r.state);
      stateEl.textContent = getStatusLabel(r.state);

      if (currentText) {
        mainEl.textContent = currentText;
        subEl.textContent = nextText || "";
      } else if (nextText) {
        mainEl.textContent = nextText;
        subEl.textContent = "";
      } else {
        mainEl.textContent = getStatusLabel(r.state);
        subEl.textContent = "";
      }

      noteEl.textContent = r.cannotQueue ? "順番待ち受付不可" : "";
      actionEl.textContent = actionText;
    }

    function renderTablet(data) {
      var authEl = document.getElementById("authCode");
      var dateEl = document.getElementById("todayLabel");

      authEl.textContent = data && data.authCode ? data.authCode : "----";
      dateEl.textContent = data && data.todayLabel ? data.todayLabel : "----/--/--";

      var rowMap = {};
      var queueRows = (data && data.queueUiRows) ? data.queueUiRows : [];

      for (var i = 0; i < queueRows.length; i++) {
        if (queueRows[i] && queueRows[i].rackNo) {
          rowMap[queueRows[i].rackNo] = queueRows[i];
        }
      }

      var racks = (data && data.racks) ? data.racks : [];
      for (var j = 0; j < racks.length; j++) {
        var r = racks[j];
        if (!r || !r.rackNo) continue;
        renderRack(r, rowMap[r.rackNo] || null);
      }
    }

    function loadTabletData() {
      fetch(API_URL + "?action=getScheduleTabletJson&t=" + new Date().getTime())
        .then(function(res) {
          return res.json();
        })
        .then(function(data) {
          renderTablet(data);
        })
        .catch(function() {
          document.getElementById("authCode").textContent = "ERR";
        });
    }

    document.getElementById("scanBtn").onclick = function() {
      location.href = "https://forestgym-tokyo.github.io/qr-checkin-scanner/";
    };

    window.onload = function() {
      loadTabletData();
      setInterval(loadTabletData, 5000);
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Workout Check-In</title>
  <style>
    :root{
      --bg:#050607;
      --panel:#0d1013;
      --panel2:#11151a;
      --line:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:rgba(255,255,255,.62);
      --green:#78c53a;
      --green2:#5fab24;
      --whiteBadge:#d9dde2;
      --orange:#d08a20;
      --blue:#3f82c8;
      --yellow:#d6b428;
      --danger:#d9534f;
      --shadow:0 14px 36px rgba(0,0,0,.34);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#060708 0%,#030405 100%);
      color:var(--text);
      font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
      overflow-x:hidden;
    }

    body{ min-height:100vh; }

    .app{
      width:100%;
      max-width:1400px;
      margin:0 auto;
      padding:10px 18px 10px;
    }

    .header{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:18px;
      align-items:center;
      margin-bottom:10px;
    }

    .logo-wrap{
      height:78px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      overflow:hidden;
    }

    .logo-wrap img{
      display:block;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .title-wrap{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:78px;
      min-width:0;
      padding:0 90px 0 0;
    }

    .title-main{
      margin:0;
      font-size:36px;
      line-height:1;
      font-weight:900;
      letter-spacing:.01em;
      text-align:center;
      white-space:nowrap;
    }

    .title-sub{
      margin-top:6px;
      font-size:15px;
      line-height:1.1;
      color:rgba(255,255,255,.78);
      font-weight:600;
      text-align:center;
      white-space:nowrap;
    }

    .top-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:8px;
    }

    .top-card{
      background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01)), var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:14px 18px;
      display:flex;
      align-items:center;
    }

    .access-card{
      min-height:118px;
      justify-content:flex-start;
    }

    .access-inner{
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }

    .access-label-row{
      display:flex;
      align-items:baseline;
      gap:8px;
      white-space:nowrap;
    }

    .card-ja{
      font-size:23px;
      line-height:1;
      font-weight:900;
      margin:0;
    }

    .card-en{
      font-size:14px;
      line-height:1;
      color:var(--green);
      font-weight:800;
      margin:0;
      letter-spacing:.02em;
    }

    .access-code{
      margin-top:8px;
      font-size:52px;
      line-height:1;
      font-weight:900;
      letter-spacing:.14em;
      color:var(--green);
      white-space:nowrap;
    }

    .access-date{
      margin-top:8px;
      font-size:18px;
      line-height:1;
      font-weight:600;
      color:rgba(255,255,255,.90);
    }

    .qr-card{
      min-height:112px;
      cursor:pointer;
      gap:16px;
      justify-content:flex-start;
    }

    .qr-card:active{ transform:scale(.997); }

    .qr-icon{
      width:54px;
      height:54px;
      flex:0 0 54px;
      color:#fff;
      opacity:.96;
    }

    .qr-ja{
      margin:0;
      font-size:28px;
      line-height:1.05;
      font-weight:900;
    }

    .qr-en{
      margin-top:6px;
      font-size:16px;
      line-height:1.05;
      color:var(--green);
      font-weight:800;
    }

    .update-row{
      min-height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:var(--muted);
      font-size:16px;
      line-height:1.1;
      font-weight:600;
      margin-bottom:8px;
      text-align:center;
    }

    .refresh-icon{
      width:18px;
      height:18px;
      color:var(--green);
      flex:0 0 18px;
    }

    .error-box{
      display:none;
      margin:0 0 10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(217,83,79,.12);
      border:1px solid rgba(217,83,79,.3);
      color:#ffd8d7;
      font-size:15px;
      font-weight:700;
    }

    .error-box.show{ display:block; }

    .rack-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .rack-card{
      background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01)), var(--panel2);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      height:370px;
      min-height:370px;
      padding:14px;
      display:flex;
      flex-direction:column;
    }

    .rack-card.state-free{ border-color:rgba(120,197,58,.28); }
    .rack-card.state-using{ border-color:rgba(255,255,255,.12); }
    .rack-card.state-reserved{ border-color:rgba(208,138,32,.34); }
    .rack-card.state-maintenance{ border-color:rgba(63,130,200,.34); }
    .rack-card.state-gap{ border-color:rgba(214,180,40,.34); }
    .rack-card.state-waiting{ border-color:rgba(120,197,58,.28); }

    .rack-top{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:16px;
      align-items:start;
      min-height:0;
    }

    .rack-visual{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:flex-start;
      min-width:0;
    }

    .rack-image-wrap{
      width:100%;
      min-height:160px;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .rack-image-wrap img{
      width:132px;
      height:132px;
      object-fit:contain;
      flex:0 0 132px;
    }

    .badge-under{
      width:100%;
      margin-top:14px;
      display:flex;
      justify-content:flex-start;
    }

    .badge{
      min-width:122px;
      min-height:54px;
      padding:8px 12px;
      border-radius:14px;
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:15px;
      line-height:1.05;
      font-weight:900;
      border:1px solid transparent;
      text-align:center;
      white-space:nowrap;
    }

    .badge-ja{ font-size:16px; line-height:1; font-weight:900; }
    .badge-en{ font-size:11px; line-height:1; font-weight:800; letter-spacing:.02em; opacity:.95; }

    .badge.free{ background:rgba(120,197,58,.16); color:#ebffd7; border-color:rgba(120,197,58,.3); }
    .badge.using{ background:rgba(255,255,255,.08); color:#f4f6f8; border-color:rgba(255,255,255,.14); }
    .badge.reserved{ background:rgba(208,138,32,.16); color:#ffe0ae; border-color:rgba(208,138,32,.3); }
    .badge.maintenance{ background:rgba(63,130,200,.16); color:#d8ebff; border-color:rgba(63,130,200,.3); }
    .badge.gap{ background:rgba(214,180,40,.16); color:#fff2ac; border-color:rgba(214,180,40,.3); }
    .badge.waiting{ background:rgba(120,197,58,.16); color:#ebffd7; border-color:rgba(120,197,58,.3); }

    .rack-info{
      min-width:0;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .label{
      font-size:14px;
      line-height:1.05;
      font-weight:800;
      margin:0 0 6px;
      letter-spacing:.01em;
    }

    .label.green{ color:var(--green); }
    .label.orange{ color:var(--orange); }
    .label.blue{ color:var(--blue); }
    .label.yellow{ color:var(--yellow); }
    .label.white{ color:var(--whiteBadge); }

    .status-main{
      font-size:24px;
      line-height:1.14;
      font-weight:900;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .status-sub{
      margin-top:6px;
      font-size:15px;
      line-height:1.2;
      font-weight:700;
      color:rgba(255,255,255,.86);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg, rgba(120,197,58,.38), rgba(255,255,255,.02));
      margin:10px 0 10px;
    }

    .schedule-main{
      font-size:22px;
      line-height:1.18;
      font-weight:900;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .schedule-sub{
      margin-top:4px;
      font-size:15px;
      line-height:1.2;
      font-weight:600;
      color:rgba(255,255,255,.86);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .waiting-row{ margin-top:10px; }

    .waiting-count{
      margin-top:4px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:20px;
      line-height:1.1;
      font-weight:900;
      color:#fff;
    }

    .person-icon{
      width:20px;
      height:20px;
      flex:0 0 20px;
      color:rgba(255,255,255,.78);
    }

    .note{
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid rgba(255,255,255,.08);
      font-size:13px;
      line-height:1.25;
      font-weight:600;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .bottom-actions{
      margin-top:auto;
      padding-top:12px;
    }

    .btn{
      appearance:none;
      border:0;
      border-radius:16px;
      cursor:pointer;
      font-weight:900;
      transition:transform .04s ease, opacity .15s ease;
    }

    .btn:active{ transform:scale(.995); }

    .btn-use{
      width:100%;
      min-height:66px;
      padding:10px 18px;
      background:linear-gradient(180deg,var(--green) 0%, var(--green2) 100%);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .btn-use-ja{
      font-size:22px;
      line-height:1;
      font-weight:900;
      text-align:left;
    }

    .btn-use-en{
      margin-top:3px;
      font-size:13px;
      line-height:1;
      font-weight:800;
      color:rgba(255,255,255,.92);
      text-align:left;
      letter-spacing:.02em;
    }

    .btn-arrow{
      font-size:34px;
      line-height:1;
      font-weight:900;
      opacity:.95;
    }

    .btn-queue{
      width:100%;
      min-height:54px;
      padding:10px 14px;
      background:rgba(255,255,255,.03);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .footer{
      min-height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.28);
      font-size:13px;
      line-height:1;
      letter-spacing:.04em;
      margin-top:8px;
    }

    @media (max-width:1200px){
      .header{ grid-template-columns:260px 1fr; }
      .title-wrap{ padding:0 70px 0 0; }
      .title-main{ font-size:32px; }
      .title-sub{ font-size:14px; }
      .rack-top{ grid-template-columns:160px 1fr; }
      .rack-image-wrap img{ width:118px; height:118px; flex-basis:118px; }
      .status-main{ font-size:22px; }
      .schedule-main{ font-size:20px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <img src="logo.png" alt="The Forest Gym Logo">
      </div>
      <div class="title-wrap">
        <h1 class="title-main">WORKOUT CHECK-IN</h1>
        <div class="title-sub">ラック予定一覧 / Rack Status Board</div>
      </div>
    </header>

    <section class="top-row">
      <div class="top-card access-card">
        <div class="access-inner">
          <div class="access-label-row">
            <div class="card-ja">

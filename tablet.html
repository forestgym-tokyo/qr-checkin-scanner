<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Check-In</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(180deg, #0b0f0d, #000);
  color: #fff;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px 8px;
}

.logo {
  font-size: 22px;
  font-weight: 700;
}
.logo span {
  color: #2ecc71;
}

.title {
  text-align: right;
}
.title h1 {
  margin: 0;
  font-size: 28px;
}
.title p {
  margin: 2px 0 0;
  font-size: 12px;
  color: #aaa;
}

/* ===== TOP PANELS ===== */
.top {
  display: flex;
  gap: 16px;
  padding: 10px 24px;
}

.card {
  flex: 1;
  background: #111;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid #1c1c1c;
}

/* 認証コード */
.code-number {
  font-size: 48px;
  color: #2ecc71;
  font-weight: bold;
}

.sub {
  color: #2ecc71;
  font-size: 12px;
}

/* QR */
.qr {
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* ===== UPDATE ===== */
.update {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin: 4px 0 10px;
}

/* ===== RACK GRID ===== */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 0 24px 20px;
}

/* ===== RACK CARD ===== */
.rack {
  background: #111;
  border-radius: 16px;
  padding: 16px;
  border: 1px solid #1c1c1c;
  display: flex;
  gap: 16px;
}

.rack img {
  width: 90px;
}

/* 情報 */
.info {
  flex: 1;
}

.status {
  color: #2ecc71;
  font-weight: bold;
  font-size: 18px;
}

.label {
  font-size: 11px;
  color: #2ecc71;
}

.next {
  font-size: 12px;
  color: #aaa;
}

/* ボタン */
.use-btn {
  margin-top: 12px;
  width: 100%;
  background: #2ecc71;
  border: none;
  color: #000;
  padding: 14px;
  border-radius: 14px;
  font-weight: bold;
  font-size: 16px;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  font-size: 11px;
  color: #666;
  padding-bottom: 10px;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="logo">The <span>Forest Gym</span></div>

  <div class="title">
    <h1>WORKOUT CHECK-IN</h1>
    <p>ラック予定一覧 / Rack Status Board</p>
  </div>
</div>

<!-- ===== TOP ===== -->
<div class="top">

  <!-- 認証コード -->
  <div class="card">
    <div>認証コード</div>
    <div class="sub">ACCESS CODE</div>
    <div class="code-number" id="authCode">----</div>
    <div id="todayLabel">----/--/--</div>
  </div>

  <!-- QR -->
  <div class="card qr" onclick="goQR()">
    <div>
      <div>QRでチェックイン</div>
      <div class="sub">CHECK IN WITH QR</div>
    </div>
  </div>

</div>

<div class="update" id="lastUpdated">更新中...</div>

<!-- ===== RACK GRID ===== -->
<div class="grid" id="rackGrid"></div>

<div class="footer">All rights reserved.</div>

<script>

const API_URL = "YOUR_GAS_URL";

/* ===== データ取得 ===== */
async function load() {
  try {
    const res = await fetch(API_URL + "?action=getscheduletabletjson&t=" + Date.now());
    const data = await res.json();

    document.getElementById("authCode").textContent = data.authCode;
    document.getElementById("todayLabel").textContent = data.todayLabel;
    document.getElementById("lastUpdated").textContent =
      "最終更新 / LAST UPDATED: " + new Date().toLocaleString();

    renderRacks(data.racks);

  } catch(e) {
    console.log("API ERROR", e);
  }
}

/* ===== ラック描画 ===== */
function renderRacks(racks) {

  const grid = document.getElementById("rackGrid");
  grid.innerHTML = "";

  racks.forEach(r => {

    const div = document.createElement("div");
    div.className = "rack";

    div.innerHTML = `
      <img src="rack${r.rackNo}.png">
      <div class="info">
        <div class="label">現在 / CURRENT</div>
        <div class="status">空いています<br>AVAILABLE</div>

        <div class="label" style="margin-top:8px;">次の予定 / NEXT</div>
        <div class="next">次の予定はありません<br>NO UPCOMING SCHEDULE</div>

        ${r.rackNo === 4 ? `
          <button class="use-btn" onclick="useNow(4)">
            すぐに利用<br>USE NOW
          </button>
        ` : ""}
      </div>
    `;

    grid.appendChild(div);
  });
}

/* ===== QR ===== */
function goQR() {
  location.href = "index.html";
}

/* ===== すぐ利用 ===== */
function useNow(no) {
  location.href = "checkin.html?rack=" + no;
}

/* ===== 初期 ===== */
load();
setInterval(load, 10000);

</script>

</body>
</html>

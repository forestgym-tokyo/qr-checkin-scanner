<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>WORKOUT CHECK-IN</title>
  <style>
    :root {
      --bg: #050607;
      --panel: #0b0d10;
      --panel-2: #0f1317;
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(124, 195, 56, 0.45);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.68);
      --muted-2: rgba(255,255,255,0.44);
      --green: #79c338;
      --green-2: #5ea526;
      --orange: #d28a1f;
      --blue: #4384c7;
      --red: #d9534f;
      --shadow: 0 12px 30px rgba(0,0,0,0.28);
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top center, rgba(121,195,56,0.08), transparent 32%),
        linear-gradient(180deg, #07090b 0%, #030405 100%);
      color: var(--text);
      font-family:
        "Noto Sans JP",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        system-ui,
        sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 22px 14px;
    }

    /* ===== HEADER ===== */
    .header {
      display: grid;
      grid-template-columns: 360px 1fr;
      align-items: center;
      gap: 18px;
      margin-bottom: 14px;
    }

    .logo-box {
      display: flex;
      align-items: center;
      min-height: 90px;
      padding: 10px 6px 10px 4px;
    }

    .logo-box img {
      display: block;
      width: 100%;
      max-width: 340px;
      height: auto;
      object-fit: contain;
    }

    .title-box {
      border-left: 1px solid rgba(255,255,255,0.18);
      padding-left: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 90px;
    }

    .title-main {
      margin: 0;
      font-size: 56px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .title-sub {
      margin-top: 10px;
      font-size: 24px;
      line-height: 1.15;
      color: rgba(255,255,255,0.90);
      font-weight: 500;
    }

    /* ===== TOP ROW ===== */
    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 10px;
    }

    .panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .top-panel {
      min-height: 150px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
    }

    .access-panel {
      justify-content: space-between;
      gap: 18px;
    }

    .access-left {
      min-width: 0;
    }

    .ja-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
      margin: 0 0 6px;
      letter-spacing: 0.01em;
    }

    .en-title {
      font-size: 18px;
      color: var(--green);
      line-height: 1.1;
      font-weight: 700;
      margin: 0 0 14px;
      letter-spacing: 0.01em;
    }

    .access-code {
      font-size: 88px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0.16em;
      color: var(--green);
      white-space: nowrap;
    }

    .access-date {
      margin-top: 14px;
      font-size: 26px;
      color: rgba(255,255,255,0.90);
      font-weight: 500;
    }

    .qr-panel {
      justify-content: flex-start;
      gap: 20px;
      cursor: pointer;
      user-select: none;
    }

    .qr-panel:active {
      transform: scale(0.998);
    }

    .qr-icon {
      width: 76px;
      height: 76px;
      flex: 0 0 76px;
      color: #fff;
      opacity: 0.96;
    }

    .qr-texts {
      min-width: 0;
    }

    .qr-ja {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .qr-en {
      margin-top: 8px;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.01em;
    }

    /* ===== UPDATE ===== */
    .update-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 34px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 20px;
      font-weight: 500;
      text-align: center;
    }

    .refresh-icon {
      width: 23px;
      height: 23px;
      color: var(--green);
      flex: 0 0 23px;
    }

    .error-banner {
      display: none;
      margin: 0 0 10px;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(217,83,79,0.12);
      color: #ffd4d3;
      border: 1px solid rgba(217,83,79,0.35);
      font-size: 18px;
      font-weight: 700;
    }

    .error-banner.show {
      display: block;
    }

    /* ===== GRID ===== */
    .rack-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .rack-card {
      min-height: 458px;
      padding: 16px 16px 14px;
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 16px;
      background:
        radial-gradient(circle at bottom left, rgba(121,195,56,0.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
        var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .rack-card.is-free {
      border-color: rgba(121,195,56,0.34);
    }

    .rack-card.is-reserved {
      border-color: rgba(210,138,31,0.42);
    }

    .rack-card.is-maintenance {
      border-color: rgba(67,132,199,0.42);
    }

    .rack-card.is-using {
      border-color: rgba(255,255,255,0.14);
    }

    .rack-card.is-gap {
      border-color: rgba(226, 197, 54, 0.42);
    }

    .rack-card.is-waiting {
      border-color: rgba(121,195,56,0.34);
    }

    .rack-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    .rack-visual img {
      display: block;
      width: 100%;
      max-width: 220px;
      max-height: 360px;
      object-fit: contain;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.32));
    }

    .rack-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .rack-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .rack-name {
      font-size: 34px;
      line-height: 1.05;
      font-weight: 900;
      white-space: nowrap;
    }

    .rack-name .rack-no {
      color: var(--green);
    }

    .state-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 118px;
      min-height: 50px;
      padding: 8px 16px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .state-free {
      background: rgba(121,195,56,0.18);
      color: #ebffd8;
      border-color: rgba(121,195,56,0.34);
    }

    .state-using {
      background: rgba(255,255,255,0.08);
      color: #f0f0f0;
      border-color: rgba(255,255,255,0.14);
    }

    .state-reserved {
      background: rgba(210,138,31,0.18);
      color: #ffdca6;
      border-color: rgba(210,138,31,0.36);
    }

    .state-maintenance {
      background: rgba(67,132,199,0.18);
      color: #cfe6ff;
      border-color: rgba(67,132,199,0.36);
    }

    .state-gap {
      background: rgba(226,197,54,0.18);
      color: #fff0a6;
      border-color: rgba(226,197,54,0.36);
    }

    .state-waiting {
      background: rgba(121,195,56,0.18);
      color: #ebffd8;
      border-color: rgba(121,195,56,0.34);
    }

    .meta-label {
      font-size: 17px;
      line-height: 1.1;
      font-weight: 700;
      margin: 12px 0 8px;
      letter-spacing: 0.01em;
    }

    .meta-label.green {
      color: var(--green);
    }

    .meta-label.orange {
      color: var(--orange);
    }

    .meta-label.blue {
      color: var(--blue);
    }

    .meta-value-main {
      font-size: 31px;
      line-height: 1.16;
      font-weight: 900;
      color: #fff;
      word-break: keep-all;
    }

    .meta-value-sub {
      margin-top: 7px;
      font-size: 18px;
      line-height: 1.28;
      color: rgba(255,255,255,0.92);
      font-weight: 500;
    }

    .divider {
      height: 1px;
      margin: 14px 0 10px;
      background: linear-gradient(90deg, rgba(121,195,56,0.44), rgba(255,255,255,0.02));
    }

    .schedule-block + .schedule-block {
      margin-top: 4px;
    }

    .schedule-main {
      font-size: 22px;
      line-height: 1.22;
      font-weight: 800;
      color: #fff;
      word-break: break-word;
    }

    .schedule-sub {
      margin-top: 3px;
      font-size: 16px;
      line-height: 1.3;
      color: var(--muted);
      font-weight: 500;
      word-break: break-word;
    }

    .waiting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: auto;
      padding-top: 14px;
    }

    .waiting-left {
      min-width: 0;
      flex: 1;
    }

    .waiting-count {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 700;
      color: #fff;
    }

    .waiting-icon {
      width: 24px;
      height: 24px;
      color: rgba(255,255,255,0.80);
      flex: 0 0 24px;
    }

    .action-button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      min-height: 60px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.04s ease, opacity 0.15s ease;
      white-space: nowrap;
    }

    .action-button:active {
      transform: scale(0.995);
    }

    .queue-button {
      min-width: 230px;
      background: rgba(255,255,255,0.03);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .use-button {
      width: 100%;
      min-height: 86px;
      margin-top: 12px;
      background: linear-gradient(180deg, #79c338 0%, #68ad2e 100%);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 22px;
    }

    .use-button-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      text-align: left;
    }

    .use-button-ja {
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      color: #fff;
    }

    .use-button-en {
      font-size: 17px;
      line-height: 1;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.02em;
    }

    .arrow {
      font-size: 42px;
      line-height: 1;
      font-weight: 700;
      opacity: 0.92;
    }

    .note-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 16px;
      line-height: 1.25;
      font-weight: 500;
    }

    .note-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      color: rgba(255,255,255,0.55);
    }

    /* ===== FOOTER ===== */
    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
      padding-top: 10px;
      color: rgba(255,255,255,0.34);
      font-size: 18px;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1180px) {
      .header {
        grid-template-columns: 300px 1fr;
      }

      .title-main {
        font-size: 46px;
      }

      .title-sub {
        font-size: 20px;
      }

      .top-panel {
        min-height: 136px;
      }

      .access-code {
        font-size: 72px;
      }

      .rack-card {
        grid-template-columns: 180px 1fr;
      }

      .rack-name {
        font-size: 30px;
      }

      .meta-value-main {
        font-size: 28px;
      }
    }

    @media (max-width: 980px) {
      .app {
        padding: 14px;
      }

      .header,
      .top-row,
      .rack-grid {
        grid-template-columns: 1fr;
      }

      .title-box {
        border-left: 0;
        border-top: 1px solid rgba(255,255,255,0.18);
        padding-left: 0;
        padding-top: 14px;
      }

      .rack-card {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-box">
        <img src="logo.png" alt="The Forest Gym" />
      </div>

      <div class="title-box">
        <h1 class="title-main">WORKOUT CHECK-IN</h1>
        <div class="title-sub">ラック予定一覧 / Rack Status Board</div>
      </div>
    </header>

    <section class="top-row">
      <div class="panel top-panel access-panel">
        <div class="access-left">
          <div class="ja-title">認証コード</div>
          <div class="en-title">ACCESS CODE</div>
          <div class="access-code" id="authCode">----</div>
          <div class="access-date" id="todayLabel">----/--/--</div>
        </div>
      </div>

      <div class="panel top-panel qr-panel" id="qrPanel" role="button" tabindex="0" aria-label="QRでチェックイン">
        <svg class="qr-icon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M9 23V11a2 2 0 0 1 2-2h12" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M55 23V11a2 2 0 0 0-2-2H41" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M9 41v12a2 2 0 0 0 2 2h12" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M55 41v12a2 2 0 0 1-2 2H41" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <rect x="18" y="18" width="10" height="10" stroke="currentColor" stroke-width="4"/>
          <rect x="36" y="18" width="10" height="10" stroke="currentColor" stroke-width="4"/>
          <rect x="18" y="36" width="10" height="10" stroke="currentColor" stroke-width="4"/>
          <path d="M38 36h8v8h-4m-8-4h4v8" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <div class="qr-texts">
          <div class="qr-ja">QRでチェックイン</div>
          <div class="qr-en">CHECK IN WITH QR</div>
        </div>
      </div>
    </section>

    <div class="update-row" id="updateRow">
      <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20 7v5h-5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 17v-5h5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.8 9.2A8 8 0 0 1 20 12" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        <path d="M17.2 14.8A8 8 0 0 1 4 12" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
      </svg>
      <div id="lastUpdated">最終更新 / LAST UPDATED: --</div>
    </div>

    <div id="errorBanner" class="error-banner"></div>

    <section class="rack-grid" id="rackGrid"></section>

    <footer class="footer">All rights reserved.</footer>
  </div>

  <script>
    const API_URL = "YOUR_GAS_WEBAPP_URL";
    const QR_PAGE_URL = "index.html";
    const CHECKIN_PAGE_URL = "checkin.html";
    const QUEUE_PAGE_URL = "queue.html";
    const REFRESH_MS = 15000;

    let refreshTimer = null;

    const stateMeta = {
      free: {
        badgeClass: "state-free",
        defaultBadgeText: "空き",
        cardClass: "is-free",
        currentLabelClass: "green",
        nextLabelClass: "green",
        afterNextLabelClass: "green",
        waitingLabelClass: "green"
      },
      using: {
        badgeClass: "state-using",
        defaultBadgeText: "利用中",
        cardClass: "is-using",
        currentLabelClass: "green",
        nextLabelClass: "green",
        afterNextLabelClass: "green",
        waitingLabelClass: "green"
      },
      reserved: {
        badgeClass: "state-reserved",
        defaultBadgeText: "予約あり",
        cardClass: "is-reserved",
        currentLabelClass: "green",
        nextLabelClass: "orange",
        afterNextLabelClass: "orange",
        waitingLabelClass: "orange"
      },
      maintenance: {
        badgeClass: "state-maintenance",
        defaultBadgeText: "メンテナンス中",
        cardClass: "is-maintenance",
        currentLabelClass: "blue",
        nextLabelClass: "blue",
        afterNextLabelClass: "blue",
        waitingLabelClass: "blue"
      },
      gap: {
        badgeClass: "state-gap",
        defaultBadgeText: "すき間利用可",
        cardClass: "is-gap",
        currentLabelClass: "green",
        nextLabelClass: "orange",
        afterNextLabelClass: "orange",
        waitingLabelClass: "green"
      },
      waiting: {
        badgeClass: "state-waiting",
        defaultBadgeText: "順番待ち",
        cardClass: "is-waiting",
        currentLabelClass: "green",
        nextLabelClass: "green",
        afterNextLabelClass: "green",
        waitingLabelClass: "green"
      }
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function nl2br(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");
    }

    function toText(value, fallback = "—") {
      const s = (value ?? "").toString().trim();
      return s ? s : fallback;
    }

    function showError(message) {
      const el = document.getElementById("errorBanner");
      el.textContent = message;
      el.classList.add("show");
    }

    function hideError() {
      const el = document.getElementById("errorBanner");
      el.textContent = "";
      el.classList.remove("show");
    }

    function formatLastUpdated(rawValue) {
      const s = (rawValue ?? "").toString().trim();
      if (s) return s;
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yyyy}/${mm}/${dd} ${hh}:${mi}`;
    }

    function getRackImagePath(rackNo) {
      return `rack${Number(rackNo)}.png`;
    }

    function normalizeRack(raw) {
      const state = (raw.state || "free").toString().trim().toLowerCase();
      const meta = stateMeta[state] || stateMeta.free;

      return {
        rackNo: Number(raw.rackNo) || 0,
        state,
        meta,
        badgeText: toText(raw.badgeText, meta.defaultBadgeText),

        currentText: toText(raw.currentText),
        currentSubText: toText(raw.currentSubText, ""),
        nextText: toText(raw.nextText),
        nextSubText: toText(raw.nextSubText, ""),
        afterNextText: toText(raw.afterNextText, ""),
        afterNextSubText: toText(raw.afterNextSubText, ""),

        waitingCount: Number.isFinite(Number(raw.waitingCount))
          ? Number(raw.waitingCount)
          : 0,

        noteText: toText(raw.noteText, ""),

        showUseNowButton: Boolean(raw.showUseNowButton),
        useNowLabelJa: toText(raw.useNowLabelJa, "すぐに利用"),
        useNowLabelEn: toText(raw.useNowLabelEn, "USE NOW"),

        showQueueButton: Boolean(raw.showQueueButton),
        queueButtonText: toText(raw.queueButtonText, "順番待ち一覧"),

        checkinUrl: toText(raw.checkinUrl, ""),
        queueUrl: toText(raw.queueUrl, ""),

        currentLabelJa: toText(raw.currentLabelJa, "現在"),
        currentLabelEn: toText(raw.currentLabelEn, "CURRENT"),
        nextLabelJa: toText(raw.nextLabelJa, "次の予定"),
        nextLabelEn: toText(raw.nextLabelEn, "NEXT"),
        afterNextLabelJa: toText(raw.afterNextLabelJa, "その次"),
        afterNextLabelEn: toText(raw.afterNextLabelEn, "AFTER NEXT"),
        waitingLabelJa: toText(raw.waitingLabelJa, "順番待ち"),
        waitingLabelEn: toText(raw.waitingLabelEn, "WAITING")
      };
    }

    function createNoteRow(noteText) {
      if (!noteText) return "";
      return `
        <div class="note-row">
          <svg class="note-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 10v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="7" r="1.2" fill="currentColor"/>
          </svg>
          <div>${nl2br(noteText)}</div>
        </div>
      `;
    }

    function createScheduleBlock(labelClass, labelJa, labelEn, mainText, subText) {
      const hasMain = mainText && mainText !== "—";
      const hasSub = !!subText;

      if (!hasMain && !hasSub) return "";

      return `
        <div class="schedule-block">
          <div class="meta-label ${labelClass}">
            ${escapeHtml(labelJa)} / ${escapeHtml(labelEn)}
          </div>
          <div class="schedule-main">${nl2br(mainText || "—")}</div>
          ${hasSub ? `<div class="schedule-sub">${nl2br(subText)}</div>` : ""}
        </div>
      `;
    }

    function renderRackCard(rawRack) {
      const rack = normalizeRack(rawRack);

      const canUseNow = rack.showUseNowButton && rack.state !== "maintenance";
      const canQueue = rack.showQueueButton && rack.state !== "maintenance";

      const useNowUrl = rack.checkinUrl || `${CHECKIN_PAGE_URL}?rackNo=${encodeURIComponent(rack.rackNo)}`;
      const queueUrl = rack.queueUrl || `${QUEUE_PAGE_URL}?rackNo=${encodeURIComponent(rack.rackNo)}`;

      const currentSub = rack.currentSubText;
      const nextText = rack.nextText === "—" ? "" : rack.nextText;
      const nextSub = rack.nextSubText;
      const afterNextText = rack.afterNextText;
      const afterNextSub = rack.afterNextSubText;
      const noteText = rack.noteText;

      return `
        <article class="panel rack-card ${rack.meta.cardClass}">
          <div class="rack-visual">
            <img
              src="${escapeHtml(getRackImagePath(rack.rackNo))}"
              alt="Rack ${escapeHtml(rack.rackNo)}"
              loading="eager"
            />
          </div>

          <div class="rack-body">
            <div class="rack-head">
              <div class="rack-name">ラック <span class="rack-no">No.${escapeHtml(rack.rackNo)}</span></div>
              <div class="state-badge ${rack.meta.badgeClass}">${escapeHtml(rack.badgeText)}</div>
            </div>

            <div class="meta-label ${rack.meta.currentLabelClass}">
              ${escapeHtml(rack.currentLabelJa)} / ${escapeHtml(rack.currentLabelEn)}
            </div>
            <div class="meta-value-main">${nl2br(rack.currentText)}</div>
            ${currentSub ? `<div class="meta-value-sub">${nl2br(currentSub)}</div>` : ""}

            <div class="divider"></div>

            ${createScheduleBlock(
              rack.meta.nextLabelClass,
              rack.nextLabelJa,
              rack.nextLabelEn,
              nextText,
              nextSub
            )}

            ${createScheduleBlock(
              rack.meta.afterNextLabelClass,
              rack.afterNextLabelJa,
              rack.afterNextLabelEn,
              afterNextText,
              afterNextSub
            )}

            ${
              canUseNow
                ? `
                  <button class="action-button use-button" type="button" data-action="use-now" data-url="${escapeHtml(useNowUrl)}">
                    <span class="use-button-text">
                      <span class="use-button-ja">${escapeHtml(rack.useNowLabelJa)}</span>
                      <span class="use-button-en">${escapeHtml(rack.useNowLabelEn)}</span>
                    </span>
                    <span class="arrow">›</span>
                  </button>
                `
                : ""
            }

            <div class="waiting-row">
              <div class="waiting-left">
                <div class="meta-label ${rack.meta.waitingLabelClass}">
                  ${escapeHtml(rack.waitingLabelJa)} / ${escapeHtml(rack.waitingLabelEn)}
                </div>
                <div class="waiting-count">
                  <svg class="waiting-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.14 0-7.5 2.46-7.5 5.5A1.5 1.5 0 0 0 6 21h12a1.5 1.5 0 0 0 1.5-1.5C19.5 16.46 16.14 14 12 14Z"/>
                  </svg>
                  <span>${escapeHtml(rack.waitingCount)}名</span>
                </div>
              </div>

              ${
                canQueue
                  ? `
                    <button class="action-button queue-button" type="button" data-action="queue" data-url="${escapeHtml(queueUrl)}">
                      <span>${escapeHtml(rack.queueButtonText)}</span>
                      <span>›</span>
                    </button>
                  `
                  : ""
              }
            </div>

            ${createNoteRow(noteText)}
          </div>
        </article>
      `;
    }

    function renderAll(data) {
      document.getElementById("authCode").textContent = toText(data.authCode, "----");
      document.getElementById("todayLabel").textContent = toText(data.todayLabel, "----/--/--");
      document.getElementById("lastUpdated").textContent =
        `最終更新 / LAST UPDATED: ${formatLastUpdated(data.lastUpdatedText)}`;

      const racks = Array.isArray(data.racks) ? data.racks : [];
      const sortedRacks = [...racks].sort((a, b) => (Number(a.rackNo) || 0) - (Number(b.rackNo) || 0));

      const html = sortedRacks.map(renderRackCard).join("");
      document.getElementById("rackGrid").innerHTML = html;
    }

    async function fetchScheduleJson() {
      const url = `${API_URL}?action=getscheduletabletjson&t=${Date.now()}`;
      const res = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const data = await res.json();
      if (!data || typeof data !== "object") {
        throw new Error("JSONが不正です");
      }

      return data;
    }

    async function loadData() {
      try {
        hideError();
        const data = await fetchScheduleJson();
        renderAll(data);
      } catch (err) {
        console.error(err);
        showError("データ取得失敗。通信状態またはGASレスポンスをご確認ください。");
      }
    }

    function goToQrPage() {
      window.location.href = QR_PAGE_URL;
    }

    function setupEvents() {
      const qrPanel = document.getElementById("qrPanel");

      qrPanel.addEventListener("click", goToQrPage);
      qrPanel.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          goToQrPage();
        }
      });

      document.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;

        const url = btn.getAttribute("data-url");
        if (!url) return;

        if (btn.dataset.action === "use-now" || btn.dataset.action === "queue") {
          window.location.href = url;
        }
      });
    }

    async function init() {
      setupEvents();
      await loadData();

      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(loadData, REFRESH_MS);
    }

    init();
  </script>
</body>
</html>

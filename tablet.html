<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

  function getStatusClass(state) {
    if (state === "free") return "free";
    if (state === "using") return "using";
    if (state === "reserved") return "reserved";
    return "other";
  }

  function buildRackText(r) {
    const currentText = (r.currentText || "").trim();
    const nextText = (r.nextText || "").trim();
    const rackLabel = r.rackLabel || ("ラック" + r.rackNo);

    if (currentText && nextText) return currentText + "\n" + nextText;
    if (currentText) return currentText;
    if (nextText) return nextText;
    return rackLabel;
  }

  function renderTablet(data) {
    const authEl = document.getElementById("authCode");
    if (authEl) authEl.textContent = data.authCode || "----";

    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById("rack" + i);
      if (!el) continue;
      el.textContent = "ラック" + i;
      el.className = "rack other";
      el.style.whiteSpace = "pre-line";
    }

    (data.racks || []).forEach(r => {
      const el = document.getElementById("rack" + r.rackNo);
      if (!el) return;

      el.textContent = buildRackText(r);
      el.className = "rack " + getStatusClass(r.state);
    });
  }

  async function loadTabletData() {
    try {
      const res = await fetch(API_URL + "?action=getScheduleTabletJson&t=" + Date.now());
      const data = await res.json();
      renderTablet(data);
    } catch (err) {
      console.error(err);
      const authEl = document.getElementById("authCode");
      if (authEl) authEl.textContent = "ERR";
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    loadTabletData();
    setInterval(loadTabletData, 5000);
  });
</script>

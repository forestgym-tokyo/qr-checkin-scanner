<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Rack Schedule Tablet</title>
  <style>
    :root {
      --bg-1: #07090d;
      --bg-2: #0b1016;
      --bg-3: #111823;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.2);
      --text: rgba(255, 255, 255, 0.96);
      --text-soft: rgba(255, 255, 255, 0.72);
      --text-faint: rgba(255, 255, 255, 0.5);

      --free: #d8dde5;
      --using: #7ea7d8;
      --reserved: #c6a56b;

      --chip-free-bg: rgba(216, 221, 229, 0.08);
      --chip-using-bg: rgba(126, 167, 216, 0.1);
      --chip-reserved-bg: rgba(198, 165, 107, 0.12);

      --card-shadow:
        0 12px 38px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255,255,255,0.06);
      --glass-blur: blur(18px);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --header-h: 118px;
      --queue-col-w: 390px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06) 0%, transparent 28%),
        radial-gradient(circle at top right, rgba(126,167,216,0.08) 0%, transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3));
      color: var(--text);
      font-family:
        "Noto Sans JP",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Segoe UI",
        sans-serif;
      user-select: none;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.28;
      z-index: 0;
    }

    body::before {
      width: 34vw;
      height: 34vw;
      left: -8vw;
      top: -8vw;
      background: rgba(126, 167, 216, 0.12);
    }

    body::after {
      width: 26vw;
      height: 26vw;
      right: -8vw;
      bottom: -8vw;
      background: rgba(198, 165, 107, 0.1);
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 18px;
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      gap: 16px;
    }

    .glass {
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.1),
        rgba(255,255,255,0.045)
      );
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }

    .header {
      display: grid;
      grid-template-columns: 300px 1fr 260px;
      gap: 16px;
      align-items: stretch;
    }

    .auth-card,
    .title-card,
    .action-card {
      border-radius: var(--radius-xl);
      padding: 18px 22px;
      min-height: 0;
    }

    .auth-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .auth-card::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
      pointer-events: none;
    }

    .auth-label-ja {
      font-size: 14px;
      letter-spacing: 0.12em;
      color: var(--text-soft);
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .auth-label-en {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-faint);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .auth-code {
      margin-top: 8px;
      font-size: 44px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .today-label {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-soft);
      font-variant-numeric: tabular-nums;
    }

    .title-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      min-width: 0;
    }

    .main-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.1;
      white-space: nowrap;
    }

    .sub-title {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .meta-row {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      font-size: 13px;
      color: var(--text-soft);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .meta-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      margin-right: 8px;
      flex: 0 0 auto;
    }

    .meta-dot.ok {
      background: var(--using);
      box-shadow: 0 0 8px rgba(126, 167, 216, 0.22);
    }

    .meta-dot.warn {
      background: var(--reserved);
      box-shadow: 0 0 8px rgba(198, 165, 107, 0.2);
    }

    .action-card {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-button {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 10px 26px rgba(0,0,0,0.28);
      transition:
        transform 0.14s ease,
        border-color 0.14s ease,
        background 0.14s ease;
    }

    .qr-button:active {
      transform: scale(0.985);
    }

    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--queue-col-w);
      gap: 16px;
    }

    .left-pane,
    .right-pane {
      min-height: 0;
      border-radius: 28px;
      padding: 18px;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .section-caption {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .racks-grid {
      height: calc(100% - 40px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 16px;
      min-height: 0;
    }

    .rack-card {
      position: relative;
      border-radius: 24px;
      padding: 20px;
      border: 1px solid var(--line);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.085), rgba(255,255,255,0.04));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 12px 28px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }

    .rack-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.06), transparent 35%);
      pointer-events: none;
    }

    .rack-card.free {
      border-color: rgba(216, 221, 229, 0.18);
      background:
        linear-gradient(180deg, rgba(216,221,229,0.09), rgba(255,255,255,0.03));
    }

    .rack-card.using {
      border-color: rgba(126, 167, 216, 0.22);
      background:
        linear-gradient(180deg, rgba(126,167,216,0.13), rgba(255,255,255,0.03));
    }

    .rack-card.reserved {
      border-color: rgba(198, 165, 107, 0.24);
      background:
        linear-gradient(180deg, rgba(198,165,107,0.14), rgba(255,255,255,0.03));
    }

    .rack-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .rack-no-wrap {
      min-width: 0;
    }

    .rack-label {
      font-size: 12px;
      letter-spacing: 0.16em;
      color: var(--text-faint);
      text-transform: uppercase;
    }

    .rack-no {
      margin-top: 6px;
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--text);
      white-space: nowrap;
    }

    .state-chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .state-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .state-chip.free {
      color: var(--free);
      background: var(--chip-free-bg);
      border-color: rgba(216,221,229,0.18);
    }

    .state-chip.free .dot {
      background: var(--free);
    }

    .state-chip.using {
      color: var(--using);
      background: var(--chip-using-bg);
      border-color: rgba(126,167,216,0.2);
    }

    .state-chip.using .dot {
      background: var(--using);
      box-shadow: 0 0 8px rgba(126,167,216,0.2);
    }

    .state-chip.reserved {
      color: var(--reserved);
      background: var(--chip-reserved-bg);
      border-color: rgba(198,165,107,0.2);
    }

    .state-chip.reserved .dot {
      background: var(--reserved);
      box-shadow: 0 0 8px rgba(198,165,107,0.18);
    }

    .rack-main {
      margin-top: 18px;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .rack-status-main {
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .rack-card.free .rack-status-main {
      color: rgba(255,255,255,0.94);
    }

    .rack-card.using .rack-status-main {
      color: #d7e6f8;
    }

    .rack-card.reserved .rack-status-main {
      color: #ecd8b3;
    }

    .rack-sub {
      min-height: 26px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-soft);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .rack-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .rack-foot-label {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .rack-foot-value {
      font-size: 13px;
      color: var(--text-soft);
      text-align: right;
      line-height: 1.4;
    }

    .queue-list {
      height: calc(100% - 40px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .queue-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .queue-card {
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      padding: 16px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 10px 24px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .queue-card.free-now {
      border-color: rgba(216,221,229,0.18);
    }

    .queue-card.gap {
      border-color: rgba(126,167,216,0.18);
    }

    .queue-card.wait {
      border-color: rgba(198,165,107,0.2);
    }

    .queue-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .queue-rack {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .queue-kind {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .queue-kind.use-now {
      color: var(--free);
      background: rgba(216,221,229,0.09);
      border: 1px solid rgba(216,221,229,0.18);
    }

    .queue-kind.gap {
      color: var(--using);
      background: rgba(126,167,216,0.1);
      border: 1px solid rgba(126,167,216,0.18);
    }

    .queue-kind.wait {
      color: var(--reserved);
      background: rgba(198,165,107,0.12);
      border: 1px solid rgba(198,165,107,0.18);
    }

    .queue-main {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .queue-title {
      font-size: 24px;
      line-height: 1.25;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .queue-time {
      font-size: 16px;
      line-height: 1.45;
      color: var(--text-soft);
      font-variant-numeric: tabular-nums;
    }

    .queue-note {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-faint);
    }

    .empty-box {
      flex: 1 1 auto;
      border-radius: 22px;
      border: 1px dashed rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 22px;
      color: var(--text-soft);
      font-size: 18px;
      line-height: 1.7;
    }

    .footer-status {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 10px;
      color: var(--text-faint);
      font-size: 12px;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
    }

    .error-banner {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(90, 24, 24, 0.82);
      border: 1px solid rgba(255, 120, 120, 0.22);
      color: #ffe5e5;
      font-size: 14px;
      line-height: 1.5;
      display: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: rgba(7,9,13,0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .loading.show {
      opacity: 1;
    }

    .loading-chip {
      min-width: 180px;
      height: 54px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(18, 24, 34, 0.7);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 14px;
      letter-spacing: 0.08em;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      border-top-color: rgba(255,255,255,0.75);
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (orientation: portrait) {
      :root {
        --header-h: 240px;
      }

      .app {
        padding: 14px;
        grid-template-rows: var(--header-h) 1fr;
        gap: 14px;
      }

      .header {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }

      .auth-card,
      .title-card,
      .action-card {
        padding: 16px 18px;
      }

      .auth-code {
        font-size: 42px;
      }

      .main-title {
        font-size: 28px;
      }

      .content {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }

      .left-pane {
        min-height: 0;
      }

      .right-pane {
        min-height: 280px;
      }

      .queue-scroll {
        overflow: auto;
      }
    }

    @media (max-width: 1200px) {
      :root {
        --queue-col-w: 340px;
      }

      .rack-no {
        font-size: 30px;
      }

      .rack-status-main {
        font-size: 24px;
      }

      .queue-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <section class="auth-card glass">
        <div class="auth-label-ja">認証コード</div>
        <div class="auth-label-en">ACCESS CODE</div>
        <div class="auth-code" id="authCode">----</div>
        <div class="today-label" id="todayLabel">----/--/--</div>
      </section>

      <section class="title-card glass">
        <div class="title-row">
          <div class="main-title">ラック利用状況</div>
          <div class="sub-title">Rack Status Board</div>
        </div>
        <div class="meta-row">
          <div class="meta-chip">
            <span class="meta-dot ok"></span>
            <span>4 RACK DISPLAY</span>
          </div>
          <div class="meta-chip">
            <span class="meta-dot warn"></span>
            <span>QUEUE UI</span>
          </div>
          <div class="meta-chip">
            <span>TABLET MODE</span>
          </div>
        </div>
      </section>

      <section class="action-card glass">
        <button class="qr-button" id="qrButton" type="button">QR 読み込み</button>
      </section>
    </header>

    <main class="content">
      <section class="left-pane glass">
        <div class="section-head">
          <div class="section-title">RACK STATUS</div>
          <div class="section-caption">LIVE DISPLAY</div>
        </div>
        <div class="racks-grid" id="racksGrid"></div>
      </section>

      <aside class="right-pane glass">
        <div class="section-head">
          <div class="section-title">QUEUE MENU</div>
          <div class="section-caption">USE NOW / GAP / WAIT</div>
        </div>
        <div class="queue-list">
          <div class="queue-scroll" id="queueScroll"></div>
          <div class="footer-status">
            <div id="lastUpdated">LAST UPDATE --:--:--</div>
            <div id="apiModeLabel">LIVE</div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <div class="loading" id="loading">
    <div class="loading-chip">
      <span class="spinner"></span>
      <span>LOADING</span>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <script>
    /************************************************************
     * 必要設定
     ************************************************************/
    const API_URL =
      ""; // 例: "https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXX/exec?action=getScheduleTabletJson"

    const QR_PAGE_URL =
      ""; // 例: "https://forestgym-tokyo.github.io/qr-checkin-scanner/"

    /************************************************************
     * オプション
     ************************************************************/
    const AUTO_REFRESH_MS = 15000;
    const REQUEST_TIMEOUT_MS = 10000;
    const SHOW_MOCK_WHEN_API_EMPTY = true;

    /************************************************************
     * モック（API_URL未設定時の表示確認用）
     ************************************************************/
    const MOCK_DATA = {
      authCode: "0901",
      todayLabel: "2026/04/20",
      racks: [
        { rackNo: 1, state: "free", currentText: "", nextText: "" },
        { rackNo: 2, state: "using", currentText: "利用中 ～21:00", nextText: "" },
        { rackNo: 3, state: "reserved", currentText: "21:20より予約", nextText: "次回利用可能 22:00～" },
        { rackNo: 4, state: "free", currentText: "すぐ利用可能", nextText: "" }
      ],
      queueUiRows: [
        {
          rackNo: 1,
          showUseNowButton: true,
          useNowStartText: "20:50",
          useNowEndText: "23:59"
        },
        {
          rackNo: 3,
          showGapUseButton: true,
          gapUseStartText: "21:00",
          gapUseEndText: "21:20"
        },
        {
          rackNo: 2,
          showWaitButton: true,
          waitStartText: "21:00",
          waitEndText: "21:40"
        }
      ]
    };

    /************************************************************
     * DOM
     ************************************************************/
    const $authCode = document.getElementById("authCode");
    const $todayLabel = document.getElementById("todayLabel");
    const $racksGrid = document.getElementById("racksGrid");
    const $queueScroll = document.getElementById("queueScroll");
    const $lastUpdated = document.getElementById("lastUpdated");
    const $apiModeLabel = document.getElementById("apiModeLabel");
    const $loading = document.getElementById("loading");
    const $errorBanner = document.getElementById("errorBanner");
    const $qrButton = document.getElementById("qrButton");

    let refreshTimer = null;
    let firstLoadDone = false;

    /************************************************************
     * 初期化
     ************************************************************/
    init();

    function init() {
      bindEvents();
      loadAndRender();
      startAutoRefresh();
    }

    function bindEvents() {
      $qrButton.addEventListener("click", function () {
        if (QR_PAGE_URL && QR_PAGE_URL.trim()) {
          location.href = QR_PAGE_URL;
          return;
        }
        showError("QRページURLが未設定です。QR_PAGE_URL を設定してください。");
      });

      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          stopAutoRefresh();
        } else {
          loadAndRender();
          startAutoRefresh();
        }
      });
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(loadAndRender, AUTO_REFRESH_MS);
    }

    function stopAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    /************************************************************
     * データ取得
     ************************************************************/
    async function loadAndRender() {
      setLoading(true);
      hideError();

      try {
        const data = await fetchTabletData();
        renderAll(normalizeData(data));
        updateLastUpdated();
      } catch (err) {
        console.error(err);
        if (!firstLoadDone && SHOW_MOCK_WHEN_API_EMPTY) {
          renderAll(normalizeData(MOCK_DATA));
          updateLastUpdated();
          $apiModeLabel.textContent = "MOCK";
        }
        showError(err && err.message ? err.message : "データ取得に失敗しました。");
      } finally {
        setLoading(false);
        firstLoadDone = true;
      }
    }

    async function fetchTabletData() {
      const apiUrl = getApiUrl();

      if (!apiUrl) {
        if (SHOW_MOCK_WHEN_API_EMPTY) {
          return MOCK_DATA;
        }
        throw new Error("API_URL が未設定です。");
      }

      const controller = new AbortController();
      const timer = setTimeout(function () {
        controller.abort();
      }, REQUEST_TIMEOUT_MS);

      try {
        const url = addNoCache(apiUrl);
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store",
          signal: controller.signal
        });

        if (!res.ok) {
          throw new Error("APIエラー: " + res.status);
        }

        const json = await res.json();
        $apiModeLabel.textContent = "LIVE";
        return json;
      } catch (err) {
        if (err.name === "AbortError") {
          throw new Error("通信がタイムアウトしました。");
        }
        throw err;
      } finally {
        clearTimeout(timer);
      }
    }

    function getApiUrl() {
      const qp = new URLSearchParams(location.search);
      const apiParam = qp.get("api");
      if (apiParam) return apiParam;
      if (API_URL && API_URL.trim()) return API_URL.trim();
      return "";
    }

    function addNoCache(url) {
      const joiner = url.includes("?") ? "&" : "?";
      return url + joiner + "t=" + Date.now();
    }

    /************************************************************
     * 正規化
     ************************************************************/
    function normalizeData(src) {
      const data = src || {};

      const racks = Array.isArray(data.racks) ? data.racks.slice() : [];
      const rackMap = new Map();

      racks.forEach(function (r) {
        const rackNo = Number(r && r.rackNo);
        if (!rackNo) return;
        rackMap.set(rackNo, {
          rackNo: rackNo,
          state: normalizeState(r && r.state),
          currentText: str(r && r.currentText),
          nextText: str(r && r.nextText)
        });
      });

      for (let i = 1; i <= 4; i++) {
        if (!rackMap.has(i)) {
          rackMap.set(i, {
            rackNo: i,
            state: "free",
            currentText: "",
            nextText: ""
          });
        }
      }

      const normalizedRacks = Array.from(rackMap.values()).sort(function (a, b) {
        return a.rackNo - b.rackNo;
      });

      return {
        authCode: str(data.authCode) || "----",
        todayLabel: str(data.todayLabel) || formatToday(),
        racks: normalizedRacks,
        queueUiRows: Array.isArray(data.queueUiRows) ? data.queueUiRows : []
      };
    }

    function normalizeState(state) {
      const s = String(state || "").toLowerCase();
      if (s === "using") return "using";
      if (s === "reserved") return "reserved";
      return "free";
    }

    function str(v) {
      return v == null ? "" : String(v);
    }

    /************************************************************
     * 描画
     ************************************************************/
    function renderAll(data) {
      renderHeader(data);
      renderRacks(data.racks);
      renderQueue(data.queueUiRows);
    }

    function renderHeader(data) {
      $authCode.textContent = data.authCode || "----";
      $todayLabel.textContent = data.todayLabel || formatToday();
    }

    function renderRacks(racks) {
      $racksGrid.innerHTML = "";

      racks.forEach(function (rack) {
        const card = document.createElement("section");
        card.className = "rack-card " + rack.state;

        const stateLabel = getStateLabel(rack.state);
        const mainText = getRackMainText(rack);
        const subText = getRackSubText(rack);

        card.innerHTML = `
          <div class="rack-top">
            <div class="rack-no-wrap">
              <div class="rack-label">Rack</div>
              <div class="rack-no">ラック ${escapeHtml(String(rack.rackNo))}</div>
            </div>
            <div class="state-chip ${escapeHtml(rack.state)}">
              <span class="dot"></span>
              <span>${escapeHtml(stateLabel)}</span>
            </div>
          </div>

          <div class="rack-main">
            <div class="rack-status-main">${escapeHtml(mainText)}</div>
            <div class="rack-sub">${escapeHtml(subText)}</div>
          </div>

          <div class="rack-foot">
            <div class="rack-foot-label">STATUS DETAIL</div>
            <div class="rack-foot-value">${escapeHtml(buildFootText(rack))}</div>
          </div>
        `;

        $racksGrid.appendChild(card);
      });
    }

    function renderQueue(queueUiRows) {
      $queueScroll.innerHTML = "";

      const cards = [];

      queueUiRows.forEach(function (row) {
        const rackNo = Number(row && row.rackNo) || "-";

        if (row && row.showUseNowButton) {
          cards.push(
            buildQueueCard({
              rackNo: rackNo,
              cardClass: "free-now",
              kindClass: "use-now",
              kindLabel: "USE NOW",
              title: "すぐ利用",
              timeText: buildTimeRange(row.useNowStartText, row.useNowEndText),
              note: "今すぐ利用できる枠です。"
            })
          );
        }

        if (row && row.showGapUseButton) {
          cards.push(
            buildQueueCard({
              rackNo: rackNo,
              cardClass: "gap",
              kindClass: "gap",
              kindLabel: "GAP",
              title: "すき間利用",
              timeText: buildTimeRange(row.gapUseStartText, row.gapUseEndText),
              note: "40分未満の空き時間を利用できます。"
            })
          );
        }

        if (row && row.showWaitButton) {
          cards.push(
            buildQueueCard({
              rackNo: rackNo,
              cardClass: "wait",
              kindClass: "wait",
              kindLabel: "WAIT",
              title: "順番待ち",
              timeText: buildTimeRange(row.waitStartText, row.waitEndText),
              note: "次の利用可能枠のご案内です。"
            })
          );
        }
      });

      if (!cards.length) {
        const empty = document.createElement("div");
        empty.className = "empty-box";
        empty.innerHTML = `
          <div>
            <div style="font-size:20px; font-weight:700; margin-bottom:8px;">表示中の案内はありません</div>
            <div style="font-size:15px; color:rgba(255,255,255,0.58);">ラックの利用状況をご確認ください</div>
          </div>
        `;
        $queueScroll.appendChild(empty);
        return;
      }

      cards.forEach(function (el) {
        $queueScroll.appendChild(el);
      });
    }

    function buildQueueCard(opt) {
      const card = document.createElement("section");
      card.className = "queue-card " + opt.cardClass;
      card.innerHTML = `
        <div class="queue-top">
          <div class="queue-rack">ラック ${escapeHtml(String(opt.rackNo))}</div>
          <div class="queue-kind ${escapeHtml(opt.kindClass)}">${escapeHtml(opt.kindLabel)}</div>
        </div>
        <div class="queue-main">
          <div class="queue-title">${escapeHtml(opt.title)}</div>
          <div class="queue-time">${escapeHtml(opt.timeText || "時間未設定")}</div>
          <div class="queue-note">${escapeHtml(opt.note || "")}</div>
        </div>
      `;
      return card;
    }

    /************************************************************
     * 文言生成
     ************************************************************/
    function getStateLabel(state) {
      if (state === "using") return "利用中";
      if (state === "reserved") return "予約";
      return "空き";
    }

    function getRackMainText(rack) {
      if (rack.state === "using") {
        return rack.currentText || "利用中";
      }
      if (rack.state === "reserved") {
        return rack.currentText || "予約あり";
      }
      return rack.currentText || "すぐ利用可能";
    }

    function getRackSubText(rack) {
      if (rack.nextText) return rack.nextText;
      if (rack.state === "using") return "利用終了後にご案内されます";
      if (rack.state === "reserved") return "開始時刻前の予約枠です";
      return "現在ご利用いただけます";
    }

    function buildFootText(rack) {
      const parts = [];
      if (rack.currentText) parts.push(rack.currentText);
      if (rack.nextText) parts.push(rack.nextText);
      if (!parts.length) {
        if (rack.state === "using") return "利用中";
        if (rack.state === "reserved") return "予約あり";
        return "空きあり";
      }
      return parts.join(" / ");
    }

    function buildTimeRange(start, end) {
      const s = str(start);
      const e = str(end);
      if (s && e) return s + " ～ " + e;
      if (s) return s + " ～";
      if (e) return "～ " + e;
      return "";
    }

    /************************************************************
     * 補助
     ************************************************************/
    function setLoading(show) {
      $loading.classList.toggle("show", !!show);
    }

    function showError(msg) {
      $errorBanner.textContent = msg;
      $errorBanner.style.display = "block";
    }

    function hideError() {
      $errorBanner.style.display = "none";
      $errorBanner.textContent = "";
    }

    function updateLastUpdated() {
      const now = new Date();
      $lastUpdated.textContent = "LAST UPDATE " + hhmmss(now);
    }

    function hhmmss(d) {
      const h = String(d.getHours()).padStart(2, "0");
      const m = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return h + ":" + m + ":" + s;
    }

    function formatToday() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return y + "/" + m + "/" + day;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>

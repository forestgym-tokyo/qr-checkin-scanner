<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Workout Check-In</title>
  <style>
    :root{
      --bg:#050607;
      --panel:#0d1013;
      --panel2:#11151a;
      --line:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:rgba(255,255,255,.62);
      --muted2:rgba(255,255,255,.42);
      --green:#78c53a;
      --green2:#5fab24;
      --whiteBadge:#d9dde2;
      --orange:#d08a20;
      --blue:#3f82c8;
      --yellow:#d6b428;
      --danger:#d9534f;
      --radius:24px;
      --shadow:0 14px 36px rgba(0,0,0,.34);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#060708 0%,#030405 100%);
      color:var(--text);
      font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
    }

    .app{
      width:100%;
      max-width:1400px;
      margin:0 auto;
      padding:10px 18px 10px;
    }

    /* ===== HEADER ===== */
    .header{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:18px;
      align-items:center;
      margin-bottom:10px;
    }

    .logo-wrap{
      height:78px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      overflow:hidden;
    }

    .logo-wrap img{
      display:block;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .title-wrap{
      display:flex;
      flex-direction:column;
      justify-content:center;
      border-left:1px solid rgba(255,255,255,.12);
      padding-left:22px;
      height:78px;
    }

    .title-main{
      margin:0;
      font-size:46px;
      line-height:1;
      font-weight:900;
      letter-spacing:.02em;
    }

    .title-sub{
      margin-top:6px;
      font-size:20px;
      line-height:1.1;
      color:rgba(255,255,255,.78);
      font-weight:600;
    }

    /* ===== TOP ===== */
    .top-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:8px;
    }

    .top-card{
      background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01)), var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      height:112px;
      min-height:112px;
      padding:14px 18px;
      display:flex;
      align-items:center;
    }

    .access-card{
      justify-content:space-between;
      gap:14px;
    }

    .card-ja{
      font-size:24px;
      line-height:1.05;
      font-weight:900;
      margin:0 0 4px;
    }

    .card-en{
      font-size:15px;
      line-height:1.05;
      color:var(--green);
      font-weight:800;
      margin:0;
      letter-spacing:.02em;
    }

    .access-code{
      margin-top:8px;
      font-size:60px;
      line-height:1;
      font-weight:900;
      letter-spacing:.18em;
      color:var(--green);
      white-space:nowrap;
    }

    .access-date{
      margin-top:8px;
      font-size:21px;
      line-height:1.05;
      font-weight:600;
      color:rgba(255,255,255,.90);
    }

    .qr-card{
      cursor:pointer;
      gap:16px;
      justify-content:flex-start;
    }

    .qr-card:active{
      transform:scale(.997);
    }

    .qr-icon{
      width:54px;
      height:54px;
      flex:0 0 54px;
      color:#fff;
      opacity:.96;
    }

    .qr-ja{
      margin:0;
      font-size:28px;
      line-height:1.05;
      font-weight:900;
    }

    .qr-en{
      margin-top:6px;
      font-size:16px;
      line-height:1.05;
      color:var(--green);
      font-weight:800;
    }

    /* ===== UPDATE ===== */
    .update-row{
      min-height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:var(--muted);
      font-size:16px;
      line-height:1.1;
      font-weight:600;
      margin-bottom:8px;
      text-align:center;
    }

    .refresh-icon{
      width:18px;
      height:18px;
      color:var(--green);
      flex:0 0 18px;
    }

    .error-box{
      display:none;
      margin:0 0 10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(217,83,79,.12);
      border:1px solid rgba(217,83,79,.3);
      color:#ffd8d7;
      font-size:15px;
      font-weight:700;
    }

    .error-box.show{
      display:block;
    }

    /* ===== GRID ===== */
    .rack-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .rack-card{
      background:
        linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01)),
        var(--panel2);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      min-height:372px;
      padding:14px;
      display:grid;
      grid-template-columns:170px 1fr;
      gap:14px;
    }

    .rack-card.state-free{ border-color:rgba(120,197,58,.28); }
    .rack-card.state-using{ border-color:rgba(255,255,255,.12); }
    .rack-card.state-reserved{ border-color:rgba(208,138,32,.34); }
    .rack-card.state-maintenance{ border-color:rgba(63,130,200,.34); }
    .rack-card.state-gap{ border-color:rgba(214,180,40,.34); }
    .rack-card.state-waiting{ border-color:rgba(120,197,58,.28); }

    .rack-left{
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:0;
    }

    .rack-left img{
      display:block;
      width:100%;
      max-width:160px;
      max-height:320px;
      object-fit:contain;
    }

    .rack-right{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .rack-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }

    .rack-title{
      font-size:28px;
      line-height:1.05;
      font-weight:900;
      white-space:nowrap;
    }

    .rack-title .no{
      color:var(--green);
    }

    .badge{
      min-width:108px;
      min-height:42px;
      padding:8px 12px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      line-height:1;
      font-weight:900;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .badge.free{
      background:rgba(120,197,58,.16);
      color:#ebffd7;
      border-color:rgba(120,197,58,.3);
    }
    .badge.using{
      background:rgba(255,255,255,.08);
      color:#f4f6f8;
      border-color:rgba(255,255,255,.14);
    }
    .badge.reserved{
      background:rgba(208,138,32,.16);
      color:#ffe0ae;
      border-color:rgba(208,138,32,.3);
    }
    .badge.maintenance{
      background:rgba(63,130,200,.16);
      color:#d8ebff;
      border-color:rgba(63,130,200,.3);
    }
    .badge.gap{
      background:rgba(214,180,40,.16);
      color:#fff2ac;
      border-color:rgba(214,180,40,.3);
    }
    .badge.waiting{
      background:rgba(120,197,58,.16);
      color:#ebffd7;
      border-color:rgba(120,197,58,.3);
    }

    .section{
      margin-top:8px;
    }

    .label{
      font-size:14px;
      line-height:1.05;
      font-weight:800;
      margin-bottom:6px;
      letter-spacing:.01em;
    }

    .label.green{ color:var(--green); }
    .label.orange{ color:var(--orange); }
    .label.blue{ color:var(--blue); }
    .label.yellow{ color:var(--yellow); }
    .label.white{ color:var(--whiteBadge); }

    .main-line{
      font-size:25px;
      line-height:1.14;
      font-weight:900;
      color:#fff;
      word-break:break-word;
    }

    .sub-line{
      margin-top:4px;
      font-size:15px;
      line-height:1.3;
      font-weight:600;
      color:rgba(255,255,255,.86);
      word-break:break-word;
      white-space:pre-line;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg, rgba(120,197,58,.38), rgba(255,255,255,.02));
      margin:10px 0 8px;
    }

    .waiting-row{
      margin-top:auto;
    }

    .waiting-count{
      margin-top:4px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:20px;
      line-height:1.1;
      font-weight:900;
      color:#fff;
    }

    .person-icon{
      width:20px;
      height:20px;
      flex:0 0 20px;
      color:rgba(255,255,255,.78);
    }

    .note{
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid rgba(255,255,255,.08);
      font-size:14px;
      line-height:1.28;
      font-weight:600;
      color:var(--muted);
      white-space:pre-line;
    }

    .actions{
      margin-top:10px;
    }

    .btn{
      appearance:none;
      border:0;
      border-radius:16px;
      cursor:pointer;
      font-weight:900;
      transition:transform .04s ease, opacity .15s ease;
    }

    .btn:active{
      transform:scale(.995);
    }

    .btn-use{
      width:100%;
      min-height:70px;
      padding:10px 18px;
      background:linear-gradient(180deg,var(--green) 0%, var(--green2) 100%);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .btn-use-ja{
      font-size:24px;
      line-height:1;
      font-weight:900;
      text-align:left;
    }

    .btn-use-en{
      margin-top:3px;
      font-size:14px;
      line-height:1;
      font-weight:800;
      color:rgba(255,255,255,.92);
      text-align:left;
      letter-spacing:.02em;
    }

    .btn-arrow{
      font-size:34px;
      line-height:1;
      font-weight:900;
      opacity:.95;
    }

    .btn-queue{
      width:100%;
      min-height:54px;
      padding:10px 14px;
      margin-top:8px;
      background:rgba(255,255,255,.03);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .footer{
      min-height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.28);
      font-size:13px;
      line-height:1;
      letter-spacing:.04em;
      margin-top:8px;
    }

    @media (max-width:1200px){
      .app{
        max-width:100%;
      }
      .header{
        grid-template-columns:300px 1fr;
      }
      .title-main{
        font-size:40px;
      }
      .rack-card{
        grid-template-columns:145px 1fr;
      }
      .main-line{
        font-size:22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <img src="logo.png" alt="The Forest Gym Logo">
      </div>
      <div class="title-wrap">
        <h1 class="title-main">WORKOUT CHECK-IN</h1>
        <div class="title-sub">ラック予定一覧 / Rack Status Board</div>
      </div>
    </header>

    <section class="top-row">
      <div class="top-card access-card">
        <div>
          <div class="card-ja">認証コード</div>
          <div class="card-en">ACCESS CODE</div>
          <div class="access-code" id="authCode">----</div>
          <div class="access-date" id="todayLabel">----/--/--</div>
        </div>
      </div>

      <div class="top-card qr-card" id="qrCard" role="button" tabindex="0" aria-label="QRでチェックイン">
        <svg class="qr-icon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M10 23V12a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M54 23V12a2 2 0 0 0-2-2H41" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M10 41v11a2 2 0 0 0 2 2h11" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M54 41v11a2 2 0 0 1-2 2H41" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <rect x="18" y="18" width="10" height="10" stroke="currentColor" stroke-width="4"/>
          <rect x="36" y="18" width="10" height="10" stroke="currentColor" stroke-width="4"/>
          <rect x="18" y="36" width="10" height="10" stroke="currentColor" stroke-width="4"/>
          <path d="M36 36h10v10h-5m-7-5h5v10" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <div class="qr-ja">QRでチェックイン</div>
          <div class="qr-en">CHECK IN WITH QR</div>
        </div>
      </div>
    </section>

    <div class="update-row">
      <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20 7v5h-5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 17v-5h5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.8 9.2A8 8 0 0 1 20 12" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        <path d="M17.2 14.8A8 8 0 0 1 4 12" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
      </svg>
      <div id="lastUpdated">最終更新 / LAST UPDATED: --</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <section class="rack-grid" id="rackGrid"></section>

    <footer class="footer">All rights reserved.</footer>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
    const QR_PAGE_URL = "index.html";
    const CHECKIN_PAGE_URL = "checkin.html";
    const QUEUE_PAGE_URL = "queue.html";
    const REFRESH_MS = 15000;

    const STATE_UI = {
      free: {
        badgeClass: "free",
        badgeText: "空き",
        cardClass: "state-free",
        currentLabelClass: "green",
        nextLabelClass: "green",
        afterNextLabelClass: "green",
        waitingLabelClass: "green"
      },
      using: {
        badgeClass: "using",
        badgeText: "利用中",
        cardClass: "state-using",
        currentLabelClass: "white",
        nextLabelClass: "green",
        afterNextLabelClass: "green",
        waitingLabelClass: "white"
      },
      reserved: {
        badgeClass: "reserved",
        badgeText: "予約あり",
        cardClass: "state-reserved",
        currentLabelClass: "orange",
        nextLabelClass: "orange",
        afterNextLabelClass: "orange",
        waitingLabelClass: "orange"
      },
      maintenance: {
        badgeClass: "maintenance",
        badgeText: "メンテ中",
        cardClass: "state-maintenance",
        currentLabelClass: "blue",
        nextLabelClass: "blue",
        afterNextLabelClass: "blue",
        waitingLabelClass: "blue"
      },
      gap: {
        badgeClass: "gap",
        badgeText: "すき間利用可",
        cardClass: "state-gap",
        currentLabelClass: "yellow",
        nextLabelClass: "orange",
        afterNextLabelClass: "orange",
        waitingLabelClass: "yellow"
      },
      waiting: {
        badgeClass: "waiting",
        badgeText: "順番待ち",
        cardClass: "state-waiting",
        currentLabelClass: "green",
        nextLabelClass: "green",
        afterNextLabelClass: "green",
        waitingLabelClass: "green"
      }
    };

    function esc(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function withBr(str) {
      return esc(str).replace(/\n/g, "<br>");
    }

    function txt(v, fallback = "—") {
      const s = String(v ?? "").trim();
      return s ? s : fallback;
    }

    function showError(msg) {
      const el = document.getElementById("errorBox");
      el.textContent = msg;
      el.classList.add("show");
    }

    function hideError() {
      const el = document.getElementById("errorBox");
      el.textContent = "";
      el.classList.remove("show");
    }

    function normalizeRack(raw) {
      const state = String(raw.state || "free").toLowerCase().trim();
      const ui = STATE_UI[state] || STATE_UI.free;

      return {
        rackNo: Number(raw.rackNo) || 0,
        state,
        ui,
        badgeText: txt(raw.badgeText, ui.badgeText),

        currentLabelJa: txt(raw.currentLabelJa, "現在"),
        currentLabelEn: txt(raw.currentLabelEn, "CURRENT"),
        currentText: txt(raw.currentText),
        currentSubText: txt(raw.currentSubText, ""),

        nextLabelJa: txt(raw.nextLabelJa, "次の予定"),
        nextLabelEn: txt(raw.nextLabelEn, "NEXT"),
        nextText: txt(raw.nextText, ""),
        nextSubText: txt(raw.nextSubText, ""),

        afterNextLabelJa: txt(raw.afterNextLabelJa, "その次"),
        afterNextLabelEn: txt(raw.afterNextLabelEn, "AFTER NEXT"),
        afterNextText: txt(raw.afterNextText, ""),
        afterNextSubText: txt(raw.afterNextSubText, ""),

        waitingLabelJa: txt(raw.waitingLabelJa, "順番待ち"),
        waitingLabelEn: txt(raw.waitingLabelEn, "WAITING"),
        waitingCount: Number.isFinite(Number(raw.waitingCount)) ? Number(raw.waitingCount) : 0,

        noteText: txt(raw.noteText, ""),

        showUseNowButton: Boolean(raw.showUseNowButton),
        useNowLabelJa: txt(raw.useNowLabelJa, "すぐに利用"),
        useNowLabelEn: txt(raw.useNowLabelEn, "USE NOW"),

        showQueueButton: Boolean(raw.showQueueButton),
        queueButtonText: txt(raw.queueButtonText, "順番待ち"),

        checkinUrl: txt(raw.checkinUrl, ""),
        queueUrl: txt(raw.queueUrl, "")
      };
    }

    function scheduleBlock(labelClass, labelJa, labelEn, mainText, subText) {
      const hasMain = !!String(mainText || "").trim();
      const hasSub = !!String(subText || "").trim();
      if (!hasMain && !hasSub) return "";

      return `
        <div class="section">
          <div class="label ${labelClass}">${esc(labelJa)} / ${esc(labelEn)}</div>
          ${hasMain ? `<div class="main-line">${withBr(mainText)}</div>` : ""}
          ${hasSub ? `<div class="sub-line">${withBr(subText)}</div>` : ""}
        </div>
      `;
    }

    function renderRack(raw) {
      const r = normalizeRack(raw);

      const checkinUrl = r.checkinUrl || `${CHECKIN_PAGE_URL}?rackNo=${encodeURIComponent(r.rackNo)}`;
      const queueUrl = r.queueUrl || `${QUEUE_PAGE_URL}?rackNo=${encodeURIComponent(r.rackNo)}`;

      const useButton = (r.showUseNowButton && r.state !== "maintenance")
        ? `
          <div class="actions">
            <button class="btn btn-use" data-url="${esc(checkinUrl)}" data-kind="use">
              <div>
                <div class="btn-use-ja">${esc(r.useNowLabelJa)}</div>
                <div class="btn-use-en">${esc(r.useNowLabelEn)}</div>
              </div>
              <div class="btn-arrow">›</div>
            </button>
          </div>
        `
        : "";

      const queueButton = (r.showQueueButton && r.state !== "maintenance")
        ? `
          <button class="btn btn-queue" data-url="${esc(queueUrl)}" data-kind="queue">
            <span>${esc(r.queueButtonText)}</span>
            <span>›</span>
          </button>
        `
        : "";

      return `
        <article class="rack-card ${r.ui.cardClass}">
          <div class="rack-left">
            <img src="rack${r.rackNo}.png?t=1" alt="Rack ${r.rackNo}">
          </div>

          <div class="rack-right">
            <div class="rack-head">
              <div class="rack-title">№<span class="no">${r.rackNo}</span></div>
              <div class="badge ${r.ui.badgeClass}">${esc(r.badgeText)}</div>
            </div>

            <div class="section">
              <div class="label ${r.ui.currentLabelClass}">
                ${esc(r.currentLabelJa)} / ${esc(r.currentLabelEn)}
              </div>
              <div class="main-line">${withBr(r.currentText)}</div>
              ${r.currentSubText ? `<div class="sub-line">${withBr(r.currentSubText)}</div>` : ""}
            </div>

            <div class="divider"></div>

            ${scheduleBlock(
              r.ui.nextLabelClass,
              r.nextLabelJa,
              r.nextLabelEn,
              r.nextText,
              r.nextSubText
            )}

            ${scheduleBlock(
              r.ui.afterNextLabelClass,
              r.afterNextLabelJa,
              r.afterNextLabelEn,
              r.afterNextText,
              r.afterNextSubText
            )}

            <div class="waiting-row">
              <div class="section">
                <div class="label ${r.ui.waitingLabelClass}">
                  ${esc(r.waitingLabelJa)} / ${esc(r.waitingLabelEn)}
                </div>
                <div class="waiting-count">
                  <svg class="person-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.14 0-7.5 2.46-7.5 5.5A1.5 1.5 0 0 0 6 21h12a1.5 1.5 0 0 0 1.5-1.5C19.5 16.46 16.14 14 12 14Z"/>
                  </svg>
                  <span>${r.waitingCount}名</span>
                </div>
              </div>

              ${queueButton ? `<div class="actions">${queueButton}</div>` : ""}
            </div>

            ${r.noteText ? `<div class="note">${withBr(r.noteText)}</div>` : ""}

            ${useButton}
          </div>
        </article>
      `;
    }

    function renderAll(data) {
      document.getElementById("authCode").textContent = txt(data.authCode, "----");
      document.getElementById("todayLabel").textContent = txt(data.todayLabel, "----/--/--");
      document.getElementById("lastUpdated").textContent =
        `最終更新 / LAST UPDATED: ${txt(data.lastUpdatedText, "--")}`;

      const racks = Array.isArray(data.racks) ? data.racks.slice() : [];
      racks.sort((a, b) => (Number(a.rackNo) || 0) - (Number(b.rackNo) || 0));

      document.getElementById("rackGrid").innerHTML = racks.map(renderRack).join("");
    }

    async function fetchData() {
      const res = await fetch(`${API_URL}?action=getscheduletabletjson&t=${Date.now()}`, {
        method: "GET",
        cache: "no-store"
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data || typeof data !== "object") throw new Error("invalid json");
      return data;
    }

    async function loadData() {
      try {
        hideError();
        const data = await fetchData();
        renderAll(data);
      } catch (e) {
        console.error(e);
        showError("データ取得失敗。GASレスポンスまたは通信状態をご確認ください。");
      }
    }

    function setupEvents() {
      const qrCard = document.getElementById("qrCard");

      qrCard.addEventListener("click", () => {
        location.href = QR_PAGE_URL;
      });

      qrCard.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          location.href = QR_PAGE_URL;
        }
      });

      document.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-url]");
        if (!btn) return;
        const url = btn.getAttribute("data-url");
        if (!url) return;
        location.href = url;
      });
    }

    setupEvents();
    loadData();
    setInterval(loadData, REFRESH_MS);
  </script>
</body>
</html>

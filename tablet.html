<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Workout Check-in</title>
  <style>
    :root{
      --bg:#05070b;
      --panel:#0b1018;
      --panel2:#101826;
      --line:#79d900;
      --line-soft:rgba(121,217,0,.55);
      --text:#ffffff;
      --muted:#a9b0bb;
      --green:#79f000;
      --green2:#5fd100;
      --orange:#ffad33;
      --orange2:#8a5a16;
      --blueBtn:#1b2436;
      --shadow:0 0 0 1px rgba(255,255,255,.05) inset;
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:var(--text);
      font-family:
        "Segoe UI","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      background:
        radial-gradient(circle at top, #0f1724 0%, #05070b 45%, #000 100%);
    }

    .app{
      width:min(100vw, 800px);
      min-height:100vh;
      padding:18px 18px 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .topbar{
      display:grid;
      grid-template-columns: 180px 1fr 180px;
      align-items:center;
      gap:10px;
    }

    .logo-wrap{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      min-height:86px;
    }

    .logo{
      line-height:1;
      user-select:none;
    }

    .logo .leaf{
      color:#8CF000;
      font-size:38px;
      display:inline-block;
      margin-right:2px;
      transform:translateY(2px);
    }

    .logo .the{
      font-size:30px;
      font-weight:800;
      color:#fff;
      display:inline-block;
      vertical-align:top;
      margin-left:2px;
    }

    .logo .forest{
      font-size:30px;
      font-weight:900;
      color:#7AF000;
      margin-top:2px;
    }

    .logo .gym{
      font-size:30px;
      font-weight:900;
      color:#fff;
      margin-left:2px;
    }

    .logo .sub{
      font-size:15px;
      color:#d7dbdf;
      margin-top:6px;
      margin-left:26px;
      font-weight:700;
    }

    .title-wrap{
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .title{
      font-size:28px;
      font-weight:900;
      letter-spacing:.5px;
      margin:0;
      text-align:center;
      width:100%;
    }

    .subtitle{
      margin-top:4px;
      font-size:14px;
      color:#eef2f5;
      font-weight:800;
      text-align:center;
      width:100%;
    }

    .topbar-spacer{
      min-height:1px;
    }

    .hero{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    .hero-box{
      background:linear-gradient(180deg, rgba(16,24,37,.96), rgba(8,12,20,.96));
      border:1.5px solid rgba(255,255,255,.12);
      border-radius:24px;
      min-height:112px;
      padding:16px 18px;
      box-shadow:var(--shadow);
    }

    .code-title,
    .qr-title{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
      font-size:18px;
      margin-bottom:8px;
    }

    .en-green{
      color:var(--green);
      font-size:14px;
      font-weight:900;
    }

    .code-value{
      color:var(--green);
      font-size:54px;
      line-height:1;
      font-weight:900;
      letter-spacing:3px;
      margin:8px 0 6px;
    }

    .date{
      color:#f4f6f8;
      font-size:16px;
      font-weight:800;
    }

    .qr-box-btn{
      width:100%;
      height:100%;
      background:none;
      border:none;
      color:#fff;
      padding:0;
      margin:0;
      cursor:pointer;
      text-align:left;
    }

    .qr-inner{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      height:100%;
      min-height:78px;
    }

    .qr-icon{
      font-size:42px;
      line-height:1;
    }

    .qr-main-ja{
      font-size:26px;
      font-weight:900;
      line-height:1.15;
    }

    .qr-main-en{
      font-size:14px;
      color:var(--green);
      font-weight:900;
      margin-top:6px;
    }

    .updated{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:#d9dee3;
      font-weight:900;
      font-size:14px;
      margin:2px 0 0;
      text-align:center;
    }

    .updated .icon{
      color:var(--green);
      font-size:18px;
    }

    .rack-grid{
      flex:1;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      align-content:start;
    }

    .rack-card{
      background:linear-gradient(180deg, rgba(8,15,24,.98), rgba(7,12,20,.98));
      border:1.8px solid var(--line-soft);
      border-radius:28px;
      padding:18px 18px 16px;
      box-shadow:
        0 0 0 1px rgba(121,217,0,.14) inset,
        0 8px 30px rgba(0,0,0,.25);
      display:flex;
      flex-direction:column;
      min-height:335px;
    }

    .rack-top{
      display:grid;
      grid-template-columns: 155px 1fr;
      gap:18px;
      align-items:start;
    }

    /* ここが今回の最重要 */
    .rack-left{
      width:155px;
      display:flex;
      flex-direction:column;
      align-items:center;   /* アイコンとステータスラベルを同じ中心線に乗せる */
      justify-content:flex-start;
      gap:18px;
      padding-top:2px;
    }

    .rack-icon{
      width:150px;
      height:150px;
      object-fit:contain;
      display:block;
      margin:0 auto;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,.45));
    }

    .status-pill{
      width:122px;                /* 固定幅 */
      min-height:58px;
      border-radius:16px;
      display:flex;
      flex-direction:column;
      align-items:center;         /* 中央揃え */
      justify-content:center;     /* 中央揃え */
      text-align:center;
      font-weight:900;
      line-height:1.05;
      padding:8px 8px 7px;
      margin:0 auto;              /* 左カラム中央 */
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .status-pill .ja{
      font-size:15px;
      margin-bottom:3px;
    }

    .status-pill .en{
      font-size:10px;
      letter-spacing:.4px;
      opacity:.97;
    }

    .status-free{
      background:linear-gradient(180deg, #3e6d21, #2f541a);
      color:#fff;
    }

    .status-reserved{
      background:linear-gradient(180deg, #7a5826, #5a4019);
      color:#fff;
    }

    .status-using{
      background:linear-gradient(180deg, #325f25, #264a1b);
      color:#fff;
    }

    .rack-info{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:flex-start;
      padding-top:2px;
    }

    .section-label{
      font-size:14px;
      font-weight:900;
      margin-bottom:2px;
    }

    .section-label.green{
      color:var(--green);
    }

    .section-label.orange{
      color:var(--orange);
    }

    .big-status{
      font-size:26px;
      line-height:1.12;
      font-weight:900;
      margin-bottom:6px;
    }

    .substatus{
      font-size:15px;
      font-weight:800;
      color:#f3f5f7;
      line-height:1.25;
      margin-bottom:16px;
    }

    .next-main{
      font-size:20px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:2px;
    }

    .next-sub{
      font-size:15px;
      font-weight:900;
      line-height:1.25;
      margin-bottom:14px;
    }

    .waiting-row{
      display:flex;
      align-items:flex-end;
      gap:8px;
      margin:0 0 8px;
    }

    .waiting-icon{
      font-size:18px;
      line-height:1;
      transform:translateY(-2px);
    }

    .waiting-count{
      font-size:22px;
      font-weight:900;
      line-height:1;
    }

    .note{
      font-size:13px;
      color:#d8dde2;
      line-height:1.25;
      opacity:.92;
    }

    .rack-actions{
      margin-top:auto;
      padding-top:16px;
    }

    .action-btn{
      width:100%;
      min-height:62px;
      border:none;
      border-radius:18px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 22px 0 24px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.1),
        0 6px 16px rgba(0,0,0,.25);
    }

    .action-btn .btn-ja{
      font-size:18px;
      font-weight:900;
      line-height:1.05;
      text-align:left;
    }

    .action-btn .btn-en{
      font-size:11px;
      font-weight:900;
      opacity:.95;
      margin-top:4px;
      text-align:left;
    }

    .action-btn .arrow{
      font-size:28px;
      line-height:1;
      font-weight:900;
      opacity:.95;
    }

    .btn-green{
      background:linear-gradient(180deg, #82f100, #67cf00);
      color:#fff;
    }

    .btn-dark{
      background:linear-gradient(180deg, #1d2740, #172033);
      color:#fff;
    }

    .footer{
      text-align:center;
      color:#dfe4e8;
      font-size:13px;
      font-weight:700;
      padding:2px 0 0;
      margin-top:0;
      opacity:.9;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width: 760px){
      .app{
        width:100vw;
        padding:14px 12px 8px;
      }

      .topbar{
        grid-template-columns: 1fr;
        gap:8px;
      }

      .logo-wrap,
      .topbar-spacer{
        display:none;
      }

      .title{
        font-size:26px;
      }

      .hero,
      .rack-grid{
        grid-template-columns:1fr;
      }

      .rack-top{
        grid-template-columns:130px 1fr;
      }

      .rack-left{
        width:130px;
      }

      .rack-icon{
        width:124px;
        height:124px;
      }

      .status-pill{
        width:110px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo-wrap">
        <div class="logo">
          <div>
            <span class="leaf">🍃</span><span class="the">The</span>
          </div>
          <div><span class="forest">Forest</span> <span class="gym">Gym</span></div>
          <div class="sub">24h Fitness</div>
        </div>
      </div>

      <div class="title-wrap">
        <h1 class="title">WORKOUT CHECK-IN</h1>
        <div class="subtitle">ラック予定一覧 / Rack Status Board</div>
      </div>

      <div class="topbar-spacer"></div>
    </header>

    <section class="hero">
      <div class="hero-box">
        <div class="code-title">
          <span>認証コード</span>
          <span class="en-green">/ ACCESS CODE</span>
        </div>
        <div id="authCode" class="code-value">----</div>
        <div id="todayLabel" class="date">----/--/--</div>
      </div>

      <div class="hero-box">
        <button class="qr-box-btn" onclick="goQrPage()">
          <div class="qr-inner">
            <div class="qr-icon">▣</div>
            <div>
              <div class="qr-main-ja">QRでチェックイン</div>
              <div class="qr-main-en">CHECK IN WITH QR</div>
            </div>
          </div>
        </button>
      </div>
    </section>

    <div class="updated">
      <span class="icon">⟳</span>
      <span id="updatedText">最終更新 / LAST UPDATED: ----/--/-- --:--</span>
    </div>

    <main id="rackGrid" class="rack-grid"></main>

    <footer class="footer">All rights reserved. A-nauts.</footer>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
    const QR_URL = "https://forestgym-tokyo.github.io/qr-checkin-scanner/index.html";

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function rackImageUrl(rackNo){
      return `https://forestgym-tokyo.github.io/qr-checkin-scanner/assets/rack${rackNo}.png`;
    }

    function goQrPage(){
      window.location.href = QR_URL + "?t=" + Date.now();
    }

    function goCheckin(rackNo){
      window.location.href = `https://forestgym-tokyo.github.io/qr-checkin-scanner/checkin.html?rackNo=${encodeURIComponent(rackNo)}&t=${Date.now()}`;
    }

    function goQueue(rackNo){
      window.location.href = `https://forestgym-tokyo.github.io/qr-checkin-scanner/queue.html?rackNo=${encodeURIComponent(rackNo)}&t=${Date.now()}`;
    }

    function normalizeRackState(rack){
      const state = String(rack.state || "").toLowerCase();
      const current = String(rack.currentText || "");
      const next = String(rack.nextText || "");

      if (state.includes("using")) return "using";
      if (state.includes("reserved")) return "reserved";
      if (current.includes("利用中")) return "using";
      if (current.includes("空いています")) return "free";
      if (current.includes("後から") || current.includes("予定")) return "reserved";
      if (next.includes("PERSONAL")) return "reserved";
      return "free";
    }

    function buildStatusPill(state){
      if(state === "reserved"){
        return `
          <div class="status-pill status-reserved">
            <div class="ja">予定があります</div>
            <div class="en">RESERVED SOON</div>
          </div>
        `;
      }
      if(state === "using"){
        return `
          <div class="status-pill status-using">
            <div class="ja">利用中</div>
            <div class="en">IN USE</div>
          </div>
        `;
      }
      return `
        <div class="status-pill status-free">
          <div class="ja">空き</div>
          <div class="en">AVAILABLE</div>
        </div>
      `;
    }

    function buildActionButton(rack, state){
      const rackNo = rack.rackNo;
      const showUseNow = !!rack.showUseNowButton || state === "free";
      const showQueue = !!rack.showQueueButton || state !== "free";

      if(showUseNow){
        return `
          <button class="action-btn btn-green" onclick="goCheckin(${rackNo})">
            <div>
              <div class="btn-ja">すぐに利用</div>
              <div class="btn-en">USE NOW</div>
            </div>
            <div class="arrow">›</div>
          </button>
        `;
      }

      if(showQueue){
        return `
          <button class="action-btn btn-dark" onclick="goQueue(${rackNo})">
            <div>
              <div class="btn-ja">順番待ち</div>
            </div>
            <div class="arrow">›</div>
          </button>
        `;
      }

      return `
        <button class="action-btn btn-dark" onclick="goQueue(${rackNo})">
          <div>
            <div class="btn-ja">順番待ち</div>
          </div>
          <div class="arrow">›</div>
        </button>
      `;
    }

    function renderRackCard(rack){
      const state = normalizeRackState(rack);
      const isReserved = state === "reserved";

      const currentText = escapeHtml(rack.currentText || "空いています");
      const nextText = escapeHtml(rack.nextText || "予定なし");
      const waitingCount = Number(rack.waitingCount || 0);

      const currentLabelClass = isReserved ? "orange" : "green";
      const nextLabelClass = isReserved ? "orange" : "green";

      const noteText = isReserved
        ? (rack.bottomNote || "Available until the next...")
        : (rack.bottomNote || "本日この後の予定はあ...");

      return `
        <section class="rack-card">
          <div class="rack-top">
            <div class="rack-left">
              <img
                class="rack-icon"
                src="${rackImageUrl(rack.rackNo)}"
                alt="Rack ${rack.rackNo}"
                onerror="this.style.display='none'"
              />
              ${buildStatusPill(state)}
            </div>

            <div class="rack-info">
              <div class="section-label ${currentLabelClass}">現在 / CURRENT</div>
              <div class="big-status">${currentText}</div>
              <div class="substatus">${escapeHtml(rack.currentSubText || "本日の後続予定なし")}</div>

              <div class="section-label ${nextLabelClass}">次の予定 / NEXT</div>
              <div class="next-main">${nextText}</div>
              <div class="next-sub">${escapeHtml(rack.nextSubText || "")}</div>

              <div class="section-label ${nextLabelClass}">順番待ち / WAITING</div>
              <div class="waiting-row">
                <div class="waiting-icon">👤</div>
                <div class="waiting-count">${waitingCount}名</div>
              </div>

              <div class="note">${escapeHtml(noteText)}</div>
            </div>
          </div>

          <div class="rack-actions">
            ${buildActionButton(rack, state)}
          </div>
        </section>
      `;
    }

    function renderScreen(data){
      document.getElementById("authCode").textContent = data.authCode || "----";
      document.getElementById("todayLabel").textContent = data.todayLabel || "----/--/--";
      document.getElementById("updatedText").textContent =
        "最終更新 / LAST UPDATED: " + (data.lastUpdated || data.updatedAt || "----/--/-- --:--");

      const racks = Array.isArray(data.racks) ? data.racks : [];
      const grid = document.getElementById("rackGrid");
      grid.innerHTML = racks.map(renderRackCard).join("");
    }

    async function fetchSchedule(){
      try{
        const url = API_URL + "?action=getscheduletabletjson&t=" + Date.now();
        const res = await fetch(url, { cache: "no-store" });
        if(!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        renderScreen(data);
      }catch(err){
        console.error(err);
        document.getElementById("rackGrid").innerHTML = `
          <section class="rack-card" style="grid-column:1 / -1; min-height:180px;">
            <div class="big-status">表示データの取得に失敗しました</div>
            <div class="substatus">Failed to load schedule data.</div>
          </section>
        `;
      }
    }

    fetchSchedule();
    setInterval(fetchSchedule, 15000);
  </script>
</body>
</html>

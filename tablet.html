<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Workout Check-in</title>
  <style>
    :root{
      --bg:#06080d;
      --panel:#0b111b;
      --panel2:#101827;
      --line:#6ee600;
      --line-soft:rgba(110,230,0,.55);
      --line-softer:rgba(110,230,0,.18);
      --text:#ffffff;
      --muted:#cfd6dd;
      --green:#83f500;
      --green-dark:#416f23;
      --green-dark-2:#2f5318;
      --orange:#ffb03b;
      --orange-dark:#7a5826;
      --orange-dark-2:#5a4019;
      --btn-dark:#1a2334;
      --btn-dark-2:#141c2b;
      --shadow:0 0 0 1px rgba(255,255,255,.05) inset;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:var(--text);
      font-family:"Segoe UI","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    }

    body{
      background:
        radial-gradient(circle at top, #141d2a 0%, #070a10 42%, #000 100%);
    }

    .app{
      width:100%;
      height:100%;
      padding:10px 12px 6px;
      display:grid;
      grid-template-rows:auto auto auto 1fr auto;
      gap:7px;
    }

    /* ===== header ===== */
    .header{
      display:grid;
      grid-template-columns:160px 1fr 160px;
      align-items:center;
      min-height:58px;
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }

    .logo{
      line-height:1;
      user-select:none;
    }

    .logo-top{
      display:flex;
      align-items:flex-start;
      gap:3px;
    }

    .leaf{
      font-size:25px;
      line-height:1;
      color:#8ef000;
      transform:translateY(1px);
    }

    .the{
      font-size:17px;
      font-weight:900;
      color:#fff;
      line-height:1.05;
    }

    .forest-row{
      margin-top:1px;
      white-space:nowrap;
      line-height:1;
    }

    .forest{
      font-size:23px;
      font-weight:900;
      color:#79f000;
    }

    .gym{
      font-size:23px;
      font-weight:900;
      color:#fff;
      margin-left:2px;
    }

    .logo-sub{
      margin-top:3px;
      margin-left:20px;
      font-size:10px;
      font-weight:800;
      color:#dbe2e8;
    }

    .title-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .title{
      margin:0;
      width:100%;
      text-align:center;
      font-size:24px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:.4px;
    }

    .subtitle{
      margin-top:2px;
      width:100%;
      text-align:center;
      font-size:12px;
      line-height:1.1;
      font-weight:800;
      color:#e6ebef;
    }

    .header-spacer{
      min-height:1px;
    }

    /* ===== top boxes ===== */
    .hero{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
    }

    .hero-box{
      min-height:92px;
      padding:12px 14px;
      background:linear-gradient(180deg, rgba(15,23,36,.97), rgba(9,13,21,.97));
      border:1.3px solid rgba(255,255,255,.11);
      border-radius:20px;
      box-shadow:var(--shadow);
    }

    .hero-title{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:14px;
      font-weight:900;
      margin-bottom:7px;
    }

    .hero-title .en{
      font-size:11px;
      font-weight:900;
      color:var(--green);
    }

    .code-value{
      color:var(--green);
      font-size:44px;
      line-height:1;
      font-weight:900;
      letter-spacing:2px;
      margin:4px 0 4px;
    }

    .date{
      font-size:14px;
      line-height:1;
      font-weight:800;
      color:#f5f7f8;
    }

    .qr-btn{
      width:100%;
      height:100%;
      border:none;
      background:none;
      color:#fff;
      padding:0;
      margin:0;
      cursor:pointer;
    }

    .qr-inner{
      min-height:66px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
    }

    .qr-icon{
      font-size:30px;
      line-height:1;
    }

    .qr-ja{
      font-size:20px;
      line-height:1.05;
      font-weight:900;
      text-align:left;
    }

    .qr-en{
      margin-top:3px;
      font-size:11px;
      line-height:1.05;
      font-weight:900;
      color:var(--green);
      text-align:left;
    }

    .updated{
      min-height:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      text-align:center;
      font-size:12px;
      line-height:1;
      font-weight:900;
      color:#dce2e7;
    }

    .updated .icon{
      color:var(--green);
      font-size:14px;
      line-height:1;
    }

    /* ===== grid ===== */
    .rack-grid{
      min-height:0;
      display:grid;
      grid-template-columns:1fr 1fr;   /* 常に2列 */
      grid-template-rows:1fr 1fr;      /* 常に2行 */
      gap:9px;
      align-content:stretch;
    }

    .rack-card{
      min-height:0;
      background:linear-gradient(180deg, rgba(8,14,22,.98), rgba(7,11,18,.98));
      border:1.7px solid var(--line-soft);
      border-radius:24px;
      padding:12px 12px 10px;
      box-shadow:
        0 0 0 1px var(--line-softer) inset,
        0 6px 16px rgba(0,0,0,.28);
      display:grid;
      grid-template-rows:1fr auto;
      gap:8px;
      overflow:hidden;
    }

    .rack-main{
      min-height:0;
      display:grid;
      grid-template-columns:108px 1fr;
      gap:12px;
      align-items:start;
    }

    /* 依頼の②：中心線を合わせる */
    .rack-left{
      width:108px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
      min-height:0;
    }

    .rack-badge{
      width:96px;
      height:96px;
      border-radius:18px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.03)),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.12), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, #121824, #080c13);
      border:2px solid rgba(255,255,255,.20);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 5px 12px rgba(0,0,0,.35);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .rack-badge::before,
    .rack-badge::after{
      content:"";
      position:absolute;
      top:13px;
      width:14px;
      height:50px;
      border:2px solid rgba(255,255,255,.18);
      border-bottom:none;
      border-radius:4px 4px 0 0;
    }

    .rack-badge::before{ left:10px; }
    .rack-badge::after{ right:10px; }

    .rack-top-bar{
      position:absolute;
      top:11px;
      left:18px;
      right:18px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
    }

    .rack-no{
      font-size:54px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-1px;
      text-shadow:0 3px 8px rgba(0,0,0,.35);
      transform:translateY(1px);
    }

    .rack-label{
      position:absolute;
      bottom:7px;
      left:0;
      right:0;
      text-align:center;
      font-size:10px;
      line-height:1;
      font-weight:900;
      letter-spacing:3px;
      color:#fff;
      opacity:.96;
    }

    .status-pill{
      width:96px;
      min-height:44px;
      margin:0 auto;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.03;
      padding:5px 5px 4px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .status-pill .ja{
      font-size:13px;
      font-weight:900;
      margin-bottom:2px;
    }

    .status-pill .en{
      font-size:8px;
      font-weight:900;
      letter-spacing:.2px;
      opacity:.98;
    }

    .status-free{
      background:linear-gradient(180deg, var(--green-dark), var(--green-dark-2));
      color:#fff;
    }

    .status-using{
      background:linear-gradient(180deg, #355f25, #27461b);
      color:#fff;
    }

    .status-reserved{
      background:linear-gradient(180deg, var(--orange-dark), var(--orange-dark-2));
      color:#fff;
    }

    .rack-info{
      min-width:0;
      display:grid;
      grid-template-rows:auto auto auto auto auto auto auto auto auto auto;
      align-content:start;
      row-gap:1px;
    }

    .section-label{
      font-size:12px;
      line-height:1.08;
      font-weight:900;
    }

    .section-label.green{ color:var(--green); }
    .section-label.orange{ color:var(--orange); }

    .big-status{
      font-size:18px;
      line-height:1.08;
      font-weight:900;
      margin-bottom:1px;
      word-break:break-word;
    }

    .substatus{
      font-size:12px;
      line-height:1.16;
      font-weight:800;
      color:#f1f3f5;
      margin-bottom:6px;
      word-break:break-word;
    }

    .next-main{
      font-size:15px;
      line-height:1.12;
      font-weight:900;
      margin-bottom:1px;
      word-break:break-word;
    }

    .next-sub{
      font-size:12px;
      line-height:1.16;
      font-weight:900;
      margin-bottom:6px;
      word-break:break-word;
    }

    .waiting-row{
      display:flex;
      align-items:center;
      gap:5px;
      margin:1px 0 2px;
    }

    .waiting-icon{
      font-size:14px;
      line-height:1;
    }

    .waiting-count{
      font-size:17px;
      line-height:1;
      font-weight:1000;
    }

    .note{
      font-size:11px;
      line-height:1.14;
      color:#d9dee4;
      opacity:.95;
      word-break:break-word;
    }

    .rack-actions{
      min-height:0;
    }

    .action-btn{
      width:100%;
      min-height:42px;
      border:none;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:0 16px 0 16px;
      cursor:pointer;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.10),
        0 5px 12px rgba(0,0,0,.24);
    }

    .btn-green{
      background:linear-gradient(180deg, #84f400, #67d000);
      color:#fff;
    }

    .btn-dark{
      background:linear-gradient(180deg, var(--btn-dark), var(--btn-dark-2));
      color:#fff;
    }

    .btn-text{
      text-align:left;
      line-height:1;
    }

    .btn-ja{
      font-size:15px;
      line-height:1.02;
      font-weight:900;
    }

    .btn-en{
      margin-top:2px;
      font-size:9px;
      line-height:1;
      font-weight:900;
      opacity:.96;
    }

    .btn-arrow{
      font-size:22px;
      line-height:1;
      font-weight:900;
      opacity:.95;
      flex:0 0 auto;
    }

    .footer{
      min-height:14px;
      text-align:center;
      font-size:11px;
      line-height:1;
      font-weight:700;
      color:#dce1e6;
      opacity:.92;
      padding-top:1px;
    }

    .error-card{
      grid-column:1 / -1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:6px;
      border-radius:22px;
      padding:20px;
      background:linear-gradient(180deg, rgba(20,18,24,.97), rgba(14,12,18,.97));
      border:1.5px solid rgba(255,255,255,.10);
    }

    .error-card .ja{
      font-size:20px;
      font-weight:900;
    }

    .error-card .en{
      font-size:13px;
      font-weight:800;
      color:#d6dce2;
    }

    /* スマホだけ1列 */
    @media (max-width: 560px){
      html,body{
        overflow:auto;
      }

      .app{
        height:auto;
        min-height:100vh;
        grid-template-rows:auto auto auto auto auto;
      }

      .header{
        grid-template-columns:1fr;
        gap:6px;
      }

      .logo-wrap,
      .header-spacer{
        display:none;
      }

      .hero,
      .rack-grid{
        grid-template-columns:1fr;
      }

      .rack-grid{
        grid-template-rows:auto;
      }

      .rack-card{
        min-height:250px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <div class="logo">
          <div class="logo-top">
            <div class="leaf">🍃</div>
            <div class="the">The</div>
          </div>
          <div class="forest-row">
            <span class="forest">Forest</span><span class="gym">Gym</span>
          </div>
          <div class="logo-sub">24h Fitness</div>
        </div>
      </div>

      <div class="title-wrap">
        <h1 class="title">WORKOUT CHECK-IN</h1>
        <div class="subtitle">ラック予定一覧 / Rack Status Board</div>
      </div>

      <div class="header-spacer"></div>
    </header>

    <section class="hero">
      <div class="hero-box">
        <div class="hero-title">
          <span>認証コード</span>
          <span class="en">/ ACCESS CODE</span>
        </div>
        <div id="authCode" class="code-value">----</div>
        <div id="todayLabel" class="date">----/--/--</div>
      </div>

      <div class="hero-box">
        <button class="qr-btn" onclick="goQrPage()">
          <div class="qr-inner">
            <div class="qr-icon">▣</div>
            <div>
              <div class="qr-ja">QRでチェックイン</div>
              <div class="qr-en">CHECK IN WITH QR</div>
            </div>
          </div>
        </button>
      </div>
    </section>

    <div class="updated">
      <span class="icon">⟳</span>
      <span id="updatedText">最終更新 / LAST UPDATED: ----/--/-- --:--</span>
    </div>

    <main id="rackGrid" class="rack-grid"></main>

    <footer class="footer">All rights reserved. A-nauts.</footer>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
    const QR_URL = "https://forestgym-tokyo.github.io/qr-checkin-scanner/index.html";
    const CHECKIN_URL = "https://forestgym-tokyo.github.io/qr-checkin-scanner/checkin.html";
    const QUEUE_URL = "https://forestgym-tokyo.github.io/qr-checkin-scanner/queue.html";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function pickDisplayText(value, fallback = "") {
      const text = String(value ?? "").trim();
      return text || fallback;
    }

    function goQrPage() {
      window.location.href = QR_URL + "?t=" + Date.now();
    }

    function goCheckin(rackNo) {
      window.location.href = CHECKIN_URL + "?rackNo=" + encodeURIComponent(rackNo) + "&t=" + Date.now();
    }

    function goQueue(rackNo) {
      window.location.href = QUEUE_URL + "?rackNo=" + encodeURIComponent(rackNo) + "&t=" + Date.now();
    }

    function normalizeRackState(rack) {
      const rawState = String(rack.state || "").toLowerCase();
      const joined = [
        rack.currentText || "",
        rack.currentSubText || "",
        rack.nextText || "",
        rack.nextSubText || "",
        rack.bottomNote || ""
      ].join(" ");

      if (rawState.includes("using")) return "using";
      if (rawState.includes("reserved")) return "reserved";
      if (rawState.includes("free")) return "free";

      if (/利用中|使用中|in use/i.test(joined)) return "using";
      if (/予定があります|reserved|personal|見学|開始|分後|available until/i.test(joined)) return "reserved";
      return "free";
    }

    function buildRackBadge(rackNo) {
      return `
        <div class="rack-badge" aria-label="Rack ${rackNo}">
          <div class="rack-top-bar"></div>
          <div class="rack-no">${escapeHtml(rackNo)}</div>
          <div class="rack-label">RACK</div>
        </div>
      `;
    }

    function buildStatusPill(state) {
      if (state === "reserved") {
        return `
          <div class="status-pill status-reserved">
            <div class="ja">予定があります</div>
            <div class="en">RESERVED SOON</div>
          </div>
        `;
      }
      if (state === "using") {
        return `
          <div class="status-pill status-using">
            <div class="ja">利用中</div>
            <div class="en">IN USE</div>
          </div>
        `;
      }
      return `
        <div class="status-pill status-free">
          <div class="ja">空き</div>
          <div class="en">AVAILABLE</div>
        </div>
      `;
    }

    function buildActionButton(rack, state) {
      const rackNo = rack.rackNo;
      const showUseNow = !!rack.showUseNowButton || state === "free";
      const showQueue = !!rack.showQueueButton || state !== "free";

      if (showUseNow) {
        return `
          <button class="action-btn btn-green" onclick="goCheckin(${rackNo})">
            <div class="btn-text">
              <div class="btn-ja">すぐに利用</div>
              <div class="btn-en">USE NOW</div>
            </div>
            <div class="btn-arrow">›</div>
          </button>
        `;
      }

      if (showQueue) {
        return `
          <button class="action-btn btn-dark" onclick="goQueue(${rackNo})">
            <div class="btn-text">
              <div class="btn-ja">順番待ち</div>
            </div>
            <div class="btn-arrow">›</div>
          </button>
        `;
      }

      return `
        <button class="action-btn btn-dark" onclick="goQueue(${rackNo})">
          <div class="btn-text">
            <div class="btn-ja">順番待ち</div>
          </div>
          <div class="btn-arrow">›</div>
        </button>
      `;
    }

    function renderRackCard(rack) {
      const rackNo = pickDisplayText(rack.rackNo, "-");
      const state = normalizeRackState(rack);
      const labelColor = state === "reserved" ? "orange" : "green";

      const currentText = pickDisplayText(rack.currentText, state === "reserved" ? "予定があります" : "空いています");
      const currentSubText = pickDisplayText(rack.currentSubText, state === "reserved" ? "" : "本日の後続予定なし");
      const nextText = pickDisplayText(rack.nextText, "予定なし");
      const nextSubText = pickDisplayText(rack.nextSubText, "");
      const waitingCount = Number(rack.waitingCount ?? 0);
      const bottomNote = pickDisplayText(
        rack.bottomNote,
        state === "reserved" ? "Available until the next..." : "本日この後の予定はあ..."
      );

      return `
        <section class="rack-card">
          <div class="rack-main">
            <div class="rack-left">
              ${buildRackBadge(rackNo)}
              ${buildStatusPill(state)}
            </div>

            <div class="rack-info">
              <div class="section-label ${labelColor}">現在 / CURRENT</div>
              <div class="big-status">${escapeHtml(currentText)}</div>
              <div class="substatus">${escapeHtml(currentSubText)}</div>

              <div class="section-label ${labelColor}">次の予定 / NEXT</div>
              <div class="next-main">${escapeHtml(nextText)}</div>
              <div class="next-sub">${escapeHtml(nextSubText)}</div>

              <div class="section-label ${labelColor}">順番待ち / WAITING</div>
              <div class="waiting-row">
                <div class="waiting-icon">👤</div>
                <div class="waiting-count">${waitingCount}名</div>
              </div>

              <div class="note">${escapeHtml(bottomNote)}</div>
            </div>
          </div>

          <div class="rack-actions">
            ${buildActionButton(rack, state)}
          </div>
        </section>
      `;
    }

    function renderError(messageJa, messageEn) {
      document.getElementById("rackGrid").innerHTML = `
        <section class="error-card">
          <div class="ja">${escapeHtml(messageJa)}</div>
          <div class="en">${escapeHtml(messageEn)}</div>
        </section>
      `;
    }

    function renderScreen(data) {
      document.getElementById("authCode").textContent = pickDisplayText(data.authCode, "----");
      document.getElementById("todayLabel").textContent = pickDisplayText(data.todayLabel, "----/--/--");

      const updated = pickDisplayText(data.lastUpdated || data.updatedAt, "----/--/-- --:--");
      document.getElementById("updatedText").textContent = "最終更新 / LAST UPDATED: " + updated;

      const racks = Array.isArray(data.racks) ? [...data.racks] : [];
      if (!racks.length) {
        renderError("表示データがありません", "No rack data available.");
        return;
      }

      racks.sort((a, b) => Number(a.rackNo || 0) - Number(b.rackNo || 0));
      document.getElementById("rackGrid").innerHTML = racks.map(renderRackCard).join("");
    }

    async function fetchSchedule() {
      try {
        const res = await fetch(API_URL + "?action=getscheduletabletjson&t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        renderScreen(data);
      } catch (error) {
        console.error(error);
        renderError("表示データの取得に失敗しました", "Failed to load schedule data.");
      }
    }

    fetchSchedule();
    setInterval(fetchSchedule, 15000);
  </script>
</body>
</html>

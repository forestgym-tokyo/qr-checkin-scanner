<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tablet</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #000;
    }
    .racks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }
    .rack {
      padding: 42px 20px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 12px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      white-space: pre-line;
      background: #222;
    }
    .free { background: #2e7d32; }
    .using { background: #555; }
    .reserved { background: #1565c0; }
    .other { background: #222; }
  </style>
</head>
<body>

  <div class="header">
    認証コード：<span id="authCode">----</span>
  </div>

  <div class="racks">
    <div class="rack other" id="rack1">ラック№1</div>
    <div class="rack other" id="rack2">ラック№2</div>
    <div class="rack other" id="rack3">ラック№3</div>
    <div class="rack other" id="rack4">ラック№4</div>
  </div>

  <script>
    var API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

    function getStatusClass(state) {
      if (state === "free") return "free";
      if (state === "using") return "using";
      if (state === "reserved") return "reserved";
      return "other";
    }

    function trimText(v) {
      return String(v || "").replace(/^\s+|\s+$/g, "");
    }

    function buildQueueLine(row) {
      if (!row) return "";

      if (row.showUseNowButton) {
        return "すぐ利用 " + trimText(row.useNowStartText) + "〜" + trimText(row.useNowEndText);
      }

      if (row.showGapButton) {
        return "すき間利用 " + trimText(row.gapStartText) + "〜" + trimText(row.gapEndText);
      }

      if (row.showQueueButton) {
        return "順番待ち " + trimText(row.queueStartText) + "〜";
      }

      return "";
    }

    function buildRackText(r, row) {
      var label = "ラック№" + r.rackNo;
      var currentText = trimText(r.currentText);
      var nextText = trimText(r.nextText);
      var queueLine = buildQueueLine(row);
      var lines = [label];

      if (currentText) lines.push(currentText);
      if (nextText) lines.push(nextText);
      if (queueLine) lines.push(queueLine);

      if (!currentText && !nextText && !queueLine) {
        if (r.state === "free") lines.push("空き");
        else if (r.state === "using") lines.push("利用中");
        else if (r.state === "reserved") lines.push("予約あり");
      }

      return lines.join("\n");
    }

    function renderTablet(data) {
      var authEl = document.getElementById("authCode");
      if (authEl) {
        authEl.textContent = data && data.authCode ? data.authCode : "----";
      }

      var rowMap = {};
      var queueRows = (data && data.queueUiRows) ? data.queueUiRows : [];
      var i;

      for (i = 0; i < queueRows.length; i++) {
        if (queueRows[i] && queueRows[i].rackNo) {
          rowMap[queueRows[i].rackNo] = queueRows[i];
        }
      }

      for (i = 1; i <= 4; i++) {
        var baseEl = document.getElementById("rack" + i);
        if (!baseEl) continue;
        baseEl.textContent = "ラック№" + i;
        baseEl.className = "rack other";
      }

      var racks = (data && data.racks) ? data.racks : [];
      for (i = 0; i < racks.length; i++) {
        var r = racks[i];
        if (!r || !r.rackNo) continue;

        var el = document.getElementById("rack" + r.rackNo);
        if (!el) continue;

        var row = rowMap[r.rackNo] || null;
        el.textContent = buildRackText(r, row);
        el.className = "rack " + getStatusClass(r.state);
      }
    }

    function loadTabletData() {
      fetch(API_URL + "?action=getScheduleTabletJson&t=" + new Date().getTime())
        .then(function(res) {
          return res.json();
        })
        .then(function(data) {
          renderTablet(data);
        })
        .catch(function() {
          var authEl = document.getElementById("authCode");
          if (authEl) authEl.textContent = "ERR";
        });
    }

    window.onload = function() {
      loadTabletData();
      setInterval(loadTabletData, 5000);
    };
  </script>

</body>
</html>

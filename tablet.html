<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

  function getStatusClass(status) {
    if (status === "free") return "free";
    if (status === "using") return "using";
    if (status === "reserved") return "reserved";
    return "other";
  }

  function renderTablet(data) {
    const authEl = document.getElementById("authCode");
    if (authEl) authEl.textContent = data.authCode || "----";

    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById("rack" + i);
      if (!el) continue;

      const r = (data.racks && data.racks[i-1]) || {};

      const text = r.text || r.label || r.title || "空き";
      const status = r.status || r.state || "other";

      el.textContent = text;
      el.className = "rack " + getStatusClass(status);
    }
  }

  async function loadTabletData() {
    try {
      const res = await fetch(API_URL + "?action=getScheduleTabletJson&t=" + Date.now());
      const data = await res.json();
      renderTablet(data);
    } catch (err) {
      console.error(err);
      document.getElementById("authCode").textContent = "ERR";
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    loadTabletData();
    setInterval(loadTabletData, 5000);
  });
</script>

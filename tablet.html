<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

  function getStatusClass(state) {
    if (state === "free") return "free";
    if (state === "using") return "using";
    if (state === "reserved") return "reserved";
    return "other";
  }

  function buildRackText(r, row) {
    const label = "ラック№" + r.rackNo;
    const currentText = (r.currentText || "").trim();
    const nextText = (r.nextText || "").trim();

    if (currentText && nextText) return label + "\n" + currentText + "\n" + nextText;
    if (currentText) return label + "\n" + currentText;
    if (nextText) return label + "\n" + nextText;

    if (row) {
      if (row.showUseNowButton) {
        return label + "\nすぐ利用 " + row.useNowStartText + "〜" + row.useNowEndText;
      }
      if (row.showGapButton) {
        return label + "\nすき間利用 " + row.gapStartText + "〜" + row.gapEndText;
      }
      if (row.showQueueButton) {
        return label + "\n順番待ち " + row.queueStartText + "〜";
      }
    }

    if (r.state === "free") return label + "\n空き";
    if (r.state === "using") return label + "\n利用中";
    if (r.state === "reserved") return label + "\n予約あり";

    return label;
  }

  function renderTablet(data) {
    const authEl = document.getElementById("authCode");
    if (authEl) authEl.textContent = data.authCode || "----";

    const rowMap = {};
    (data.queueUiRows || []).forEach(function(row) {
      rowMap[row.rackNo] = row;
    });

    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById("rack" + i);
      if (!el) continue;
      el.textContent = "ラック№" + i;
      el.className = "rack other";
      el.style.whiteSpace = "pre-line";
    }

    (data.racks || []).forEach(function(r) {
      const el = document.getElementById("rack" + r.rackNo);
      if (!el) return;

      const row = rowMap[r.rackNo] || null;
      el.textContent = buildRackText(r, row);
      el.className = "rack " + getStatusClass(r.state);
    });
  }

  async function loadTabletData() {
    try {
      const res = await fetch(API_URL + "?action=getScheduleTabletJson&t=" + Date.now());
      const data = await res.json();
      renderTablet(data);
    } catch (err) {
      console.error(err);
      const authEl = document.getElementById("authCode");
      if (authEl) authEl.textContent = "ERR";
    }
  }

  window.addEventListener("DOMContentLoaded", function() {
    loadTabletData();
    setInterval(loadTabletData, 5000);
  });
</script>

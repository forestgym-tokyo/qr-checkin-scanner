<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>WORKOUT CHECK-IN</title>
  <style>
    :root{
      --bg:#05070c;
      --panel:#101625;
      --panel2:#0d1320;
      --line:#2f9d8d;
      --mint:#8fd3b3;
      --mint-dark:#6ea98e;
      --text:#ffffff;
      --sub:#c9d0db;
      --muted:#98a2b3;
      --whitebtn:#f2f4f7;
      --whitebtn2:#d9dee7;
      --greenbtn:#32c553;
      --greenbtn2:#2ab149;
      --shadow:0 10px 24px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:
        "Noto Sans JP",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Segoe UI",
        sans-serif;
    }

    body{
      padding:16px;
    }

    .app{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .top-title{
      flex:0 0 auto;
    }

    .title-main{
      font-size:30px;
      line-height:1;
      font-weight:900;
      letter-spacing:.02em;
      margin:0 0 6px;
    }

    .title-sub{
      font-size:13px;
      color:var(--sub);
      margin:0;
    }

    .hero{
      flex:0 0 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .auth-card,
    .qr-card{
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .auth-card{
      background:linear-gradient(180deg,#101625 0%, #0d1320 100%);
      border:1px solid rgba(143,211,179,.18);
      padding:18px 18px 16px;
      min-height:138px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .auth-ja{
      font-size:26px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:4px;
    }

    .auth-en{
      font-size:16px;
      color:#d8dee8;
      letter-spacing:.04em;
      margin-bottom:14px;
    }

    .auth-code{
      font-size:60px;
      line-height:1;
      font-weight:900;
      letter-spacing:.12em;
      margin-bottom:10px;
      font-variant-numeric:tabular-nums;
    }

    .auth-date{
      font-size:18px;
      color:#d8dee8;
      font-variant-numeric:tabular-nums;
    }

    .qr-card{
      border:none;
      background:linear-gradient(180deg,var(--whitebtn) 0%, #eef1f5 100%);
      color:#111111;
      min-height:138px;
      position:relative;
    }

    .qr-button{
      appearance:none;
      border:none;
      width:100%;
      height:100%;
      margin:0;
      background:transparent;
      color:#111111;
      cursor:pointer;
      font:inherit;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      border-radius:26px;
      box-shadow:
        inset 0 -10px 0 rgba(151,163,184,.45);
    }

    .qr-ja{
      font-size:30px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:8px;
    }

    .qr-en{
      font-size:18px;
      font-weight:700;
      color:#444b55;
      letter-spacing:.03em;
    }

    .updated{
      flex:0 0 auto;
      text-align:center;
      color:#d0d6df;
      font-size:14px;
      line-height:1.2;
      font-variant-numeric:tabular-nums;
      margin-top:-2px;
    }

    .grid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1fr 1fr;
      gap:18px 16px;
    }

    .rack{
      min-height:0;
      display:flex;
      flex-direction:column;
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(180deg,#111726 0%, #0b1120 100%);
      border:1px solid rgba(143,211,179,.45);
      box-shadow:var(--shadow);
    }

    .rack-head{
      flex:0 0 auto;
      background:var(--mint);
      color:#091012;
      padding:16px 18px 14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .rack-title{
      font-size:26px;
      font-weight:900;
      line-height:1.1;
      letter-spacing:.01em;
    }

    .state-chip{
      flex:0 0 auto;
      min-width:116px;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(0,0,0,.16);
      text-align:center;
      line-height:1.05;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .state-chip .ja{
      display:block;
      font-size:18px;
      font-weight:900;
      margin-bottom:4px;
    }

    .state-chip .en{
      display:block;
      font-size:12px;
      font-weight:800;
      letter-spacing:.03em;
    }

    .rack-body{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      padding:16px 18px 18px;
      background:linear-gradient(180deg,#101625 0%, #0b1120 100%);
    }

    .label{
      font-size:16px;
      color:#e6e9ef;
      line-height:1.2;
      margin-bottom:6px;
    }

    .current-main{
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      color:#ffffff;
      white-space:pre-line;
      margin-bottom:18px;
    }

    .next-block{
      margin-bottom:14px;
    }

    .next-text{
      font-size:18px;
      line-height:1.45;
      color:#e6e9ef;
      white-space:pre-line;
    }

    .queue-area{
      margin-top:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .queue-btn{
      width:100%;
      min-height:78px;
      border:none;
      border-radius:20px;
      background:linear-gradient(180deg,var(--greenbtn) 0%, var(--greenbtn2) 100%);
      color:#fff;
      box-shadow:
        inset 0 -4px 0 rgba(0,0,0,.12),
        0 8px 18px rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:10px 12px;
      font:inherit;
      cursor:pointer;
    }

    .queue-btn .ja{
      font-size:24px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:5px;
    }

    .queue-btn .en{
      font-size:14px;
      font-weight:800;
      line-height:1.1;
      letter-spacing:.03em;
      opacity:.95;
    }

    .queue-btn.secondary{
      background:linear-gradient(180deg,#3f6db5 0%, #355fa1 100%);
    }

    .queue-btn.tertiary{
      background:linear-gradient(180deg,#d2a55e 0%, #bc8f47 100%);
      color:#fff;
    }

    .hidden{
      display:none !important;
    }

    .error{
      position:fixed;
      left:16px;
      right:16px;
      bottom:16px;
      z-index:50;
      background:rgba(120,20,20,.92);
      color:#fff;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      line-height:1.45;
      display:none;
    }

    .loading{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.22);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:40;
      pointer-events:none;
    }

    .loading-box{
      padding:12px 18px;
      border-radius:999px;
      background:rgba(16,22,37,.9);
      border:1px solid rgba(255,255,255,.1);
      color:#fff;
      font-size:14px;
      letter-spacing:.04em;
    }

    @media (max-width: 900px){
      body{
        padding:10px;
      }
      .title-main{
        font-size:22px;
      }
      .hero{
        gap:10px;
      }
      .auth-card,.qr-card{
        min-height:110px;
      }
      .auth-ja{
        font-size:20px;
      }
      .auth-code{
        font-size:46px;
      }
      .qr-ja{
        font-size:24px;
      }
      .grid{
        gap:12px 10px;
      }
      .rack-title{
        font-size:18px;
      }
      .state-chip{
        min-width:92px;
        padding:8px 10px;
      }
      .state-chip .ja{
        font-size:15px;
      }
      .state-chip .en{
        font-size:10px;
      }
      .label{
        font-size:13px;
      }
      .current-main{
        font-size:20px;
      }
      .next-text{
        font-size:15px;
      }
      .queue-btn{
        min-height:64px;
        border-radius:16px;
      }
      .queue-btn .ja{
        font-size:20px;
      }
      .queue-btn .en{
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-title">
      <h1 class="title-main">WORKOUT CHECK-IN</h1>
      <p class="title-sub">ラック予定一覧 / Rack Status Board</p>
    </div>

    <div class="hero">
      <div class="auth-card">
        <div class="auth-ja">認証コード</div>
        <div class="auth-en">ACCESS CODE</div>
        <div class="auth-code" id="authCode">----</div>
        <div class="auth-date" id="todayLabel">----/--/--</div>
      </div>

      <div class="qr-card">
        <button type="button" class="qr-button" id="qrButton">
          <div class="qr-ja">QRでチェックイン</div>
          <div class="qr-en">CHECK IN WITH QR</div>
        </button>
      </div>
    </div>

    <div class="updated" id="updatedText">最終更新 / LAST UPDATED: --</div>

    <div class="grid" id="rackGrid"></div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-box">LOADING...</div>
  </div>

  <div class="error" id="errorBox"></div>

  <script>
    /********************************************************
     * 設定
     ********************************************************/
    const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec?action=getScheduleTabletJson";
    const QR_PAGE_URL = "https://forestgym-tokyo.github.io/qr-checkin-scanner/";
    const AUTO_REFRESH_MS = 15000;
    const FETCH_TIMEOUT_MS = 10000;

    /********************************************************
     * モック
     ********************************************************/
    const MOCK_DATA = {
      authCode: "6611",
      todayLabel: "2026/04/21",
      updatedAt: "2026/04/21 6:35",
      racks: [
        { rackNo: 1, state: "free", currentText: "", nextText: "" },
        { rackNo: 2, state: "free", currentText: "", nextText: "" },
        { rackNo: 3, state: "free", currentText: "", nextText: "" },
        { rackNo: 4, state: "free", currentText: "", nextText: "" }
      ],
      queueUiRows: [
        {
          rackNo: 4,
          showUseNowButton: true,
          useNowStartText: "06:35",
          useNowEndText: "23:59"
        }
      ]
    };

    const rackGrid = document.getElementById("rackGrid");
    const authCodeEl = document.getElementById("authCode");
    const todayLabelEl = document.getElementById("todayLabel");
    const updatedTextEl = document.getElementById("updatedText");
    const qrButton = document.getElementById("qrButton");
    const loadingEl = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");

    let timer = null;

    init();

    function init() {
      qrButton.addEventListener("click", function () {
        location.href = QR_PAGE_URL;
      });

      loadData();
      timer = setInterval(loadData, AUTO_REFRESH_MS);
    }

    async function loadData() {
      showLoading(true);
      hideError();

      try {
        const data = await fetchJson();
        render(data);
      } catch (e) {
        console.error(e);
        render(MOCK_DATA);
        showError("API取得に失敗したためモック表示中");
      } finally {
        showLoading(false);
      }
    }

    async function fetchJson() {
      if (!API_URL) {
        return MOCK_DATA;
      }

      const controller = new AbortController();
      const timeoutId = setTimeout(function () {
        controller.abort();
      }, FETCH_TIMEOUT_MS);

      try {
        const url = API_URL + (API_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store",
          signal: controller.signal
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        return await res.json();
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function render(raw) {
      const data = normalizeData(raw);

      authCodeEl.textContent = data.authCode || "----";
      todayLabelEl.textContent = data.todayLabel || "----/--/--";
      updatedTextEl.textContent = "最終更新 / LAST UPDATED: " + data.updatedAt;

      rackGrid.innerHTML = "";

      for (const rack of data.racks) {
        const row = findQueueRow(data.queueUiRows, rack.rackNo);
        rackGrid.appendChild(createRackCard(rack, row));
      }
    }

    function normalizeData(raw) {
      const src = raw || {};
      const racks = Array.isArray(src.racks) ? src.racks.slice() : [];
      const queueUiRows = Array.isArray(src.queueUiRows) ? src.queueUiRows.slice() : [];

      const map = new Map();

      for (const r of racks) {
        const no = Number(r && r.rackNo);
        if (!no) continue;
        map.set(no, {
          rackNo: no,
          state: normalizeState(r.state),
          currentText: safe(r.currentText),
          nextText: safe(r.nextText)
        });
      }

      for (let i = 1; i <= 4; i++) {
        if (!map.has(i)) {
          map.set(i, {
            rackNo: i,
            state: "free",
            currentText: "",
            nextText: ""
          });
        }
      }

      return {
        authCode: safe(src.authCode) || "----",
        todayLabel: safe(src.todayLabel) || formatDate(new Date()),
        updatedAt: safe(src.updatedAt) || formatDateTime(new Date()),
        racks: Array.from(map.values()).sort(function(a,b){ return a.rackNo - b.rackNo; }),
        queueUiRows: queueUiRows
      };
    }

    function normalizeState(v) {
      const s = String(v || "").toLowerCase();
      if (s === "using") return "using";
      if (s === "reserved") return "reserved";
      return "free";
    }

    function findQueueRow(rows, rackNo) {
      for (const row of rows) {
        if (Number(row && row.rackNo) === Number(rackNo)) {
          return row;
        }
      }
      return null;
    }

    function createRackCard(rack, queueRow) {
      const stateJa = rack.state === "using" ? "利用中" : rack.state === "reserved" ? "予約" : "空き";
      const stateEn = rack.state === "using" ? "IN USE" : rack.state === "reserved" ? "RESERVED" : "AVAILABLE";

      const currentMain = getCurrentMainText(rack);
      const nextText = getNextText(rack);

      const el = document.createElement("section");
      el.className = "rack";

      el.innerHTML = `
        <div class="rack-head">
          <div class="rack-title">ラック№${escapeHtml(String(rack.rackNo))}</div>
          <div class="state-chip">
            <span class="ja">${escapeHtml(stateJa)}</span>
            <span class="en">${escapeHtml(stateEn)}</span>
          </div>
        </div>

        <div class="rack-body">
          <div class="label">現在 / CURRENT</div>
          <div class="current-main">${escapeHtml(currentMain)}</div>

          <div class="next-block">
            <div class="label">次の予定 / NEXT</div>
            <div class="next-text">${escapeHtml(nextText)}</div>
          </div>

          <div class="queue-area"></div>
        </div>
      `;

      const queueArea = el.querySelector(".queue-area");
      appendQueueButtons(queueArea, queueRow);

      return el;
    }

    function appendQueueButtons(container, row) {
      if (!row) return;

      if (row.showUseNowButton) {
        container.appendChild(createQueueButton("すぐに利用", "USE NOW", ""));
      }

      if (row.showGapUseButton) {
        container.appendChild(createQueueButton("すき間利用", "GAP USE", "secondary"));
      }

      if (row.showWaitButton) {
        container.appendChild(createQueueButton("順番待ち", "WAIT LIST", "tertiary"));
      }
    }

    function createQueueButton(ja, en, extraClass) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "queue-btn" + (extraClass ? " " + extraClass : "");
      btn.innerHTML = `
        <div class="ja">${escapeHtml(ja)}</div>
        <div class="en">${escapeHtml(en)}</div>
      `;
      return btn;
    }

    function getCurrentMainText(rack) {
      if (rack.state === "free") {
        return "空いています\nAVAILABLE";
      }
      if (rack.state === "using") {
        const t = rack.currentText || "利用中";
        return t + "\nIN USE";
      }
      const t = rack.currentText || "予約あり";
      return t + "\nRESERVED";
    }

    function getNextText(rack) {
      if (rack.nextText) {
        return rack.nextText;
      }
      return "次の予定はありません\nNO UPCOMING SCHEDULE";
    }

    function showLoading(show) {
      loadingEl.style.display = show ? "flex" : "none";
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function safe(v) {
      return v == null ? "" : String(v);
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return y + "/" + m + "/" + day;
    }

    function formatDateTime(d) {
      return formatDate(d) + " " + d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>

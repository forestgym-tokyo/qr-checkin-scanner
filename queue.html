<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEUE</title>

<style>
body{
  margin:0;
  background:#0f1115;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:#fff;
}
.wrap{
  max-width:520px;
  margin:0 auto;
  padding:40px 20px;
}
.title{
  font-size:30px;
  font-weight:700;
  margin-bottom:6px;
}
.sub{
  color:#aaa;
  margin-bottom:30px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:24px;
  backdrop-filter:blur(12px);
}
.notice{
  margin-bottom:16px;
  padding:14px 16px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  color:#d7dbe2;
  line-height:1.7;
  font-size:14px;
}
input{
  width:100%;
  margin-bottom:14px;
  padding:16px;
  font-size:18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);
  color:#fff;
  box-sizing:border-box;
}
input::placeholder{
  color:#aaa;
}
button{
  width:100%;
  padding:16px;
  font-size:18px;
  border-radius:14px;
  border:none;
  margin-top:10px;
  color:#fff;
}
.primary{
  background:#2f80ed;
}
.back{
  background:#444;
}
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-box{
  background:#1a1d24;
  padding:30px;
  border-radius:18px;
  text-align:center;
  width:90%;
  max-width:420px;
}
.modal-box h2{
  margin-top:0;
}
.secondary{
  background:#666;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="title">QUEUE</div>
  <div class="sub" id="rackLabel">Rack -</div>

  <div class="card">
    <div class="notice">
      このラックの順番待ち受付です。<br>
      順番が来たらメールで通知されます。
    </div>

    <input id="memberNo" placeholder="会員番号">
    <input id="memberName" placeholder="お名前">
    <input id="displayName" placeholder="表示名">
    <input id="email" type="email" placeholder="メールアドレス">

    <button class="primary" id="queueBtn" onclick="queueNow(false)">順番待ち登録</button>
    <button class="back" onclick="back()">戻る</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

const params = new URLSearchParams(location.search);
const rackNo = params.get("rackNo") || "1";
document.getElementById("rackLabel").innerText = "Rack №" + rackNo;

function queueNow(forceConfirm){
  const memberNo = document.getElementById("memberNo").value.trim();
  const memberName = document.getElementById("memberName").value.trim();
  const displayName = document.getElementById("displayName").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!memberNo || !memberName || !displayName || !email){
    alert("入力してください");
    return;
  }

  const btn = document.getElementById("queueBtn");
  btn.disabled = true;

  fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
    },
    body:
      "action=registerQueue"
      + "&rackNo=" + encodeURIComponent(rackNo)
      + "&memberNo=" + encodeURIComponent(memberNo)
      + "&memberName=" + encodeURIComponent(memberName)
      + "&displayName=" + encodeURIComponent(displayName)
      + "&email=" + encodeURIComponent(email)
      + "&confirmedShortSlot=" + encodeURIComponent(forceConfirm ? "true" : "false")
  })
  .then(function(r){
    return r.json();
  })
  .then(function(res){
    btn.disabled = false;

    if (!res || !res.ok) {
      if (res && res.needsConfirm) {
        showConfirmModal(res.message || "短い空き枠になります。受付しますか？");
        return;
      }
      alert((res && res.message) ? res.message : "順番待ち登録に失敗しました。");
      return;
    }

    showSuccessModal(res);
  })
  .catch(function(err){
    console.error(err);
    btn.disabled = false;
    alert("通信エラー");
  });
}

function showConfirmModal(message){
  removeModalIfExists();

  const m = document.createElement("div");
  m.className = "modal";
  m.id = "confirmModal";
  m.innerHTML = `
    <div class="modal-box">
      <h2>確認</h2>
      <p>${escapeHtml(message).replace(/\n/g, "<br>")}</p>
      <button class="primary" onclick="confirmYes()">はい</button>
      <button class="secondary" onclick="removeModalIfExists()">いいえ</button>
    </div>
  `;
  document.body.appendChild(m);
}

function confirmYes(){
  removeModalIfExists();
  queueNow(true);
}

function showSuccessModal(res){
  removeModalIfExists();

  const availableTime = res && res.availableTime ? res.availableTime : "";
  const endTime = res && res.endTime ? res.endTime : "";
  const securedMinutes = res && res.securedMinutes ? String(res.securedMinutes) : "";

  let text = "順番待ち登録が完了しました。";
  if (availableTime) {
    text += "<br><br>空き見込み：" + escapeHtml(availableTime);
  }
  if (endTime) {
    text += "<br>終了目安：" + escapeHtml(endTime);
  }
  if (securedMinutes) {
    text += "<br>確保時間：" + escapeHtml(securedMinutes) + "分";
  }

  const m = document.createElement("div");
  m.className = "modal";
  m.id = "successModal";
  m.innerHTML = `
    <div class="modal-box">
      <h2>受付完了</h2>
      <p>${text}</p>
      <button class="primary" onclick="back()">OK</button>
    </div>
  `;
  document.body.appendChild(m);
}

function removeModalIfExists(){
  const a = document.getElementById("confirmModal");
  if (a) a.remove();
  const b = document.getElementById("successModal");
  if (b) b.remove();
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function back(){
  location.href = "tablet.html";
}
</script>

</body>
</html>

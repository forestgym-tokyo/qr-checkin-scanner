<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Tablet</title>

<style>
:root{
  --accent:#8DFF00;
  --accent-glow:rgba(141,255,0,.2);
  --text:#fff;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  border-bottom:1px solid rgba(255,255,255,.2);
}

.left-header{
  display:flex;
  align-items:center;
  gap:20px;
}

/* ラックアイコン縦長 */
.rack-box{
  width:90px;
  height:140px;
  border:2px solid var(--accent);
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px var(--accent-glow);
  cursor:pointer;
}

.rack-box img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* 更新表示 */
.updated{
  text-align:right;
}

.updated-label{
  font-size:12px;
}

.updated-value{
  font-size:26px;
  font-weight:900;
}

.updated-value span{
  color:var(--accent);
}

/* ===== MAIN ===== */
.main{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ===== メインカード ===== */
.main-card{
  border:2px solid var(--accent);
  border-radius:20px;
  padding:18px;
  box-shadow:0 0 12px var(--accent-glow);
  display:flex;
  justify-content:space-between;
}

/* 左 */
.main-left{
  flex:1;
}

.state{
  font-size:56px;
  font-weight:900;
}

.state-en{
  color:var(--accent);
  font-size:26px;
  margin-top:6px;
}

.user{
  margin-top:14px;
  font-size:52px;
  font-weight:900;
}

/* 右 */
.main-right{
  width:260px;
  border-left:2px solid var(--accent);
  padding-left:20px;
}

.time{
  font-size:56px;
  font-weight:900;
}

.sub{
  margin-top:8px;
}

.checkout{
  margin-top:16px;
  background:var(--accent);
  color:#000;
  border:none;
  width:100%;
  height:90px;
  font-size:30px;
  font-weight:900;
  border-radius:14px;
}

/* ===== サブ ===== */
.sub-panel{
  border:2px solid var(--accent);
  border-radius:16px;
  display:flex;
}

.sub-item{
  flex:1;
  padding:14px;
}

.sub-item + .sub-item{
  border-left:2px solid var(--accent);
}

.sub-title{
  color:var(--accent);
  font-size:16px;
}

.sub-value{
  font-size:28px;
  font-weight:900;
  margin-top:6px;
}

/* ===== メッセージ ===== */
.message{
  border:2px solid var(--accent);
  border-radius:16px;
  padding:10px 14px;
}

.message-title{
  color:var(--accent);
  font-size:16px;
}

.message-ja{
  font-size:22px;
  margin-top:6px;
}

.message-en{
  color:var(--accent);
  margin-top:6px;
}

</style>
</head>

<body>

<div class="header">
  <div class="left-header">
    <div class="rack-box" id="refresh">
      <img src="rack1.png">
    </div>
  </div>

  <div class="updated">
    <div class="updated-label">LAST UPDATED</div>
    <div class="updated-value" id="updated">--</div>
  </div>
</div>

<div class="main">

  <div class="main-card">
    <div class="main-left">
      <div class="state" id="state">チェックイン済</div>
      <div class="state-en">CHECKED IN</div>

      <div class="user" id="user">TESTさんが利用中</div>
    </div>

    <div class="main-right">
      <div class="time" id="time">35:00</div>
      <div class="sub" id="until">〜13:05まで</div>

      <button class="checkout">チェックアウト</button>
    </div>
  </div>

  <div class="sub-panel">
    <div class="sub-item">
      <div class="sub-title">次の利用者</div>
      <div class="sub-value">山田太郎</div>
    </div>
    <div class="sub-item">
      <div class="sub-title">次の予定</div>
      <div class="sub-value">20:00〜20:40</div>
    </div>
  </div>

  <div class="message">
    <div class="message-title">MESSAGE BOARD</div>
    <div class="message-ja">
      ラックの利用ルールが変更になりました。荷物の置きっぱなしはご遠慮ください。
    </div>
    <div class="message-en">
      The rules have been updated.
    </div>
  </div>

</div>

<script>
document.getElementById("refresh").onclick = () => {
  location.reload();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Tablet</title>

<style>
:root{
  --accent:#8DFF00;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  display:grid;
  grid-template-columns:auto auto 1fr auto;
  align-items:center;
  padding:10px 16px;
}

.logo{height:48px;}

.rack-box{
  width:70px;height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:none;
  box-shadow:none;
}

.updated{
  text-align:right;
}

.updated-value{
  font-size:26px;
  font-weight:900;
}

.updated-value span{
  color:var(--accent);
}

/* ===== MAIN ===== */
.main{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ===== CARD ===== */
.main-card{
  border:2px solid var(--accent);
  border-radius:14px;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.main-left{flex:1;}

.state{
  font-size:52px;
  font-weight:900;
}

.state-en{
  font-size:20px;
  color:var(--accent);
}

.user{
  margin-top:10px;
  font-size:40px;
  font-weight:900;
}

.subtext{
  font-size:22px;
  margin-top:6px;
  white-space:nowrap;
  overflow:hidden;
}

/* ===== RIGHT ===== */
.main-right{
  width:250px;
  border-left:2px solid var(--accent);
  padding-left:12px;
}

.time{
  font-size:56px;
  font-weight:900;
}

.until{
  font-size:18px;
  margin-top:4px;
}

.checkout{
  margin-top:10px;
  background:var(--accent);
  color:#000;
  width:100%;
  height:80px;
  font-size:24px;
  font-weight:900;
  border:none;
  border-radius:10px;
  display:none;
}

/* ===== SUB ===== */
.sub-panel{
  border:2px solid var(--accent);
  border-radius:12px;
  display:flex;
}

.sub-item{
  flex:1;
  padding:10px;
}

.sub-item + .sub-item{
  border-left:2px solid var(--accent);
}

.sub-value{
  font-size:24px;
  font-weight:900;
}

/* ===== MESSAGE ===== */
.message{
  border:2px solid var(--accent);
  border-radius:12px;
  padding:10px;
}

.message-ja{font-size:20px;}
.message-en{font-size:14px;color:var(--accent);}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">

  <div class="rack-box" id="refresh">
    <img id="rackImage" src="rack1.png">
  </div>

  <div></div>

  <div class="updated">
    <div class="updated-value" id="updated">--</div>
  </div>
</div>

<div class="main">

  <div class="main-card">
    <div class="main-left">
      <div class="state" id="state"></div>
      <div class="state-en" id="stateEn"></div>
      <div class="user" id="user"></div>
      <div class="subtext" id="subtext"></div>
    </div>

    <div class="main-right">
      <div class="time" id="time"></div>
      <div class="until" id="until"></div>

      <button class="checkout" id="checkoutBtn">
        チェックアウト
      </button>
    </div>
  </div>

  <div class="sub-panel">
    <div class="sub-item">
      <div class="sub-value" id="nextUser"></div>
    </div>

    <div class="sub-item">
      <div class="sub-value" id="nextTime"></div>
    </div>
  </div>

  <div class="message">
    <div class="message-ja" id="messageJa"></div>
    <div class="message-en" id="messageEn"></div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
const rackNo = new URLSearchParams(location.search).get("rackNo") || 1;

function applyData(data){

  document.getElementById("updated").innerHTML =
    (data.nowText || "").replace(/(\d{2}:\d{2})/, "<span>$1</span>");

  document.getElementById("rackImage").src = "rack" + rackNo + ".png";

  const s = (data.state || "").toLowerCase();

  if (s.includes("checked")) {
    document.getElementById("state").textContent = "チェックイン済";
    document.getElementById("stateEn").textContent = "CHECKED IN";
  } else if (s.includes("free")) {
    document.getElementById("state").textContent = "空いています";
    document.getElementById("stateEn").textContent = "AVAILABLE";
  } else {
    document.getElementById("state").textContent = "予定あり";
    document.getElementById("stateEn").textContent = "";
  }

  document.getElementById("user").textContent =
    data.currentDisplayName ? data.currentDisplayName + "さんが利用中" : "";

  document.getElementById("subtext").textContent = data.subText || "";

  document.getElementById("time").textContent = data.currentSubText || "";
  document.getElementById("until").textContent = data.currentText || "";

  document.getElementById("nextUser").textContent =
    data.nextDisplayName ? data.nextDisplayName + "さん" : "";

  document.getElementById("nextTime").textContent =
    (data.nextStartText && data.nextEndText)
      ? data.nextStartText + "～" + data.nextEndText
      : "";

  const msgs = data.messages || [];
  document.getElementById("messageJa").textContent = msgs[0] || "";
  document.getElementById("messageEn").textContent = msgs[1] || "";

  const btn = document.getElementById("checkoutBtn");
  btn.style.display = data.canCheckout ? "block" : "none";
}

async function loadData(){
  const res = await fetch(API_URL + "?action=getracktabletjson&rackNo=" + rackNo + "&t=" + Date.now());
  const data = await res.json();
  applyData(data);
}

loadData();
setInterval(loadData,15000);

document.getElementById("refresh").onclick = loadData;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Tablet</title>

<style>
:root{
  --accent:#8DFF00;
  --accent-glow:rgba(141,255,0,.2);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 18px;
  border-bottom:1px solid rgba(255,255,255,.2);
}

.left-header{
  display:flex;
  align-items:center;
  gap:14px;
}

/* ラックアイコン（囲み型） */
.rack-box{
  width:90px;
  height:90px;
  border:2px solid var(--accent);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px var(--accent-glow);
  cursor:pointer;
}

.rack-box img{
  width:70%;
  height:70%;
  object-fit:contain;
}

/* ロゴ */
.logo{
  height:46px;
}

/* 更新 */
.updated{
  text-align:right;
}

.updated-label{
  font-size:12px;
}

.updated-value{
  font-size:24px;
  font-weight:900;
}

.updated-value span{
  color:var(--accent);
}

/* ===== MAIN ===== */
.main{
  padding:10px 14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* ===== MAIN CARD ===== */
.main-card{
  border:2px solid var(--accent);
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 0 10px var(--accent-glow);
}

/* 左 */
.main-left{
  flex:1;
}

.state{
  font-size:44px;
  font-weight:900;
}

.state-en{
  font-size:20px;
  color:var(--accent);
}

.user{
  margin-top:10px;
  font-size:40px;
  font-weight:900;
}

/* 右 */
.main-right{
  width:230px;
  border-left:2px solid var(--accent);
  padding-left:14px;
}

.time{
  font-size:48px;
  font-weight:900;
}

.until{
  margin-top:6px;
  font-size:20px;
}

/* チェックアウト */
.checkout{
  margin-top:10px;
  background:var(--accent);
  color:#000;
  border:none;
  width:100%;
  height:80px;
  font-size:24px;
  font-weight:900;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* ===== SUB ===== */
.sub-panel{
  border:2px solid var(--accent);
  border-radius:14px;
  display:flex;
}

.sub-item{
  flex:1;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.sub-item + .sub-item{
  border-left:2px solid var(--accent);
}

.sub-title{
  color:var(--accent);
  font-size:14px;
}

.sub-value{
  font-size:22px;
  font-weight:900;
}

/* ===== MESSAGE ===== */
.message{
  border:2px solid var(--accent);
  border-radius:14px;
  padding:8px 12px;
}

.message-title{
  font-size:14px;
  color:var(--accent);
}

.message-ja{
  font-size:20px;
  margin-top:4px;
}

.message-en{
  font-size:14px;
  margin-top:4px;
  color:var(--accent);
}

</style>
</head>

<body>

<div class="header">
  <div class="left-header">
    <div class="rack-box" id="refresh">
      <img src="rack1.png">
    </div>

    <img src="logo.png" class="logo">
  </div>

  <div class="updated">
    <div class="updated-label">LAST UPDATED</div>
    <div class="updated-value">2026/04/24 <span>12:30</span></div>
  </div>
</div>

<div class="main">

  <!-- メイン -->
  <div class="main-card">
    <div class="main-left">
      <div class="state">チェックイン済</div>
      <div class="state-en">CHECKED IN</div>

      <div class="user">山田太郎さんが利用中</div>
    </div>

    <div class="main-right">
      <div class="time">35:00</div>
      <div class="until">〜13:05まで</div>

      <div class="checkout">
        ⬅
        チェックアウト
      </div>
    </div>
  </div>

  <!-- 次 -->
  <div class="sub-panel">
    <div class="sub-item">
      <div class="sub-title">次の利用者</div>
      <div class="sub-value">佐藤</div>
    </div>

    <div class="sub-item">
      <div class="sub-title">次の予定</div>
      <div class="sub-value">20:00〜20:40</div>
    </div>
  </div>

  <!-- メッセージ -->
  <div class="message">
    <div class="message-title">MESSAGE BOARD</div>
    <div class="message-ja">
      荷物の放置は禁止です
    </div>
    <div class="message-en">
      Do not leave belongings unattended
    </div>
  </div>

</div>

<script>
document.getElementById("refresh").onclick = () => location.reload();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Tablet</title>

<style>
:root{
  --accent:#8DFF00;
  --accent-glow:rgba(141,255,0,.2);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 18px;
  border-bottom:1px solid rgba(255,255,255,.2);
}

.left-header{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  height:46px;
}

.rack-box{
  width:90px;
  height:90px;
  border:2px solid var(--accent);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px var(--accent-glow);
  cursor:pointer;
}

.rack-box img{
  width:70%;
  height:70%;
}

.updated{
  text-align:right;
}

.updated-label{
  font-size:12px;
}

.updated-value{
  font-size:24px;
  font-weight:900;
}

.updated-value span{
  color:var(--accent);
}

/* ===== MAIN ===== */
.main{
  padding:10px 14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.main-card{
  border:2px solid var(--accent);
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 0 10px var(--accent-glow);
}

.main-left{
  flex:1;
}

.state{
  font-size:44px;
  font-weight:900;
}

.state-en{
  font-size:20px;
  color:var(--accent);
}

.user{
  margin-top:10px;
  font-size:40px;
  font-weight:900;
}

.main-right{
  width:230px;
  border-left:2px solid var(--accent);
  padding-left:14px;
}

.time{
  font-size:48px;
  font-weight:900;
}

.until{
  margin-top:6px;
  font-size:20px;
}

.checkout{
  margin-top:10px;
  background:var(--accent);
  color:#000;
  border:none;
  width:100%;
  height:80px;
  font-size:24px;
  font-weight:900;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.sub-panel{
  border:2px solid var(--accent);
  border-radius:14px;
  display:flex;
}

.sub-item{
  flex:1;
  padding:10px 12px;
}

.sub-item + .sub-item{
  border-left:2px solid var(--accent);
}

.sub-title{
  color:var(--accent);
  font-size:14px;
}

.sub-value{
  font-size:22px;
  font-weight:900;
}

.message{
  border:2px solid var(--accent);
  border-radius:14px;
  padding:8px 12px;
}

.message-title{
  font-size:14px;
  color:var(--accent);
}

.message-ja{
  font-size:20px;
  margin-top:4px;
}

.message-en{
  font-size:14px;
  margin-top:4px;
  color:var(--accent);
}

</style>
</head>

<body>

<div class="header">
  <div class="left-header">
    <img src="logo.png" class="logo">

    <div class="rack-box" id="refresh">
      <img id="rackImage" src="rack1.png">
    </div>
  </div>

  <div class="updated">
    <div class="updated-label">LAST UPDATED</div>
    <div class="updated-value" id="updated">--</div>
  </div>
</div>

<div class="main">

  <div class="main-card">
    <div class="main-left">
      <div class="state" id="state">--</div>
      <div class="state-en" id="stateEn">--</div>
      <div class="user" id="user">--</div>
    </div>

    <div class="main-right">
      <div class="time" id="time">--</div>
      <div class="until" id="until">--</div>

      <div class="checkout">
        チェックアウト
      </div>
    </div>
  </div>

  <div class="sub-panel">
    <div class="sub-item">
      <div class="sub-title">次の利用者</div>
      <div class="sub-value" id="nextUser">--</div>
    </div>

    <div class="sub-item">
      <div class="sub-title">次の予定</div>
      <div class="sub-value" id="nextTime">--</div>
    </div>
  </div>

  <div class="message">
    <div class="message-title">MESSAGE BOARD</div>
    <div class="message-ja" id="messageJa">--</div>
    <div class="message-en" id="messageEn">--</div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
const rackNo = new URLSearchParams(location.search).get("rackNo") || 1;

function convertMin(text){
  const m = text.match(/(\d+)/);
  if(!m) return "--";
  return m[1].padStart(2,"0") + ":00";
}

function applyData(data){

  document.getElementById("updated").innerHTML =
    data.lastUpdatedText.replace(/(\d{2}:\d{2})/, "<span>$1</span>");

  document.getElementById("rackImage").src = "rack" + data.rackNo + ".png";

  document.getElementById("state").textContent = data.state;
  document.getElementById("stateEn").textContent = data.state.toUpperCase();

  document.getElementById("user").textContent =
    data.currentUserName + "さんが利用中";

  document.getElementById("time").textContent =
    convertMin(data.currentSubText);

  document.getElementById("until").textContent =
    "〜" + data.currentText.split("〜")[1] + "まで";

  document.getElementById("nextUser").textContent =
    data.nextUserName;

  document.getElementById("nextTime").textContent =
    data.nextText;

  document.getElementById("messageJa").textContent =
    data.messageBoardTextJa;

  document.getElementById("messageEn").textContent =
    data.messageBoardTextEn;
}

async function loadData(){
  try{
    const res = await fetch(API_URL + "?action=getracktabletjson&rackNo=" + rackNo + "&t=" + Date.now());
    const data = await res.json();
    applyData(data);
  }catch(e){
    console.error(e);
  }
}

loadData();
setInterval(loadData, 15000);

document.getElementById("refresh").onclick = loadData;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Tablet</title>

<style>
:root{
  --accent:#8DFF00;
  --accent-glow:rgba(141,255,0,.22);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  height:70px;
  display:grid;
  grid-template-columns:60px 90px 1fr 210px;
  align-items:center;
  gap:12px;
  padding:8px 14px;
  border-bottom:1px solid rgba(255,255,255,.12);
}

.logo{
  width:50px;
  height:50px;
  object-fit:contain;
}

.rack-box{
  width:78px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:none !important;
  box-shadow:none !important;
  outline:none !important;
  background:transparent !important;
  overflow:hidden;
}

.rack-box img{
  max-width:78px;
  max-height:54px;
  width:auto;
  height:auto;
  object-fit:contain;
  border:none !important;
  box-shadow:none !important;
  outline:none !important;
  background:transparent !important;
}

.updated{
  justify-self:end;
  text-align:right;
}

.updated-label{
  font-size:12px;
  font-weight:800;
  line-height:1;
}

.updated-value{
  margin-top:5px;
  font-size:24px;
  font-weight:900;
  line-height:1;
}

.updated-value span{
  color:var(--accent);
}

/* ===== MAIN ===== */
.main{
  height:calc(100vh - 70px);
  padding:10px 14px;
  display:grid;
  grid-template-rows:1fr 96px 82px;
  gap:10px;
}

/* ===== MAIN CARD ===== */
.main-card{
  border:2px solid var(--accent);
  border-radius:16px;
  padding:14px 18px;
  display:grid;
  grid-template-columns:1fr 280px;
  gap:18px;
  box-shadow:0 0 10px var(--accent-glow);
  min-height:0;
}

.main-left{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.state{
  font-size:54px;
  line-height:1;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.state-en{
  margin-top:7px;
  font-size:24px;
  line-height:1;
  font-weight:900;
  color:var(--accent);
  white-space:nowrap;
}

.user{
  margin-top:18px;
  font-size:44px;
  line-height:1.1;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.subtext{
  margin-top:8px;
  font-size:20px;
  line-height:1.2;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:rgba(255,255,255,.92);
}

/* ===== RIGHT ===== */
.main-right{
  border-left:2px solid var(--accent);
  padding-left:16px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.time-label{
  color:var(--accent);
  font-size:18px;
  font-weight:900;
  line-height:1;
}

.time{
  margin-top:8px;
  font-size:54px;
  line-height:1;
  font-weight:900;
  white-space:nowrap;
}

.until{
  margin-top:8px;
  font-size:18px;
  line-height:1.2;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.checkout{
  margin-top:12px;
  background:var(--accent);
  color:#000;
  width:100%;
  height:78px;
  font-size:24px;
  font-weight:900;
  border:none;
  border-radius:12px;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* ===== SUB ===== */
.sub-panel{
  border:2px solid var(--accent);
  border-radius:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  box-shadow:0 0 10px var(--accent-glow);
  overflow:hidden;
}

.sub-item{
  padding:10px 14px;
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.sub-item + .sub-item{
  border-left:2px solid var(--accent);
}

.sub-title{
  color:var(--accent);
  font-size:14px;
  font-weight:900;
}

.sub-value{
  margin-top:8px;
  font-size:26px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ===== MESSAGE ===== */
.message{
  border:2px solid var(--accent);
  border-radius:14px;
  padding:8px 12px;
  box-shadow:0 0 10px var(--accent-glow);
}

.message-title{
  color:var(--accent);
  font-size:13px;
  font-weight:900;
}

.message-ja{
  margin-top:6px;
  font-size:20px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.message-en{
  margin-top:4px;
  font-size:14px;
  font-weight:800;
  color:var(--accent);
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">

  <div class="rack-box" id="refresh">
    <img id="rackImage" src="images/rt-rack1.png">
  </div>

  <div></div>

  <div class="updated">
    <div class="updated-label">LAST UPDATED</div>
    <div class="updated-value" id="updated">--</div>
  </div>
</div>

<div class="main">

  <div class="main-card">
    <div class="main-left">
      <div class="state" id="state"></div>
      <div class="state-en" id="stateEn"></div>
      <div class="user" id="user"></div>
      <div class="subtext" id="subtext"></div>
    </div>

    <div class="main-right" id="mainRight">
      <div class="time-label">残り時間</div>
      <div class="time" id="time"></div>
      <div class="until" id="until"></div>

      <button class="checkout" id="checkoutBtn">
        チェックアウト
      </button>
    </div>
  </div>

  <div class="sub-panel">
    <div class="sub-item">
      <div class="sub-title">次の利用者</div>
      <div class="sub-value" id="nextUser"></div>
    </div>

    <div class="sub-item">
      <div class="sub-title">次の予定</div>
      <div class="sub-value" id="nextTime"></div>
    </div>
  </div>

  <div class="message">
    <div class="message-title">MESSAGE BOARD</div>
    <div class="message-ja" id="messageJa"></div>
    <div class="message-en" id="messageEn"></div>
  </div>

</div>

<script>
const API_URL = "YOUR_API_URL";
const rackNo = new URLSearchParams(location.search).get("rackNo") || 1;

async function loadData(){
  const res = await fetch(API_URL + "?action=getracktabletjson&rackNo=" + rackNo);
  const data = await res.json();

  document.getElementById("rackImage").src =
    "images/rt-rack" + (data.rackNo || rackNo) + ".png";
}

loadData();
</script>

</body>
</html>

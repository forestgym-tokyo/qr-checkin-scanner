<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Tablet</title>

<style>
:root{
  --accent:#8DFF00;
  --accent-glow:rgba(141,255,0,.22);
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  width:100%;height:100%;
  background:#000;color:#fff;
  font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  height:70px;
  display:grid;
  grid-template-columns:auto auto 1fr auto;
  align-items:center;
  gap:12px;
  padding:8px 16px;
  border-bottom:1px solid rgba(255,255,255,.12);
}

.logo{height:48px;}

.rack-box{
  width:70px;height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.updated{
  justify-self:end;
  text-align:right;
}

.updated-label{font-size:12px;font-weight:800;}
.updated-value{font-size:26px;font-weight:900;}
.updated-value span{color:var(--accent);}

/* ===== MAIN ===== */
.main{
  height:calc(100vh - 70px);
  padding:10px 14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ===== MAIN CARD ===== */
.main-card{
  border:2px solid var(--accent);
  border-radius:18px;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  gap:16px;
  box-shadow:0 0 10px var(--accent-glow);
}

.main-left{flex:1;}

.state{
  font-size:54px;
  font-weight:900;
}

.state-en{
  font-size:22px;
  color:var(--accent);
}

.user{
  margin-top:12px;
  font-size:44px;
  font-weight:900;
}

.subtext{
  margin-top:8px;
  font-size:22px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.main-right{
  width:260px;
  border-left:2px solid var(--accent);
  padding-left:14px;
}

.time-label{color:var(--accent);font-size:18px;font-weight:900;}
.time{font-size:58px;font-weight:900;margin-top:4px;}
.until{margin-top:4px;font-size:20px;}

.checkout{
  margin-top:10px;
  background:var(--accent);
  color:#000;
  border:none;
  width:100%;
  height:86px;
  font-size:26px;
  font-weight:900;
  border-radius:12px;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.checkout span{font-size:18px;}

/* ===== SUB PANEL ===== */
.sub-panel{
  border:2px solid var(--accent);
  border-radius:14px;
  display:flex;
}

.sub-item{
  flex:1;
  padding:10px 12px;
}
.sub-item + .sub-item{
  border-left:2px solid var(--accent);
}

.sub-title{
  color:var(--accent);
  font-size:14px;
}

.sub-value{
  font-size:26px;
  font-weight:900;
  margin-top:4px;
}

/* ===== MESSAGE ===== */
.message{
  border:2px solid var(--accent);
  border-radius:14px;
  padding:8px 12px;
}

.message-title{
  font-size:14px;
  color:var(--accent);
}

.message-ja{
  font-size:20px;
  margin-top:4px;
}

.message-en{
  font-size:14px;
  margin-top:4px;
  color:var(--accent);
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">

  <div class="rack-box" id="refresh">
    <img id="rackImage" src="rack1.png">
  </div>

  <div></div>

  <div class="updated">
    <div class="updated-label">LAST UPDATED</div>
    <div class="updated-value" id="updated">--</div>
  </div>
</div>

<div class="main">

  <div class="main-card">
    <div class="main-left">
      <div class="state" id="state">--</div>
      <div class="state-en" id="stateEn">--</div>

      <div class="user" id="user"></div>
      <div class="subtext" id="subtext"></div>
    </div>

    <div class="main-right">
      <div class="time-label">残り時間</div>
      <div class="time" id="time">--</div>
      <div class="until" id="until"></div>

      <div class="checkout" id="checkoutBtn">
        チェックアウト
        <span>CHECK OUT</span>
      </div>
    </div>
  </div>

  <div class="sub-panel">
    <div class="sub-item">
      <div class="sub-title">次の利用者</div>
      <div class="sub-value" id="nextUser">--</div>
    </div>

    <div class="sub-item">
      <div class="sub-title">次の予定</div>
      <div class="sub-value" id="nextTime">--</div>
    </div>
  </div>

  <div class="message">
    <div class="message-title">MESSAGE BOARD</div>
    <div class="message-ja" id="messageJa">--</div>
    <div class="message-en" id="messageEn">--</div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
const rackNo = new URLSearchParams(location.search).get("rackNo") || 1;

function applyData(data){

  document.getElementById("updated").innerHTML =
    (data.nowText || "--").replace(/(\d{2}:\d{2})/, "<span>$1</span>");

  document.getElementById("rackImage").src = "rack" + (data.rackNo || 1) + ".png";

  // 状態表示修正
  if(data.state === "using_checked_in"){
    document.getElementById("state").textContent = "チェックイン済";
    document.getElementById("stateEn").textContent = "CHECKED IN";
  } else {
    document.getElementById("state").textContent = data.headline || "";
    document.getElementById("stateEn").textContent = "";
  }

  // 利用者
  document.getElementById("user").textContent =
    data.currentDisplayName ? data.currentDisplayName + "さんが利用中" : "";

  document.getElementById("subtext").textContent = data.subText || "";

  // 残り時間
  document.getElementById("time").textContent = data.currentSubText || "";
  document.getElementById("until").textContent = data.currentText || "";

  // 次の利用者（さん付与）
  document.getElementById("nextUser").textContent =
    data.nextDisplayName ? data.nextDisplayName + "さん" : "";

  document.getElementById("nextTime").textContent =
    (data.nextStartText && data.nextEndText)
      ? data.nextStartText + " ～ " + data.nextEndText
      : "";

  // メッセージ
  const msgs = data.messages || [];
  document.getElementById("messageJa").textContent = msgs[0] || "";
  document.getElementById("messageEn").textContent = msgs[1] || "";

  // チェックアウト
  const btn = document.getElementById("checkoutBtn");
  if(data.canCheckout){
    btn.style.display = "flex";
  } else {
    btn.style.display = "none";
  }
}

async function loadData(){
  const res = await fetch(API_URL + "?action=getracktabletjson&rackNo=" + rackNo + "&t=" + Date.now());
  const data = await res.json();
  applyData(data);
}

loadData();
setInterval(loadData,15000);

document.getElementById("refresh").onclick = loadData;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Tablet</title>

<style>
:root{
  --accent:#8DFF00;
  --accent-glow:rgba(141,255,0,.22);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
  overflow:hidden;
}

#subtext{
  font-size:30px;
  font-weight:900;
  line-height:1.2;
}

#subtextEn{
  color:var(--accent);
  font-size:22px;
  font-weight:900;
  margin-top:6px;
}

/* ===== HEADER ===== */
.header{
  height:70px;
  display:grid;
  grid-template-columns:260px 1fr 260px;
  align-items:flex-start;
  gap:12px;
  padding:8px 14px;
  border-bottom:1px solid rgba(255,255,255,.12);
}

.rack-box{
  width:234px;
  height:162px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:none !important;
  box-shadow:none !important;
  outline:none !important;
  background:transparent !important;
  overflow:visible;
  position:relative;
  top:-35px;
  z-index:10;
}

.rack-box img{
  max-width:234px;
  max-height:162px;
  width:auto;
  height:auto;
  object-fit:contain;
  border:none !important;
  box-shadow:none !important;
  outline:none !important;
  background:transparent !important;
}

.updated{
  justify-self:end;
  text-align:right;
}

.updated-label{
  font-size:12px;
  font-weight:800;
  line-height:1;
}

.updated-value{
  margin-top:5px;
  font-size:24px;
  font-weight:900;
  line-height:1;
}

.updated-value span{
  color:var(--accent);
}

/* ===== MAIN ===== */
.main{
  height:calc(100vh - 70px);
  padding:10px 14px;
  display:grid;
  grid-template-rows:1fr 96px 82px;
  gap:10px;
}

.main-card{
  border:2px solid var(--accent);
  border-radius:16px;
  padding:14px 18px;
  display:grid;
  grid-template-columns:1fr 280px;
  gap:18px;
  box-shadow:0 0 10px var(--accent-glow);
  min-height:0;
}

.main-left{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.state{
  font-size:54px;
  line-height:1;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.state-en{
  margin-top:7px;
  font-size:24px;
  line-height:1;
  font-weight:900;
  color:var(--accent);
  white-space:nowrap;
}

.user{
  margin-top:18px;
  font-size:44px;
  line-height:1.1;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.subtext{
  margin-top:8px;
  font-size:20px;
  line-height:1.2;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:rgba(255,255,255,.92);
}

.main-right{
  border-left:2px solid var(--accent);
  padding-left:16px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.time-label{
  color:var(--accent);
  font-size:18px;
  font-weight:900;
  line-height:1;
}

.time{
  margin-top:8px;
  font-size:54px;
  line-height:1;
  font-weight:900;
  white-space:nowrap;
}

.until{
  margin-top:8px;
  font-size:18px;
  line-height:1.2;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.checkout{
  margin-top:12px;
  background:var(--accent);
  color:#000;
  width:100%;
  height:78px;
  font-size:24px;
  font-weight:900;
  border:none;
  border-radius:12px;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.checkout span{
  margin-top:4px;
  font-size:16px;
}

/* ===== SUB ===== */
.sub-panel{
  border:2px solid var(--accent);
  border-radius:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  box-shadow:0 0 10px var(--accent-glow);
  overflow:hidden;
}

.sub-item{
  padding:10px 14px;
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.sub-item + .sub-item{
  border-left:2px solid var(--accent);
}

.sub-title{
  color:var(--accent);
  font-size:14px;
  font-weight:900;
  line-height:1;
}

.sub-value{
  margin-top:8px;
  font-size:26px;
  line-height:1;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ===== MESSAGE ===== */
.message{
  border:2px solid var(--accent);
  border-radius:14px;
  padding:8px 12px;
  box-shadow:0 0 10px var(--accent-glow);
  overflow:hidden;
}

.message-title{
  color:var(--accent);
  font-size:13px;
  font-weight:900;
  line-height:1;
}

.message-ja{
  margin-top:6px;
  font-size:20px;
  line-height:1.15;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.message-en{
  margin-top:4px;
  font-size:14px;
  line-height:1.15;
  font-weight:800;
  color:var(--accent);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ===== NO CHECKIN MODE ===== */
.main.no-checkin-mode{
  grid-template-rows:300px 82px !important;
  gap:10px !important;
  align-content:start !important;
}

.main.no-checkin-mode .main-card{
  width:100% !important;
  height:300px !important;
  grid-template-columns:1fr !important;
  padding:0 !important;
  border:none !important;
  box-shadow:none !important;
  background:transparent !important;
  overflow:hidden !important;
}

.main.no-checkin-mode .main-right{
  display:none !important;
}

.main.no-checkin-mode .sub-panel{
  display:none !important;
}

.main.no-checkin-mode .main-left{
  width:100% !important;
  height:300px !important;
  display:block !important;
  overflow:hidden !important;
}

.no-checkin-layout{
  width:100%;
  height:300px;
  display:grid;
  grid-template-rows:72px 136px 82px;
  gap:10px;
}

.no-checkin-main{
  width:100%;
  height:72px;
  border-radius:14px;
  background:rgba(0,28,18,.92);
  overflow:hidden;
  display:flex;
  align-items:center;
}

.no-checkin-marquee{
  white-space:nowrap;
  display:inline-block;
  padding-left:100%;
  animation:noCheckinScroll 16s linear infinite;
  font-size:34px;
  line-height:1;
  font-weight:900;
  color:#fff;
}

.no-checkin-marquee .accent{
  color:#8DFF00;
}

@keyframes noCheckinScroll{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-100%); }
}

.no-checkin-hours{
  width:100%;
  height:136px;
  border-radius:14px;
  background:rgba(0,28,18,.92);
  padding:10px 24px;
  overflow:hidden;
}

.no-checkin-hours-title{
  text-align:center;
  font-size:20px;
  line-height:1;
  font-weight:900;
  color:#fff;
}

.no-checkin-hours-title span{
  display:block;
  margin-top:4px;
  font-size:14px;
  color:#8DFF00;
  font-weight:900;
}

.no-checkin-hours-grid{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr 2px 1fr;
  gap:22px;
  align-items:center;
}

.no-checkin-divider{
  height:72px;
  background:#8DFF00;
  opacity:.7;
}

.no-checkin-hour-box{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  min-width:0;
}

.no-checkin-hour-box img{
  width:58px;
  height:58px;
  object-fit:contain;
  flex-shrink:0;
}

.no-checkin-hour-label{
  font-size:20px;
  line-height:1;
  font-weight:900;
  white-space:nowrap;
}

.no-checkin-hour-label.weekday{
  color:#8DFF00;
}

.no-checkin-hour-label.weekend{
  color:#ff2b2b;
}

.no-checkin-hour-time{
  margin-top:6px;
  font-size:30px;
  line-height:1;
  font-weight:900;
  color:#fff;
  white-space:nowrap;
}

.no-checkin-next{
  width:100%;
  height:82px;
  border-radius:14px;
  background:rgba(0,28,18,.92);
  padding:10px 18px;
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.no-checkin-next-box{
  min-width:0;
}

.no-checkin-next-box + .no-checkin-next-box{
  border-left:2px solid #8DFF00;
  padding-left:18px;
}

.no-checkin-next-title{
  color:#8DFF00;
  font-size:14px;
  font-weight:900;
  line-height:1;
}

.no-checkin-next-value{
  margin-top:8px;
  font-size:26px;
  line-height:1;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
</style>
</head>

<body>

<div class="header">
  <div class="rack-box" id="refresh">
    <img id="rackImage" src="rack1.png" alt="Rack">
  </div>

  <div></div>

  <div class="updated">
    <div class="updated-label">LAST UPDATED</div>
    <div class="updated-value" id="updated">--</div>
  </div>
</div>

<div class="main">

  <div class="main-card">
    <div class="main-left">
      <div class="state" id="state"></div>
      <div class="state-en" id="stateEn"></div>
      <div class="user" id="user"></div>
      <div class="subtext" id="subtext"></div>
      <div id="subtextEn"></div>
    </div>

    <div class="main-right" id="mainRight">
      <div class="time-label">残り時間（分）</div>
      <div class="time" id="time"></div>
      <div class="until" id="until"></div>

      <button class="checkout" id="checkoutBtn">
        チェックアウト
        <span>CHECK OUT</span>
      </button>
    </div>
  </div>

  <div class="sub-panel">
    <div class="sub-item">
      <div class="sub-title" id="nextUserTitle">次の利用者</div>
      <div class="sub-value" id="nextUser"></div>
    </div>

    <div class="sub-item">
      <div class="sub-title" id="nextTimeTitle">次の予定</div>
      <div class="sub-value" id="nextTime"></div>
    </div>
  </div>

  <div class="message">
    <div class="message-title">MESSAGE BOARD</div>
    <div class="message-ja" id="messageJa"></div>
    <div class="message-en" id="messageEn"></div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
const rackNo = new URLSearchParams(location.search).get("rackNo") || 1;

function safeSet(id, value){
  const el = document.getElementById(id);
  if(el) el.textContent = value;
}

function safeHtml(id, value){
  const el = document.getElementById(id);
  if(el) el.innerHTML = value;
}

function setAccent(color){
  document.documentElement.style.setProperty("--accent", color);

  if(color === "#00C8FF"){
    document.documentElement.style.setProperty("--accent-glow", "rgba(0,200,255,.22)");
  }else if(color === "#FFD400"){
    document.documentElement.style.setProperty("--accent-glow", "rgba(255,212,0,.22)");
  }else if(color === "#FF8A00"){
    document.documentElement.style.setProperty("--accent-glow", "rgba(255,138,0,.22)");
  }else if(color === "#7A3EFF"){
    document.documentElement.style.setProperty("--accent-glow", "rgba(122,62,255,.25)");
  }else if(color === "#9E9E9E"){
    document.documentElement.style.setProperty("--accent-glow", "rgba(158,158,158,.22)");
  }else{
    document.documentElement.style.setProperty("--accent-glow", "rgba(141,255,0,.22)");
  }
}

function cleanName(text){
  const s = String(text || "").trim();
  if(!s) return "";
  return s
    .replace(/^状況：/, "")
    .replace(/さんチェックイン済$/, "")
    .replace(/さん未チェックイン$/, "")
    .replace(/さんが利用中$/, "")
    .replace(/さん$/, "")
    .trim();
}

function extractCurrentName(data){
  if(data.currentDisplayName) return cleanName(data.currentDisplayName);
  if(data.currentUserName) return cleanName(data.currentUserName);
  if(data.subText) return cleanName(data.subText);
  return "";
}

function formatTimeRange(start,end){
  return start && end ? start + "～" + end : "";
}

function formatUpdated(text){
  return String(text || "--").replace(/(\d{1,2}:\d{2})/, "<span>$1</span>");
}

function restoreMainLeft(){
  const mainLeft = document.querySelector(".main-left");
  if(!mainLeft) return;

  if(!document.getElementById("state")){
    mainLeft.innerHTML = `
      <div class="state" id="state"></div>
      <div class="state-en" id="stateEn"></div>
      <div class="user" id="user"></div>
      <div class="subtext" id="subtext"></div>
      <div id="subtextEn"></div>
    `;
  }
}

function setNoCheckinMode(on){
  const main = document.querySelector(".main");
  if(!main) return;

  if(on){
    main.classList.add("no-checkin-mode");
  }else{
    main.classList.remove("no-checkin-mode");
  }
}

function applyData(data){
  const rackImage = document.getElementById("rackImage");
  if(rackImage){
    rackImage.src = "rt-rack" + (data.rackNo || rackNo) + ".png";
  }

  let rawState = String(data.state || "").toLowerCase();

  if(data.priorityCheckin){
    rawState = "priority_checkin";
  }else if(data.noCheckinRequired && rawState === "free"){
    rawState = "no_checkin_required";
  }

  safeHtml("updated", formatUpdated(data.nowText || data.lastUpdatedText));

  const currentName = extractCurrentName(data);
  const nextName = cleanName(data.nextDisplayName || "");
  const nextTime = formatTimeRange(data.nextStartText, data.nextEndText);

  const checkoutBtn = document.getElementById("checkoutBtn");
  const mainRight = document.getElementById("mainRight");

  if(checkoutBtn) checkoutBtn.style.display = "none";
  if(mainRight) mainRight.style.display = "flex";

  if(rawState !== "no_checkin_required"){
    setNoCheckinMode(false);
    restoreMainLeft();
  }

  if(rawState === "no_checkin_required"){
    setAccent("#8DFF00");
    setNoCheckinMode(true);

    const mainLeft = document.querySelector(".main-left");
    if(mainLeft){
      mainLeft.innerHTML = `
        <div class="no-checkin-layout">

          <div class="no-checkin-main">
            <div class="no-checkin-marquee">
              ただいまの時間は<span class="accent">チェックイン不要</span>です。そのままご利用ください。 / 
              <span class="accent">No check-in</span> is required at this time. Please use freely.
            </div>
          </div>

          <div class="no-checkin-hours">
            <div class="no-checkin-hours-title">
              チェックインが必要な時間帯
              <span>CHECK-IN HOURS</span>
            </div>

            <div class="no-checkin-hours-grid">

              <div class="no-checkin-hour-box">
                <img src="calender-weekday.png" alt="Weekdays">
                <div>
                  <div class="no-checkin-hour-label weekday">WEEKDAYS</div>
                  <div class="no-checkin-hour-time">12:00 – 22:00</div>
                </div>
              </div>

              <div class="no-checkin-divider"></div>

              <div class="no-checkin-hour-box">
                <img src="calender-weekend.png" alt="Weekends and Holidays">
                <div>
                  <div class="no-checkin-hour-label weekend">WEEKENDS & HOLIDAYS</div>
                  <div class="no-checkin-hour-time">07:00 – 22:00</div>
                </div>
              </div>

            </div>
          </div>

          <div class="no-checkin-next">
            <div class="no-checkin-next-box">
              <div class="no-checkin-next-title">次の利用者 / NEXT USER</div>
              <div class="no-checkin-next-value">${nextName ? nextName + "さん" : "—"}</div>
            </div>

            <div class="no-checkin-next-box">
              <div class="no-checkin-next-title">次の予定 / NEXT RESERVATION</div>
              <div class="no-checkin-next-value">${nextTime || "予定なし"}</div>
            </div>
          </div>

        </div>
      `;
    }

    const msgs = data.messages || [];
    safeSet("messageJa", msgs[0] || "");
    safeSet("messageEn", msgs[1] || "");
    return;
  }

  if(rawState === "priority_checkin"){
    setAccent("#7A3EFF");

    safeSet("state", "繰上げ利用案内中");
    safeSet("stateEn", "PRIORITY WINDOW FOR NEXT USER");
    safeSet("user", "");
    safeSet("subtext", "この時間は次の予約者が優先です");
    safeSet("subtextEn", "Priority is given to the next user");

    safeSet("time", data.priorityRemainingMin ? data.priorityRemainingMin + " min" : "");
    safeSet("until", "残り時間");

    safeSet("nextUserTitle", "次の利用者 / Next User");
    safeSet("nextTimeTitle", "次の予定 / Next Reservation");
    safeSet("nextUser", nextName ? nextName + "さん" : "—");
    safeSet("nextTime", nextTime || "予定なし");
  }

  else if(rawState === "using_checked_in" || rawState === "checked_in"){
    setAccent("#8DFF00");

    safeSet("state", "チェックイン済");
    safeSet("stateEn", "CHECKED IN");
    safeSet("user", currentName ? currentName + "さんが利用中" : "利用中");
    safeSet("subtext", "");
    safeSet("subtextEn", currentName ? "In use by " + currentName : "Currently in use");

    safeSet("time",
      (data.remainingMin !== null && data.remainingMin !== undefined)
        ? data.remainingMin + " min"
        : ""
    );

    safeSet("until", data.currentText || "");

    if(checkoutBtn){
      checkoutBtn.style.display = data.canCheckout ? "flex" : "none";
    }

    safeSet("nextUserTitle", "次の利用者");
    safeSet("nextTimeTitle", "次の予定");
    safeSet("nextUser", nextName ? nextName + "さん" : "—");
    safeSet("nextTime", nextTime || "予定なし");
  }

  else if(rawState === "using_not_checked_in" || rawState === "not_checked_in"){
    setAccent("#FF8A00");

    safeSet("state", "未チェックイン");
    safeSet("stateEn", "NOT CHECKED IN");
    safeSet("user", "");
    safeSet("subtext", "QRコードでチェックインしてください");
    safeSet("subtextEn", "Please check in with the QR code within 5 minutes");

    safeSet("time",
      (data.remainingMin !== null && data.remainingMin !== undefined)
        ? (data.remainingMin <= 0 ? "まもなく" : data.remainingMin + " min")
        : ""
    );

    safeSet("until", "自動キャンセルまで");

    safeSet("nextUserTitle", "予約者");
    safeSet("nextTimeTitle", "予定時間");
    safeSet("nextUser", currentName ? currentName + "さん" : "—");
    safeSet("nextTime", data.currentText || formatTimeRange(data.currentStartText, data.currentEndText) || "—");
  }

  else if(rawState === "free"){
    setAccent("#00C8FF");

    safeSet("state", "空いています");
    safeSet("stateEn", "AVAILABLE");
    safeSet("user", "");
    safeSet("subtext", "店内タブレットよりチェックインしてください");
    safeSet("subtextEn", "Please check in using the in-gym tablet");

    if(mainRight) mainRight.style.display = "none";

    safeSet("nextUserTitle", "次の利用者 / Next User");
    safeSet("nextTimeTitle", "次の予定 / Next Reservation");
    safeSet("nextUser", nextName ? nextName + "さん" : "—");
    safeSet("nextTime", nextTime || "予定なし");
  }

  else if(rawState === "reserved" || rawState === "scheduled"){
    setAccent("#FFD400");

    safeSet("state", "予定があります");
    safeSet("stateEn", "RESERVED SOON");
    safeSet("user", "");
    safeSet("subtext", "次の予定の開始までご利用いただけます");
    safeSet("subtextEn", "Available until the next reservation starts");

    safeSet("time",
      (data.remainingMin !== null && data.remainingMin !== undefined)
        ? (data.remainingMin <= 0 ? "まもなく" : data.remainingMin + " min")
        : ""
    );

    safeSet("until", "開始まで");

    safeSet("nextUserTitle", "次の利用者 / Next User");
    safeSet("nextTimeTitle", "次の予定 / Next Reservation");
    safeSet("nextUser", nextName ? nextName + "さん" : "—");
    safeSet("nextTime", nextTime || "予定なし");
  }

  else{
    setAccent("#8DFF00");

    safeSet("state", "");
    safeSet("stateEn", "");
    safeSet("user", "");
    safeSet("subtext", "");
    safeSet("subtextEn", "");
  }

  const msgs = data.messages || [];
  safeSet("messageJa", msgs[0] || "");
  safeSet("messageEn", msgs[1] || "");
}

async function loadData(){
  try{
    const res = await fetch(API_URL + "?action=getracktabletjson&rackNo=" + rackNo + "&t=" + Date.now(), {
      cache:"no-store"
    });
    const data = await res.json();
    applyData(data);
  }catch(e){
    console.log("loadData error", e);
  }
}

loadData();
setInterval(loadData, 15000);

const refreshBtn = document.getElementById("refresh");
if(refreshBtn){
  refreshBtn.onclick = loadData;
}

const checkoutButton = document.getElementById("checkoutBtn");
if(checkoutButton){
  checkoutButton.onclick = function(){
    checkoutRack(rackNo);
  };
}

async function checkoutRack(rackNo) {
  if (!rackNo) {
    showToast("ラック番号が取得できません");
    return;
  }

  try {
    const params = new URLSearchParams();
    params.append("action", "checkoutFromRackTablet");
    params.append("rackNo", rackNo);

    const res = await fetch(API_URL, {
      method: "POST",
      body: params
    });

    let data = {};
    try {
      data = await res.json();
    } catch (e) {}

    if (data && data.ok) {
      showToast("チェックアウト完了");
      loadData();
    } else {
      showToast("チェックアウトできませんでした");
    }

  } catch (e) {
    showToast("通信エラー");
  }
}


// ▼ ここは関数の外（1回だけ定義）
function showToast(msg) {
  let el = document.getElementById("toast");

  if (!el) {
    el = document.createElement("div");
    el.id = "toast";
    el.style.position = "fixed";
    el.style.bottom = "40px";
    el.style.left = "50%";
    el.style.transform = "translateX(-50%)";
    el.style.background = "rgba(0,0,0,0.85)";
    el.style.color = "#8DFF00";
    el.style.padding = "14px 24px";
    el.style.borderRadius = "10px";
    el.style.fontSize = "20px";
    el.style.fontWeight = "700";
    el.style.zIndex = "99999";
    el.style.boxShadow = "0 0 20px rgba(141,255,0,0.35)";
    document.body.appendChild(el);
  }

  el.innerText = msg;
  el.style.display = "block";

  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(function () {
    el.style.display = "none";
  }, 1800);
}
</script>

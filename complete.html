<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完了</title>

<style>
body{
  margin:0;
  background:#0f1115;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.wrap{
  width:100%;
  max-width:480px;
  padding:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:32px 24px;
  text-align:center;
  backdrop-filter:blur(12px);
}
.icon{
  font-size:48px;
  margin-bottom:16px;
}
.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
}
.subtitle{
  font-size:14px;
  color:#cfd6df;
  line-height:1.8;
  margin-bottom:20px;
}
.subtitle-en{
  font-size:13px;
  color:#8f97a3;
}
button{
  width:100%;
  padding:16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  margin-top:10px;
}
.primary{
  background:#2ecc71;
  color:#000;
}
.secondary{
  background:#444;
  color:#fff;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <div class="icon">✔</div>

    <div class="title">
      受付完了しました
    </div>

    <div class="subtitle">
      順番待ちの受付が完了しました。<br>
      順番が近づきましたらメールでご案内いたします。
      <div class="subtitle-en">
        Registration completed.<br>
        You will receive an email when your turn approaches.
      </div>
    </div>

    <button class="primary" onclick="goTop()">
      TOP画面へ戻る / Back to Top
    </button>

    <button class="secondary" onclick="closePage()">
      閉じる / Close
    </button>

  </div>
</div>

<script>
function goTop(){
  location.href = "tablet.html?t=" + Date.now();
}

function closePage(){
  window.close();
}
</script>

</body>
</html>

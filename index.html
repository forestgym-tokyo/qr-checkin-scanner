<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QRチェックイン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h2>QRチェックイン</h2>

  <video id="video" autoplay playsinline style="width:90%; max-width:400px; border:1px solid #ccc;"></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <p id="status">カメラ起動中...</p>

  <script>
    // ★ 最新GAS URL
    const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
    const RETURN_URL = API_URL + "?action=scheduletablet";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const status = document.getElementById("status");

    let scanning = true;

    // カメラ起動（背面優先）
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    })
    .then(stream => {
      video.srcObject = stream;
      requestAnimationFrame(scan);
    })
    .catch(err => {
      status.innerText = "カメラ起動失敗";
      console.error(err);
    });

    function scan() {
      if (!scanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code) {
          scanning = false;
          status.innerText = "読み取り成功";

          // 音
          const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
          audio.volume = 1.0;
          audio.play();

          sendToGAS(code.data);
          return;
        }
      }

      requestAnimationFrame(scan);
    }

    function sendToGAS(qrText) {
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "checkinByQrText",
          text: qrText
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          status.innerText = "チェックイン成功";
        } else {
          status.innerText = "失敗: " + data.message;
        }

        setTimeout(() => {
          window.location.href = RETURN_URL + "&t=" + Date.now();
        }, 1500);
      })
      .catch(err => {
        status.innerText = "通信エラー";
        console.error(err);
      });
    }
  </script>

  <!-- QRライブラリ -->
  <script src="https://unpkg.com/jsqr"></script>

</body>
</html>

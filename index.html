<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QRチェックイン</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: #fff;
  padding: 20px;
}

button {
  font-size: 24px;
  padding: 16px 20px;
  border-radius: 12px;
  border: none;
  background: #2e7d32;
  color: #fff;
}

#video {
  width: 100%;
  max-width: 400px;
  margin-top: 20px;
  border-radius: 12px;
  background: #000;
}

#message {
  margin-top: 20px;
  font-size: 22px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h1>QRチェックイン</h1>

<button onclick="startScan()">QR読み込み</button>

<br>
<video id="video" autoplay playsinline muted></video>

<div id="message"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

let stream = null;
let scanTimer = null;
let isScanning = false;
let isProcessing = false;

async function startScan() {
  const video = document.getElementById("video");
  const message = document.getElementById("message");

  if (isScanning) return;

  isScanning = true;
  isProcessing = false;
  message.innerText = "カメラ起動中...";

  stopCamera();
  clearScanTimer();

  try {
    // まず権限取得
    const tempStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    // 一旦止める
    tempStream.getTracks().forEach(track => track.stop());

    // カメラ一覧取得
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoInputs = devices.filter(d => d.kind === "videoinput");

    // 前カメラっぽいものを優先
    const frontCamera = videoInputs.find(d => {
      const label = (d.label || "").toLowerCase();
      return (
        label.includes("front") ||
        label.includes("user") ||
        label.includes("inner") ||
        label.includes("前") ||
        label.includes("内")
      );
    });

    if (frontCamera) {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          deviceId: { exact: frontCamera.deviceId },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
    } else {
      // 見つからなければ前カメラ希望で取得
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
    }

    video.srcObject = stream;
    await video.play();

    if (!("BarcodeDetector" in window)) {
      message.innerText = "このブラウザはQR自動読取に対応していません";
      stopCamera();
      isScanning = false;
      return;
    }

    const detector = new BarcodeDetector({ formats: ["qr_code"] });
    message.innerText = "QRをかざしてください";

    scanTimer = setInterval(async () => {
      if (isProcessing) return;
      if (!video || video.readyState < 2) return;

      try {
        const codes = await detector.detect(video);
        if (codes.length > 0 && codes[0].rawValue) {
          isProcessing = true;
          await handleQR(codes[0].rawValue);
        }
      } catch (e) {
        console.error(e);
      }
    }, 500);

  } catch (e) {
    console.error(e);
    message.innerText = "カメラが使えません";
    stopCamera();
    isScanning = false;
  }
}

async function handleQR(text) {
  const message = document.getElementById("message");

  message.innerText = "読み取り成功\n送信中...";
  clearScanTimer();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "checkinByQrText",
        qrText: text
      }),
      headers: {
        "Content-Type": "application/json"
      }
    });

    const data = await res.json();

    if (data.success) {
      message.innerText = "チェックインしました";
    } else {
      message.innerText = data.message || "失敗";
    }

  } catch (e) {
    console.error(e);
    message.innerText = "通信エラー";
  }

  stopCamera();
  isScanning = false;
  isProcessing = false;
}

function clearScanTimer() {
  if (scanTimer) {
    clearInterval(scanTimer);
    scanTimer = null;
  }
}

function stopCamera() {
  clearScanTimer();

  const video = document.getElementById("video");
  if (video) {
    try {
      video.pause();
    } catch (e) {}
    video.srcObject = null;
  }

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }
}
</script>

</body>
</html>

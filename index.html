<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QRチェックイン</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: #fff;
  padding: 20px;
  margin: 0;
}

h1 {
  margin: 0 0 16px;
  font-size: 32px;
}

button {
  font-size: 24px;
  padding: 16px 20px;
  border-radius: 12px;
  border: none;
  background: #2e7d32;
  color: #fff;
  margin-bottom: 16px;
}

#cameraWrap {
  position: relative;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
}

#video {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  background: #000;
  display: block;
}

#overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.frame {
  position: absolute;
  top: 38%;
  left: 50%;
  width: 220px;
  height: 220px;
  transform: translate(-50%, -50%);
  border: 3px solid #00ff88;
  border-radius: 16px;
  box-shadow: 0 0 12px rgba(0, 255, 136, 0.8);
  box-sizing: border-box;
}

.frame::before,
.frame::after {
  content: "";
  position: absolute;
  width: 28px;
  height: 28px;
  border-color: #ffffff;
  border-style: solid;
}

.frame::before {
  top: -3px;
  left: -3px;
  border-width: 4px 0 0 4px;
  border-top-left-radius: 10px;
}

.frame::after {
  right: -3px;
  bottom: -3px;
  border-width: 0 4px 4px 0;
  border-bottom-right-radius: 10px;
}

#guide {
  margin-top: 90px;
  font-size: 18px;
  line-height: 1.8;
  color: #ddd;
  white-space: pre-wrap;
}

#message {
  margin-top: 18px;
  font-size: 22px;
  white-space: pre-wrap;
  min-height: 60px;
}

@media (max-width: 480px) {
  h1 {
    font-size: 28px;
  }

  button {
    font-size: 22px;
    width: 100%;
    max-width: 400px;
  }

  .frame {
    width: 190px;
    height: 190px;
    top: 37%;
  }

  #guide {
    margin-top: 95px;
    font-size: 16px;
  }

  #message {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<h1>QRチェックイン</h1>

<button onclick="startScan()">QR読み込み</button>

<div id="cameraWrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div class="frame"></div>
  </div>
</div>

<div id="guide">QRコードを枠内に合わせてください
Please align the QR code within the frame

15〜20cm離してください
Keep 15–20 cm distance</div>

<div id="message"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";

let stream = null;
let scanTimer = null;
let isScanning = false;
let isProcessing = false;

async function startScan() {
  const video = document.getElementById("video");
  const message = document.getElementById("message");

  if (isScanning) return;

  isScanning = true;
  isProcessing = false;
  message.innerText = "カメラ起動中...";

  stopCamera();
  clearScanTimer();

  try {
    const tempStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    tempStream.getTracks().forEach(track => track.stop());

    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoInputs = devices.filter(d => d.kind === "videoinput");

    const frontCamera = videoInputs.find(d => {
      const label = (d.label || "").toLowerCase();
      return (
        label.includes("front") ||
        label.includes("user") ||
        label.includes("inner") ||
        label.includes("前") ||
        label.includes("内")
      );
    });

    if (frontCamera) {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          deviceId: { exact: frontCamera.deviceId },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
    } else {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
    }

    video.srcObject = stream;
    await video.play();

    if (!("BarcodeDetector" in window)) {
      message.innerText = "このブラウザはQR自動読取に対応していません";
      stopCamera();
      isScanning = false;
      return;
    }

    const detector = new BarcodeDetector({ formats: ["qr_code"] });
    message.innerText = "QRをかざしてください";

    scanTimer = setInterval(async () => {
      if (isProcessing) return;
      if (!video || video.readyState < 2) return;

      try {
        const codes = await detector.detect(video);
        if (codes.length > 0 && codes[0].rawValue) {
          isProcessing = true;
          await handleQR(codes[0].rawValue);
        }
      } catch (e) {
        console.error(e);
      }
    }, 500);

  } catch (e) {
    console.error(e);
    message.innerText = "カメラが使えません";
    stopCamera();
    isScanning = false;
  }
}

async function handleQR(text) {
  const message = document.getElementById("message");

  message.innerText = "読み取り成功\n送信中...";
  clearScanTimer();

  try {
    const params = new URLSearchParams();
    params.append("action", "checkinByQrText");
    params.append("qrText", text);

    const res = await fetch(API_URL, {
      method: "POST",
      body: params
    });

    const data = await res.json();

    if (data.success) {
      message.innerText = "チェックインしました";
    } else {
      message.innerText = data.message || "失敗";
    }

  } catch (e) {
    console.error(e);
    message.innerText = "通信エラー";
  }

  stopCamera();
  isScanning = false;
  isProcessing = false;
}

function clearScanTimer() {
  if (scanTimer) {
    clearInterval(scanTimer);
    scanTimer = null;
  }
}

function stopCamera() {
  clearScanTimer();

  const video = document.getElementById("video");
  if (video) {
    try { video.pause(); } catch (e) {}
    video.srcObject = null;
  }

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }
}
</script>

</body>
</html>

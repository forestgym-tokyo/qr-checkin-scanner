<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>QRチェックイン</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }
    .wrap {
      width: 100%;
      max-width: 700px;
      padding: 24px 20px 32px;
      text-align: center;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 20px;
      border-radius: 24px;
      overflow: hidden;
      background: #222;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }
    .msg {
      margin-top: 16px;
      line-height: 1.55;
      font-size: 18px;
      font-weight: 700;
      white-space: pre-line;
    }
    .sub {
      margin-top: 14px;
      font-size: 16px;
      color: #ddd;
      line-height: 1.6;
      white-space: pre-line;
    }
    .count {
      margin-top: 18px;
      font-size: 18px;
      font-weight: 800;
      color: #7CFF72;
    }
    .hidden { display: none; }

    .loading {
      margin-top: 18px;
      font-size: 18px;
      font-weight: 700;
      color: #7CFF72;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 16px;
      padding: 18px 20px;
      width: 100%;
      max-width: 420px;
      font-size: 28px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 18px;
    }
    .retry {
      background: #19d600;
      color: #fff;
    }

    @media (max-width: 600px) {
      h1 { font-size: 32px; }
      .msg { font-size: 16px; }
      .sub { font-size: 14px; }
      button { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>QRチェックイン</h1>

    <div id="reader"></div>

    <div class="msg" id="message">
QRコードを枠内に合わせてください
Please align the QR code within the frame
    </div>

    <div class="sub" id="subMessage">
15〜20cm離してください
Keep 15–20 cm distance
    </div>

    <div class="loading hidden" id="loadingText">処理中です…</div>
    <div class="count" id="countdown"></div>

    <button class="retry" id="retryBtn" type="button">再スキャン</button>
  </div>

  <script>
    // ===== 必ず自分のURLに置き換え =====
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx6mZdlpMCIcMWLcdH9J9O2n_1b2XuNcvW4TtvRqEFJ97Uz4Fp3C-6w-UlX5lXC3izn2Q/exec";
    const RETURN_URL = WEBAPP_URL + "?action=scheduletablet&t=" + Date.now();

    // 10秒で自動帰還
    const AUTO_RETURN_MS = 10000;

    let html5QrCode = null;
    let alreadyHandled = false;
    let autoReturnTimer = null;
    let countdownTimer = null;
    let streamStarted = false;

    const messageEl = document.getElementById("message");
    const subMessageEl = document.getElementById("subMessage");
    const loadingTextEl = document.getElementById("loadingText");
    const countdownEl = document.getElementById("countdown");
    const retryBtn = document.getElementById("retryBtn");

    function goToSchedule() {
      // replaceではなくhref
      // これでスケジュール画面から端末の戻るでGitHubへ戻れる
      window.location.href = RETURN_URL;
    }

    function startAutoReturnCountdown(ms) {
      clearAutoReturnCountdown();

      const endAt = Date.now() + ms;

      function render() {
        const remain = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
        countdownEl.textContent = remain > 0
          ? `${remain}秒後に自動で戻ります`
          : `移動中…`;
      }

      render();

      countdownTimer = setInterval(() => {
        render();
      }, 250);

      autoReturnTimer = setTimeout(() => {
        clearAutoReturnCountdown();
        goToSchedule();
      }, ms);
    }

    function clearAutoReturnCountdown() {
      if (autoReturnTimer) {
        clearTimeout(autoReturnTimer);
        autoReturnTimer = null;
      }
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      countdownEl.textContent = "";
    }

    async function stopScanner() {
      try {
        if (html5QrCode && streamStarted) {
          await html5QrCode.stop();
          streamStarted = false;
        }
      } catch (e) {
        console.warn("stopScanner error:", e);
      }
      try {
        if (html5QrCode) {
          await html5QrCode.clear();
        }
      } catch (e) {
        console.warn("clear scanner error:", e);
      }
    }

    async function startScanner() {
      alreadyHandled = false;
      clearAutoReturnCountdown();

      loadingTextEl.classList.add("hidden");
      retryBtn.classList.add("hidden");
      messageEl.textContent = "QRコードを枠内に合わせてください\nPlease align the QR code within the frame";
      subMessageEl.textContent = "15〜20cm離してください\nKeep 15–20 cm distance";

      try {
        await stopScanner();

        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
          { facingMode: { ideal: "environment" } },
          {
            fps: 10,
            qrbox: { width: 220, height: 220 },
            aspectRatio: 1.0
          },
          async (decodedText) => {
            if (alreadyHandled) return;
            alreadyHandled = true;

            loadingTextEl.classList.remove("hidden");
            loadingTextEl.textContent = "チェックイン処理中です…";
            messageEl.textContent = "QRを読み取りました";
            subMessageEl.textContent = "処理完了後、自動で戻ります";
            clearAutoReturnCountdown();

            await stopScanner();

            try {
              const res = await fetch(WEBAPP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                  action: "checkinByQrText",
                  qrText: decodedText
                })
              });

              const data = await res.json();

              if (data && data.success) {
                messageEl.textContent = "チェックインしました";
                subMessageEl.textContent = "自動でスケジュール画面へ戻ります";
                startAutoReturnCountdown(1200);
              } else {
                messageEl.textContent = "チェックインできませんでした";
                subMessageEl.textContent = (data && data.message) ? data.message : "10秒後に自動で戻ります";
                retryBtn.classList.remove("hidden");
                startAutoReturnCountdown(AUTO_RETURN_MS);
              }
            } catch (err) {
              console.error(err);
              messageEl.textContent = "通信エラーが発生しました";
              subMessageEl.textContent = "10秒後に自動で戻ります";
              retryBtn.classList.remove("hidden");
              startAutoReturnCountdown(AUTO_RETURN_MS);
            }
          },
          () => {
            // 読み取り中の失敗は無視
          }
        );

        streamStarted = true;

        // 読み取りできなくても10秒で戻す
        startAutoReturnCountdown(AUTO_RETURN_MS);

      } catch (err) {
        console.error(err);
        messageEl.textContent = "カメラが使えません";
        subMessageEl.textContent =
          (err && err.name ? err.name : "CameraError") +
          "\n" +
          (err && err.message ? err.message : "Unknown error") +
          "\n\n10秒後に自動で戻ります";
        retryBtn.classList.remove("hidden");
        startAutoReturnCountdown(AUTO_RETURN_MS);
      }
    }

    retryBtn.addEventListener("click", () => {
      startScanner();
    });

    window.addEventListener("load", () => {
      startScanner();
    });

    window.addEventListener("beforeunload", () => {
      clearAutoReturnCountdown();
    });
  </script>
</body>
</html>
